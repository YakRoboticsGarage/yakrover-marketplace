# ============================================================
# GLOSSARY — domain terms for LLM and new-reader clarity
# [Entry 5] Restructured with definition + note + borrowed per thejaymo
# ============================================================
glossary:
  reverse_auction:
    definition: "Buyer posts a task, multiple sellers (robot operators) bid. Lowest qualified bid wins. Opposite of traditional auction where buyers bid up."
    note: "Standard procurement term. Our implementation adds AI agent mediation."
    borrowed: true
  MCP:
    definition: "Model Context Protocol — standard for connecting AI agents to external tools and services. An agent uses MCP to call marketplace tools (post_task, get_bids, etc.)."
    note: "Anthropic-originated protocol. Rapidly adopted across AI ecosystem."
    borrowed: true
  ERC_8004:
    definition: "Ethereum token standard for on-chain robot identity. Each robot has a registered identity that enables discovery, reputation, and payment."
    note: "Ethereum mainnet since Jan 2026. We have 3 real implementations (yakrover, tumbller, tello)."
    borrowed: true
  x402:
    definition: "HTTP payment protocol by Coinbase. Embeds payment proof in HTTP headers so robots can be paid per-task via USDC."
    note: "100M+ payments in first 6 months. Our primary crypto rail."
    borrowed: true
  JTBD:
    definition: "Jobs-to-be-Done — framework for understanding what customers hire products to do. Marco hires robots to get pre-bid survey data faster."
    note: "Coined by Clayton Christensen. Applied to all persona definitions."
    borrowed: true
  DTN:
    definition: "Delay-Tolerant Networking — store-and-forward protocol for high-latency links (Earth-Moon). Messages queue at each node until the next link is available."
    note: "RFC 9171. Critical for lunar settlement modes."
    borrowed: true
  BBS_plus:
    definition: "BBS+ signatures — anonymous credential scheme allowing robots to prove aggregate reputation stats without revealing individual task history."
    note: "Academic origin. Applied in our Mode 2/4 privacy settlement."
    borrowed: true
  LAANC:
    definition: "Low Altitude Authorization and Notification Capability — FAA system for automated drone airspace authorization."
    note: "Automatable via Aloft/DroneUp API. Required for most urban construction sites."
    borrowed: true
  PLS:
    definition: "Professional Land Surveyor — state-licensed individual required to stamp survey deliverables. Robots operate under PLS supervision."
    note: "Licensing varies by state. See legal.pls_licensing for multi-state model."
    borrowed: true
  ConsensusDocs:
    definition: "Industry-standard construction contract forms. ConsensusDocs 750/751 are subcontractor agreements used in the marketplace."
    note: "Preferred over AIA forms for subcontractor-friendly terms."
    borrowed: true
  TEE:
    definition: "Trusted Execution Environment — hardware-secured computing enclave. Used for privacy-preserving task matching and scoring."
    note: "Intel SGX, ARM TrustZone, AMD SEV. Platform-mediated TEE is our AMLR compliance strategy."
    borrowed: true
  commitment_hash:
    definition: "H(request_id || salt) — cryptographic hash stored on-chain instead of raw task ID. Proves payment-task linkage without revealing which task."
    note: "Coined for this project. Decision FD-4."
    borrowed: false
  RFQ:
    definition: "Request for Qualifications — procurement document issued by DOTs to select qualified contractors for design-build projects."
    note: "Also used loosely to mean the marketplace's task posting (which is closer to an RFP)."
    borrowed: true
  GC:
    definition: "General Contractor — the prime contractor who hires survey subcontractors (and robot operators) to complete portions of a project."
    note: "Our primary buyer persona (Marco) is an estimator at a GC."
    borrowed: true
  NSSDA:
    definition: "National Standard for Spatial Data Accuracy — the US standard for reporting positional accuracy of geospatial data (used for LiDAR QC)."
    note: "Referenced in task spec accuracy requirements."
    borrowed: true
  # [Entry 4] New glossary entries
  retainage:
    definition: "Percentage of contract value (typically 5-10%) withheld by the buyer until substantial completion. Standard in construction."
    note: "Michigan allows reduction to 0% after 50% completion on public projects."
    borrowed: true
  lien_waiver:
    definition: "Legal document signed by the contractor waiving the right to file a mechanic's lien. Required for payment closeout."
    note: "Michigan MCL 570.1101 et seq. Non-optional for construction contracts."
    borrowed: true
  ACORD_25:
    definition: "Standard insurance certificate form used across the US. Parseable fields include policy number, limits, additional insured status."
    note: "TxDOT uses its own Form 1560-CSS instead."
    borrowed: true
  NBI:
    definition: "National Bridge Inventory — federal database of bridge condition ratings. NBI-formatted deliverables required for federally mandated inspections."
    note: "23 CFR 650. Key deliverable format for infrastructure vertical."
    borrowed: true

# ============================================================
# MANTRA + ESSENCE — anchoring statements
# ============================================================
mantra: "AI agents post tasks, physical robots bid, the best one delivers."
essence: "This file is the single ontological map of the product — every entity, bet, unknown, and architectural decision lives here. When in doubt, read this first."
