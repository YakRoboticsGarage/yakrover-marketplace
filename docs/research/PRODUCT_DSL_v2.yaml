# ============================================================
# LEGAL — contracts, bonds, insurance, compliance
# [Entry 4] Expanded with payment flow, data ownership, dispute, OSHA, Remote ID
# ============================================================
legal:
  moats:
    - id: legal:payment_bond_verification
      description: "Bond verification flow (MCL 129.201 for MI public projects >$50K). Operators see 'Payment Bonded' badge before bidding."
      strategic_function: moat
      jurisdictions: [MI, federal]
      threshold_usd: 50000
      sureties: [Travelers, Liberty Mutual, CNA, Zurich, Hartford]
      sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]

    - id: legal:pe_stamped_deliverables
      description: "PLS stamp required on survey plats and deliverables relied upon for construction. All 50 states."
      strategic_function: moat
      note: "Drone operator collects data; PLS supervises and stamps. Dual licensing model."
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: legal:coi_verification
      description: "Automated ACORD 25 parsing. CGL, E&O, drone/aviation liability verified against task minimums."
      strategic_function: trust_building
      # [Entry 4] COI schema with parseable fields
      coi_schema:
        standard: "ACORD 25"
        parsed_fields:
          - policy_number
          - naic_number
          - additional_insured_status
          - waiver_of_subrogation
          - retroactive_date
          - expiration_date
          - coverage_limits
        jurisdiction_variants:
          - {state: TX, form: "TxDOT Form 1560-CSS", note: "TxDOT rejects standard ACORD forms"}
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: legal:dbe_tracking
      description: "DBE/MBE compliance tracking for federally-funded projects (49 CFR Part 26). MDOT MERS Form 2124A."
      strategic_function: moat
      sources: [{path: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md}]

    # [Entry 4] Debarment check capability
    - id: legal:debarment_check
      description: "SAM.gov API + state debarment list verification before award"
      strategic_function: trust_building
      api: "SAM.gov Entity API"
      check_point: "award_confirmation.recommended -> award_confirmed"
      sources: [{path: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md}]

  overhead:
    - id: legal:faa_part_107
      description: "Remote Pilot Certificate required for all commercial drone ops"
      type: compliance
      renewal: "24 months, online recurrent training"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: legal:laanc
      description: "LAANC authorization for controlled airspace (many urban construction sites)"
      type: compliance
      automatable: true
      api: "Aloft/DroneUp LAANC API"
      sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]

    # [Entry 4] Remote ID compliance
    - id: legal:remote_id
      description: "FAA Remote ID required on all drones over 0.55 lbs — compliance prerequisite for every drone operation"
      type: compliance
      enforcement_date: "2023-09-16"
      verification: "Operator must declare Remote ID module serial number at registration"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    # [Entry 4] OSHA compliance
    - id: legal:osha_compliance
      description: "OSHA compliance for construction site operations — site safety plan, PPE, incident reporting"
      type: compliance
      requirements:
        - "OSHA 10-hour construction safety training"
        - "Site-specific safety plan per project"
        - "PPE when on active construction sites"
        - "Incident reporting within 8 hours for fatality, 24 hours for hospitalization"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: legal:money_transmitter
      description: "Payment facilitation may trigger state money transmitter licensing"
      type: risk_mitigation
      mitigation: "v1.5 uses prepaid credits (covered by Stripe's licenses). Escrow (v2.5) requires legal review."
      sources: [{path: docs/ROADMAP_v4.md}]

    # [Entry 4] Money transmission expanded
    - id: legal:money_transmission_detail
      description: "State-by-state money transmitter analysis for escrow and crypto settlement"
      type: risk_mitigation
      stripe_coverage: "Stripe holds money transmitter licenses; platform pass-through is covered"
      escrow_licensing_required: true
      crypto_msb_registration: "FinCEN MSB registration required if platform touches USDC outside Stripe flow"
      ny_bitlicense: "Required if serving NY customers with crypto settlement"
      resolve_before: phase:v2.5
      sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]

  contract_templates:
    - id: contract:consensusdocs_751
      name: "ConsensusDocs 751 (Short Form)"
      use_case: "Standard survey task orders"
      auto_populated_from: "task spec + winning bid"
      key_terms:
        data_ownership: "Processed deliverables to client; raw data retained by operator for E&O defense"
        liability_cap: "1x task fee"
        indemnification: "Mutual, each party's percentage of negligence (ConsensusDocs model)"
        dispute_resolution: "Negotiation -> mediation -> arbitration"
        # [Entry 4] Billing format
        billing_format: "AIA G702/G703 for progress billing"
        # [Entry 4] Limitation of liability
        limitation_of_liability: "Displayed at award time. Cap = 1x task fee."
      digital_execution: "ESIGN/UETA compliant"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: contract:consensusdocs_750
      name: "ConsensusDocs 750 (Long Form)"
      use_case: "Larger or more complex survey contracts"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: contract:consensusdocs_752
      name: "ConsensusDocs 752 (Federal)"
      use_case: "Federal government construction subcontracts"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  insurance_requirements:
    # [Entry 4] All 6 coverage types
    private_project:
      cgl: "$1M per occurrence / $2M aggregate"
      eo: "$1M per claim / $2M aggregate"
      drone_liability: "$1M per occurrence"
      workers_comp: "Statutory"
      umbrella_excess: "Not typically required"
      commercial_auto: "$1M combined single limit"
    dot_public_project:
      cgl: "$2M per occurrence / $5M aggregate"
      eo: "$2M per claim / $5M aggregate"
      drone_liability: "$2M-$5M per occurrence"
      workers_comp: "Statutory"
      umbrella_excess: "$2M-$10M"
      commercial_auto: "$1M-$2M combined single limit"
    # [Entry 4] E&O tail coverage
    eo_tail_policy:
      type: claims_made
      risk: "Operator who drops E&O after project exposes platform to downstream claims"
      tail_coverage_minimum_years: 3
      platform_enforcement: "Flag operators whose E&O lapses within tail period"
    # [Entry 4] Statute of limitations affecting E&O
    statute_of_limitations:
      - {state: TX, years: 10, note: "Survey error claims"}
      - {state: MI, years: 6, note: "Professional malpractice"}
      - {state: AZ, years: 6, note: "Professional malpractice"}
    sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  # [Entry 4] Payment flow as first-class state machine
  payment_flow:
    description: "Legally-required payment chain from bond to closeout"
    states:
      - escrow_funded
      - milestone_billed
      - milestone_approved
      - payment_released
      - retainage_held
      - retainage_released
      - lien_waiver_exchanged
      - closed
    retainage:
      default_pct: 10
      michigan_reduction: "Reducible to 0% after 50% completion on public projects"
      release_trigger: "Substantial completion + final inspection"
    prompt_payment_timers:
      - jurisdiction: MI
        statute: "MCL 125.1561"
        days_after_owner_payment: 10
        penalty_monthly_pct: 1.5
        exclusions: "MDOT projects, schools, contracts under $30K"
      - jurisdiction: federal
        statute: "Prompt Payment Act (31 USC 3901)"
        days_after_acceptance: 30
        penalty: "Per-diem interest at Treasury rate"
    lien_waiver:
      required: true
      exchange_point: "After final payment, before closeout"
      michigan_statute: "MCL 570.1101 et seq."
    billing_format: "AIA G702/G703"
    sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]

  # [Entry 4] Data ownership as first-class entity
  data_ownership:
    raw_sensor_data:
      owner: operator
      rationale: "Retained for E&O liability defense"
      retention_years: 7
    processed_deliverables:
      owner: client
      transfer_trigger: "Final payment received"
    derived_products:
      owner: "Jointly licensed — client gets exclusive use for project; operator retains for portfolio/training"
      note: "Who owns the 3D model generated from a point cloud the client paid for? Must be addressed in contract."
    platform_data_rights:
      task_metadata: "Platform retains anonymized task metadata for analytics and benchmarking"
      bid_data: "Platform retains anonymized bid data for pricing intelligence"
      training_data: "Platform may NOT use client deliverables for model training without explicit consent"
    privacy:
      neighboring_property:
        risk: "Drone surveys near property boundaries can capture private data"
        mitigation: "Privacy buffer zone configurable per task; default 50ft from boundary"
        legal_basis: "United States v. Causby, Nevada drone trespass law"
      pii_in_operator_profiles:
        fields_affected: [pls_license_number, home_address, tax_id]
        applicable_laws: [CCPA, state_privacy_laws]
        classification: "PII — encrypted at rest, access-controlled"
    sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  # [Entry 4] Multi-state PLS licensing model
  pls_licensing:
    description: "Professional Land Surveyor licensing varies by state — marketplace must track per-state requirements"
    states:
      - state: MI
        statute: "MCL 339.2001 et seq."
        firm_authorization: "MCL 339.2007 — Certificate of Authorization required for firms"
        continuing_education: "30 hours per biennial renewal"
      - state: AZ
        statute: "ARS 32-101 et seq."
        reciprocity: "NCEES record accepted"
        continuing_education: "30 hours per biennial renewal"
      - state: NV
        statute: "NRS 625"
        reciprocity: "Comity with NCEES"
        continuing_education: "30 hours per biennial renewal"
      - state: NM
        statute: "NMSA 61-23-1 et seq."
        reciprocity: "NCEES record accepted"
        continuing_education: "30 hours per biennial renewal"
    sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  michigan_specifics:
    surveyor_licensing: "MCL 339.2001 et seq."
    firm_authorization: "MCL 339.2007 — Certificate of Authorization required for firms"
    continuing_education: "30 hours per biennial renewal"
    payment_bond_threshold: "MCL 129.201 — public projects >= $50K"
    prompt_payment: "MCL 125.1561 — 10 days after receiving owner payment, 1.5%/mo penalty"
    prompt_payment_exclusions: "MDOT projects, schools, contracts under $30K"
    lien_rights: "MCL 570.1107a-b — surveyors as 'design professionals' since 2018"
    sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  # [v2.2] PLS automation options from RESEARCH_PLS_AUTOMATION_OPTIONS.md
  pls_automation:
    statute: "MCL 339.2007 — electronic seal and electronic signature explicitly permitted in Michigan"
    statute_url: "https://www.legislature.mi.gov/Laws/MCL?objectName=mcl-339-2007"
    legal_constraint: "PLS must have professional responsibility for the work product. Judgment cannot be delegated to AI. No state board accepts automated stamping without licensed professional review."
    minimum_human_time_per_task: "5-15 minutes (with AI pre-screening and electronic seal via API)"
    options:
      - id: pls:option_1
        name: "Operator brings own PLS"
        description: "Operator has PLS on staff or under contract. Marketplace verifies license only."
        pls_review_time: "30 min to 2 hours"
        who_pays: "Operator (baked into bid price)"
        automation_level: none
        risk: "Operators without PLS arrangement cannot bid on stamped deliverables"
      - id: pls:option_2
        name: "PLS as a service (marketplace PLS network)"
        description: "Marketplace contracts with PLSs in each state. Routes completed data for review. PLS cost is a line item ($200-$500/review)."
        pls_review_time: "30 min to 2 hours"
        who_pays: "Buyer (separate line item)"
        automation_level: partial
        advantage: "Any operator can bid, even without their own PLS. Supply grows."
        risk: "PLS must actually review, not rubber-stamp. Stamp mill arrangements violate licensing law."
        precedent: "Partner ESI and similar survey coordination firms match field crews with remote PLSs"
      - id: pls:option_3
        name: "AI-assisted PLS review (reduce review time)"
        description: "QA tool pre-screens deliverables (point density, RMSE, CRS, file format, gaps). PLS reviews QA report + spot-checks."
        pls_review_time: "15-30 minutes"
        who_pays: "Platform absorbs QA tool cost; PLS review still charged to buyer"
        automation_level: partial
        maps_to_skills: [skill:deliverable_validator, skill:capture_qc]
      - id: pls:option_4
        name: "Electronic seal via API"
        description: "PLS reviews dashboard, clicks approve. System applies digital seal via DocuSign/DocuSeal API. PLS never handles file directly."
        pls_review_time: "5-15 minutes"
        who_pays: "Platform absorbs seal cost; PLS review charged to buyer"
        automation_level: partial
        api_options: ["DocuSign eSignature REST API", "DocuSeal (open source)", "Custom PKI digital seal"]
        legal_basis: "Valid in Michigan (MCL 339.2007). Valid in most UETA/E-SIGN Act states."
      - id: pls:option_5
        name: "Platform employs PLSs directly"
        description: "Marketplace hires PLSs as W-2 or dedicated contractors. Every deliverable reviewed in-house."
        pls_review_time: "Same as Option 2"
        who_pays: "Built into platform take rate"
        automation_level: partial
        cost: "$80-120K/yr per PLS"
        risk: "Need one per state. Platform becomes professional services firm."
    recommended_phasing:
      phase_1: "v1.5-v2.0: Option 1 + Option 3 (operator brings PLS, marketplace builds QA tool)"
      phase_2: "v2.0-v2.5: Option 2 + Option 4 (PLS network + electronic seal API, 3-5 PLSs in MI/OH)"
      phase_3: "v3.0+: Consider Option 5 only if 50+ reviews/month makes dedicated staff cheaper"
    sources: [{path: docs/research/legal/RESEARCH_PLS_AUTOMATION_OPTIONS.md}]

# ============================================================
# ARCHITECTURE — capabilities, components, MCP tools, settlement,
#   execution stack, state machines, skills
# [Entry 2] Added tool schemas, fixed state machines, added refund semantics
# [Entry 2] Added scoring_profiles per vertical
# [Entry 2] Added frontend component
# [Entry 2] Added repos section for cross-repo coherence
# ============================================================
architecture:
  capabilities:
    - id: cap:task_posting
      description: "Agent translates natural language into structured task spec with sensor, accuracy, deliverable requirements"
      status: implemented
      phase: phase:v1.0
    - id: cap:reverse_auction
      description: "RFQ auction — open indefinitely, agent controls close"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:PD-1]
    - id: cap:automated_bidding
      description: "Robots run bid_engine(task) -> Bid autonomously"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:PD-2]
    - id: cap:bid_signing
      description: "Every bid signed with ERC-8004 Ed25519 key"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:PD-3]
    - id: cap:filter_then_score
      description: "Two-phase matching: hard constraint filter then weighted scoring"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:AD-5, decision:AD-6]
    - id: cap:fiat_settlement
      description: "Stripe Connect Express + prepaid wallet model"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:TC-2]
    - id: cap:crypto_settlement
      description: "USDC on Base via x402 middleware"
      status: planned
      phase: phase:v1.5
      decisions: [decision:TC-4]
    - id: cap:settlement_abstraction
      description: "4-mode interface supporting immediate/batched x transparent/private"
      status: planned
      phase: phase:v1.5
      decisions: [decision:FD-1]
    - id: cap:commitment_hash
      description: "H(request_id || salt) in on-chain memos, never raw request_id"
      status: planned
      phase: phase:v1.5
      decisions: [decision:FD-4]
    - id: cap:hidden_wallet_addresses
      description: "Robot wallet addresses never in public API responses"
      status: planned
      phase: phase:v1.5
      decisions: [decision:PP-2]
    - id: cap:award_confirmation
      description: "Human reviews recommended winner with automated checks before work starts"
      status: planned
      phase: phase:v2.0
      sources: [{path: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md}]
    - id: cap:multi_robot_workflows
      description: "Compound tasks decomposed into ordered/parallel subtasks across robot types"
      status: planned
      phase: phase:v2.0
    # [Entry 3] Manual-flagged task triage
    - id: cap:manual_task_flagging
      description: "Smart triage: tasks that require human specialists flagged and routed to specialist vendors"
      status: planned
      phase: phase:v2.0
      example: "Task 3 flagged MANUAL — requires human tunnel survey manager"
    - id: cap:privacy_tee
      description: "TEE-based confidential compute for encrypted task matching"
      status: planned
      phase: phase:v2.0
      decisions: [decision:PP-4]
    - id: cap:dtn_batched_settlement
      description: "Batched transparent settlement via DTN for lunar operations"
      status: planned
      phase: phase:v4.0
      decisions: [decision:LD-8]

  # [v2.2] Deployment architecture from TECHNICAL_MCP_DEPLOYMENT.md
  deployment:
    hosting:
      provider: Railway
      plan: "Hobby (usage-based)"
      cost_monthly_usd: 5
      url_pattern: "*.up.railway.app"
      ssl: "Auto (Let's Encrypt)"
      deploy_command: "railway up"
      cold_start_seconds: 2
      alternatives_evaluated: ["Fly.io ($3-5/mo)", "Render ($7/mo)", "DigitalOcean ($5/mo)", "ngrok (free, local)"]
    architecture_summary: |
      Internet -> Railway (public URL)
        FastAPI app (serve_with_auction.py)
          /fleet/mcp ......... MCP endpoint (15 auction tools)
          /fakerover/mcp ..... FakeRover simulator MCP
          /api/v1/ ........... HTTP REST for yakrobot.bid frontend
          / .................. Health check / status JSON
        SQLite volume (/data/auction.db)
        Environment variables (Railway dashboard)
    database:
      mvp: "SQLite on Railway volume mount ($0.25/GB)"
      migration_trigger: ">1 instance or >10 concurrent auction writers"
      target: "Railway Postgres ($5/mo)"
    path_to_real_operators: "Deploy -> public MCP URL -> operators connect Claude Code -> bid on real tasks"
    sources: [{path: docs/wave1/TECHNICAL_MCP_DEPLOYMENT.md}]

  # [Entry 2] Scoring profiles per vertical
  scoring_profiles:
    - id: scoring:construction
      vertical: vertical:construction
      weights: {price: 0.40, sla: 0.25, confidence: 0.20, reputation: 0.15}
      decisions: [decision:AD-6]
    - id: scoring:mining
      vertical: vertical:mining
      weights: {price: 0.35, sla: 0.25, confidence: 0.20, reputation: 0.15, volumetric_accuracy: 0.05}
    - id: scoring:infrastructure
      vertical: vertical:infrastructure
      weights: {price: 0.25, sla: 0.20, confidence: 0.15, reputation: 0.10, nbi_certification_match: 0.15, form_factor_availability: 0.15}
    - id: scoring:lunar
      vertical: null
      weights: {price: 0.30, speed: 0.20, confidence: 0.15, track_record: 0.10, power_margin: 0.15, dust_exposure: 0.10}
      decisions: [decision:LD-6]

  components:
    - id: component:auction_engine
      path: auction/engine.py
      description: "Task, Bid, AuctionResult, score_bids(), state machine"
      decisions: [decision:PD-1, decision:PD-2, decision:AD-5, decision:AD-6, decision:AD-7, decision:AD-8]
      impacts: [cap:reverse_auction, cap:automated_bidding, cap:filter_then_score]
    - id: component:core
      path: auction/core.py
      description: "Task, Bid, AuctionResult dataclasses, signing"
      decisions: [decision:PD-3, decision:AD-3]
    - id: component:wallet
      path: auction/wallet.py
      description: "WalletLedger with debit/credit log"
      decisions: [decision:TC-2]
    - id: component:stripe_service
      path: auction/stripe_service.py
      description: "Stripe Connect Express + Separate Charges and Transfers"
      decisions: [decision:TC-2, decision:TC-3]
    - id: component:store
      path: auction/store.py
      description: "SQLite persistence via SyncTaskStore"
    - id: component:discovery_bridge
      path: auction/discovery_bridge.py
      description: "ERC-8004 robot discovery"
      consumes: [repo:yakrover-8004-mcp]
    - id: component:mcp_server
      path: src/core/server.py
      description: "Fleet MCP server"
    - id: component:mock_fleet
      path: auction/mock_fleet.py
      description: "Simulated robots for testing"
    - id: component:escrow_contract
      path: contracts/RobotTaskEscrow.sol
      status: planned
      phase: phase:v1.5
      decisions: [decision:FD-1, decision:TC-4]
    - id: component:settlement
      path: auction/settlement.py
      status: planned
      phase: phase:v1.5
      decisions: [decision:FD-1, decision:FD-4]
    # [Entry 2] Frontend component
    - id: component:frontend
      path: demo/index.html
      description: "Next.js landing page + demo with robot cards, live feed, auction flow"
      status: implemented
      phase: phase:v1.5
      note: "Demo pricing ($0.25-$5.00 in schema.org) does not match construction pricing ($1,500-$5,000). Reconcile before launch."

  # [Entry 2] External repos consumed by the marketplace
  repos:
    - id: repo:yakrover-8004-mcp
      url: "https://github.com/YakRoboticsGarage/yakrover-8004-mcp"
      consumed_by: component:discovery_bridge
      provides:
        - "ERC-8004 agent card with tool surface"
        - "MCP tools for yakrover control"
      agent_card_fields: [min_price, accepted_currencies, reputation_score, sensor_capabilities]
      note: "External MCP server — agents must coordinate between this and component:mcp_server"
    - id: repo:tumbller-8004-mcp
      url: "https://github.com/YakRoboticsGarage/tumbller-8004-mcp"
      erc8004: true
    - id: repo:tello-8004-mcp
      url: "https://github.com/YakRoboticsGarage/tello-8004-mcp"
      erc8004: true
    - id: repo:cryptobotics-whitepaper
      url: "https://github.com/YakRoboticsGarage/cryptobotics-whitepaper"
      note: "Whitepaper never referenced in v1.1 YAML — should be cited for vision section"

  mcp_tools:
    existing_count: 15
    status_summary: "15 implemented, 3+ planned from gap analysis"
    # [Entry 2] Full parameter/return/error schemas for each tool
    existing:
      - name: post_task
        wraps: AuctionEngine.post_task
        triggers_state: "null -> posted"
        parameters:
          - {name: description, type: string, required: true}
          - {name: requirements, type: object, required: false}
          - {name: max_price_usd, type: number, required: false}
          - {name: deadline_seconds, type: integer, required: false}
        returns: {type: Task, fields: [task_id, status, created_at]}
        errors: [INVALID_TASK_SPEC, BELOW_MINIMUM_PRICE, INSUFFICIENT_FUNDS]
      - name: submit_bid
        wraps: AuctionEngine.submit_bid
        triggers_state: "posted -> bidding"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: robot_id, type: string, required: true}
          - {name: price_usd, type: number, required: true}
          - {name: sla_seconds, type: integer, required: true}
          - {name: confidence, type: number, required: true}
          - {name: signature, type: string, required: true}
        returns: {type: Bid, fields: [bid_id, task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_NOT_ACCEPTING_BIDS, INVALID_SIGNATURE, PRICE_BELOW_MINIMUM]
      - name: accept_bid
        wraps: AuctionEngine.accept_bid
        triggers_state: "bidding -> bid_accepted"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: bid_id, type: string, required: true}
        returns: {type: AuctionResult, fields: [task_id, winning_bid_id, status]}
        errors: [TASK_NOT_FOUND, BID_NOT_FOUND, TASK_NOT_IN_BIDDING]
      - name: auction_execute
        wraps: AuctionEngine.execute
        triggers_state: "bid_accepted -> in_progress"
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: Task, fields: [task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_NOT_ACCEPTED]
      - name: confirm_delivery
        wraps: AuctionEngine.confirm_delivery
        triggers_state: "delivered -> verified"
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: Task, fields: [task_id, status, settlement_receipt]}
        errors: [TASK_NOT_FOUND, TASK_NOT_DELIVERED]
      - name: reject_delivery
        wraps: AuctionEngine.reject_delivery
        triggers_state: "delivered -> rejected"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: reason, type: string, required: true}
        returns: {type: Task, fields: [task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_NOT_DELIVERED]
      - name: cancel_task
        wraps: AuctionEngine.cancel_task
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: Task, fields: [task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_IN_PROGRESS]
      - name: auction_get_status
        note: "Returns available_actions list (AD-14) and next_action hint (AD-13)"
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: TaskStatus, fields: [task_id, status, available_actions, next_action]}
        errors: [TASK_NOT_FOUND]
      - name: auction_quick_hire
        note: "Single tool for entire lifecycle — post, bid, accept, execute, confirm (AD-12)"
        parameters:
          - {name: description, type: string, required: true}
          - {name: robot_id, type: string, required: true}
          - {name: max_price_usd, type: number, required: false}
        returns: {type: AuctionResult, fields: [task_id, winning_bid_id, status]}
        errors: [INVALID_TASK_SPEC, ROBOT_NOT_FOUND, INSUFFICIENT_FUNDS]
      - name: auction_fund_wallet
        wraps: WalletLedger.credit
        parameters:
          - {name: robot_id, type: string, required: true}
          - {name: amount_usd, type: number, required: true}
        returns: {type: WalletBalance, fields: [robot_id, balance_usd]}
        errors: [ROBOT_NOT_FOUND, INVALID_AMOUNT]
      # [Entry 2] 5 previously unaccounted tools
      - name: get_bids
        wraps: AuctionEngine.get_bids
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: list, items: Bid}
        errors: [TASK_NOT_FOUND]
      - name: get_task
        wraps: AuctionEngine.get_task
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: Task}
        errors: [TASK_NOT_FOUND]
      - name: list_tasks
        wraps: AuctionEngine.list_tasks
        parameters:
          - {name: status, type: string, required: false}
        returns: {type: list, items: Task}
        errors: []
      - name: get_wallet_balance
        wraps: WalletLedger.balance
        parameters:
          - {name: robot_id, type: string, required: true}
        returns: {type: WalletBalance, fields: [robot_id, balance_usd]}
        errors: [ROBOT_NOT_FOUND]
      - name: deliver_task
        wraps: AuctionEngine.deliver
        triggers_state: "in_progress -> delivered"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: deliverable_url, type: string, required: false}
        returns: {type: Task, fields: [task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_NOT_IN_PROGRESS]
    planned:
      - name: plan_flight
        status: planned
        gap_reference: unknown:flight_planning_api
        description: "Convert boundary polygon + sensor + altitude + overlap into waypoints"
        parameters:
          - {name: boundary, type: "GeoJSON Polygon", required: true}
          - {name: sensor_id, type: string, required: true}
          - {name: altitude_agl_m, type: number, required: true}
          - {name: overlap_pct, type: number, required: true, default: 70}
        returns: {type: FlightPlan, fields: [waypoints, estimated_duration_min, estimated_coverage_km2]}
        errors: [INVALID_BOUNDARY, SENSOR_NOT_FOUND, ALTITUDE_OUT_OF_RANGE]
        sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]
      - name: validate_capture
        status: planned
        gap_reference: unknown:infield_qc
        description: "Check point density, coverage, GSD against task spec before declaring complete"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: capture_path, type: string, required: true}
        returns: {type: QCReport, fields: [pass, point_density_achieved, coverage_pct, gsd_cm, accuracy_estimate]}
        errors: [TASK_NOT_FOUND, CAPTURE_NOT_FOUND, QC_CHECK_FAILED]
        sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]
      - name: file_laanc
        status: identified
        description: "File LAANC authorization via Aloft/DroneUp API"
        parameters:
          - {name: boundary, type: "GeoJSON Polygon", required: true}
          - {name: max_altitude_agl_ft, type: number, required: true}
          - {name: date, type: string, required: true}
        returns: {type: LANCAuth, fields: [authorization_id, status, expires_at]}
        errors: [AIRSPACE_DENIED, INVALID_BOUNDARY, API_UNAVAILABLE]
        sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]

  settlement:
    interface:
      name: SettlementInterface
      methods: [settle, verify, batch_settle, refund]
      decisions: [decision:FD-1]
      # [Entry 2] Refund semantics
      refund_definition:
        signature: "refund(receipt: SettlementReceipt, reason: RefundReason, amount: Decimal) -> RefundReceipt"
        reasons: [buyer_timeout, delivery_failure, dispute_resolution, partial_quality_failure]
        refund_receipt_fields: [original_receipt_id, refund_amount, refund_reason, refund_tx_hash, timestamp]
        mode_constraints:
          immediate: "Refund processed immediately on Base"
          batched: "Refund queued in next DTN bundle — cannot claw back in-transit bundles"
          private: "Refund uses same shielded channel as original settlement"
      # [Entry 4] Hold for disputes
      hold_pending_dispute:
        signature: "hold(receipt: SettlementReceipt, dispute_id: str) -> HoldReceipt"
        description: "Freezes escrowed funds during dispute resolution"
    modes:
      - id: settlement:immediate_transparent
        timing: immediate
        privacy: transparent
        chain: base
        protocol: x402
        currency: usdc
        version_implemented: "v1.5"
        escrow_contract: component:escrow_contract
        commitment_hash: "H(request_id || salt)"
        decisions: [decision:FD-1, decision:FD-4, decision:TC-4]
      - id: settlement:immediate_private
        timing: immediate
        privacy: shielded
        chain: base_horizen_l3
        protocol: null
        currency: usdc
        version_implemented: null
        version_designed: "v3.0"
        notes: "Horizen L3 on Base — TEE-based compliant privacy, same EVM. Eval in v1.5 (feature:F-12)."
        decisions: [decision:FD-5]
      - id: settlement:batched_transparent
        timing: batched
        privacy: transparent
        chain: base
        protocol: dtn_settlement_bundle
        currency: usdc
        version_implemented: null
        version_designed: "v4.0"
        notes: "Lunar operations — settlement queued until comm window"
        decisions: [decision:LD-8]
      - id: settlement:batched_private
        timing: batched
        privacy: shielded
        chain: null
        version_implemented: null
        version_designed: "v3.0+"
        notes: "Convergence of lunar + privacy tracks"
    payment_split:
      on_acceptance_pct: 25
      on_delivery_pct: 75
      decisions: [decision:PD-4]
      canonical: true  # [Entry 5] marks this as the canonical location (vs pol:payment_split)
    privacy_constraints:
      - rule: "Robot wallet addresses NEVER in API responses"
        decisions: [decision:PP-2]
        enforced_at: api_layer
      - rule: "Commitment hash, never raw request_id, in on-chain memos"
        decisions: [decision:FD-4]
        enforced_at: settlement_layer
      - rule: "No new metadata fields on ERC-8004 entries"
        enforced_at: discovery_bridge
    sources: [{path: docs/FEATURE_REQUIREMENTS_v15.md}]

  execution_stack:
    sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]
    layers:
      # [Entry 2] Added layer_contract with inputs/outputs/passes_to
      - id: layer:0_regulatory
        name: "Regulatory Compliance"
        description: "LAANC, 811 notification, COA, PE oversight"
        automation_level: partial
        human_required: true
        gap_severity: low
        owner: operator
        layer_contract:
          inputs: [task_spec.regulatory_requirements, site_recon.airspace_class]
          outputs: [laanc_authorization, pe_oversight_assignment, safety_plan]
          passes_to: layer:1_site_access

      - id: layer:1_site_access
        name: "Site Access"
        description: "Physical transport to launch position, gate access, safety compliance"
        automation_level: none
        human_required: true
        gap_severity: medium
        owner: operator
        note: "LOW for on-site robots, HIGH for remote deployment"
        layer_contract:
          inputs: [laanc_authorization, site_recon.boundary_polygon, safety_plan]
          outputs: [robot_at_launch_position, site_conditions_confirmed]
          passes_to: layer:2_mission_planning

      - id: layer:2_mission_planning
        name: "Mission Planning"
        description: "Convert boundary + spec into flight plan / scan plan"
        automation_level: none
        human_required: true  # currently
        gap_severity: high
        planned_tool: plan_flight
        depends_on: [layer:1_site_access]
        inputs_from: [skill:rfp_to_site_recon, skill:rfp_to_robot_spec]
        layer_contract:
          inputs:
            - {field: boundary_polygon, from: skill:rfp_to_site_recon, format: "GeoJSON Polygon"}
            - {field: airspace_class, from: skill:rfp_to_site_recon}
            - {field: obstacles_within_1nm, from: skill:rfp_to_site_recon}
            - {field: sensor_requirements, from: skill:rfp_to_robot_spec}
            - {field: accuracy_required, from: skill:rfp_to_robot_spec}
          outputs: [flight_plan, scan_plan, estimated_duration]
          passes_to: layer:3_mission_execution

      - id: layer:3_mission_execution
        name: "Mission Execution"
        description: "Fly the plan, avoid obstacles, handle weather holds"
        automation_level: partial
        human_required: false
        gap_severity: medium
        depends_on: [layer:2_mission_planning]
        note: "Handled by robot firmware (DJI Pilot, Skydio autonomy, Spot API)"
        layer_contract:
          inputs: [flight_plan, weather_clearance]
          outputs: [raw_sensor_data, flight_log, coverage_report]
          passes_to: layer:4_infield_qc

      - id: layer:4_infield_qc
        name: "In-Field Quality Control"
        description: "Validate capture quality before declaring mission complete"
        automation_level: none
        human_required: true  # currently
        gap_severity: high
        planned_tool: validate_capture
        depends_on: [layer:3_mission_execution]
        checks:
          - {name: point_density_vs_spec, threshold_source: "task_spec.accuracy_required.point_density"}
          - {name: coverage_completeness, threshold: ">=95%"}
          - {name: gsd_achieved, threshold_source: "task_spec.accuracy_required.gsd_cm"}
          - {name: accuracy_estimate, threshold_source: "task_spec.accuracy_required.vertical_ft"}
        layer_contract:
          inputs: [raw_sensor_data, task_spec.accuracy_required]
          outputs: [qc_report, pass_fail_status]
          passes_to: layer:5_deliverable_generation

      - id: layer:5_deliverable_generation
        name: "Deliverable Generation"
        description: "Raw data -> processed outputs (DTM, ortho, contours, reports)"
        automation_level: partial
        human_required: true  # format conversion to agency standards
        gap_severity: medium
        depends_on: [layer:4_infield_qc]
        processing_models: [operator_processes, platform_saas, marketplace_task]
        layer_contract:
          inputs: [raw_sensor_data, qc_report, task_spec.deliverable_formats]
          outputs: [processed_deliverables, pe_review_package]
          passes_to: null  # terminal layer

    coverage_summary:
      skills_cover: "Layer 0 (identified, not executed) + Layer 2 inputs (boundary, constraints)"
      auction_covers: "Operator selection (right robot, certs, location)"
      missing: "Layer 2 (flight planning API), Layer 4 (in-field QC), Layer 5 (automated processing)"

  state_machines:
    task_lifecycle:
      initial_state: posted
      terminal_states: [settled, withdrawn, cancelled, failed]
      sources: [{path: docs/DECISIONS.md, section: "AD-8"}]
      # [Entry 2] Added re_pooled and expired states
      # [Entry 4] Added disputed state
      states:
        posted:
          transitions:
            - {to: bidding, trigger: first_bid_received}
            - {to: withdrawn, trigger: poster_withdraws}
            - {to: expired, trigger: deadline_reached}
        bidding:
          transitions:
            - {to: bid_accepted, trigger: poster_accepts_bid}
            - {to: withdrawn, trigger: poster_withdraws}
            - {to: expired, trigger: deadline_reached}
        bid_accepted:
          transitions:
            - {to: in_progress, trigger: operator_begins_work}
            - {to: re_pooled, trigger: operator_rejects}
            - {to: re_pooled, trigger: operator_timeout}
        re_pooled:
          description: "Task returns to bidding pool after operator rejection or timeout"
          transitions:
            - {to: bidding, trigger: re_opened}
            - {to: withdrawn, trigger: poster_withdraws}
        in_progress:
          transitions:
            - {to: delivered, trigger: operator_delivers}
            - {to: re_pooled, trigger: operator_abandons}
          timeout: {source: "task.sla_seconds", on_expire: abandon_and_repool}
        delivered:
          transitions:
            - {to: verified, trigger: poster_verifies}
            - {to: in_progress, trigger: poster_rejects, action: request_redelivery}
            - {to: disputed, trigger: operator_contests_rejection}
          timeout: {duration_seconds: 3600, on_expire: auto_accept, decisions: [decision:AD-7]}
        # [Entry 4] Disputed state with financial holds
        disputed:
          description: "Buyer rejected delivery and operator contests — funds held pending resolution"
          transitions:
            - {to: mediation, trigger: mediation_initiated}
            - {to: verified, trigger: dispute_resolved_for_operator}
            - {to: re_pooled, trigger: dispute_resolved_for_buyer}
          settlement_action: hold_pending_dispute
          routing:
            under_25k: fast_track
            over_25k: standard
        mediation:
          transitions:
            - {to: arbitration, trigger: mediation_failed}
            - {to: verified, trigger: mediation_resolved_for_operator}
            - {to: cancelled, trigger: mediation_resolved_for_buyer}
        arbitration:
          transitions:
            - {to: verified, trigger: arbitration_for_operator}
            - {to: cancelled, trigger: arbitration_for_buyer}
        verified:
          transitions: [{to: settled, trigger: settlement_complete}]
        settled: {transitions: []}
        withdrawn: {transitions: []}
        cancelled: {transitions: []}
        failed: {transitions: []}
        expired:
          description: "Task deadline reached without completion"
          transitions:
            - {to: cancelled, trigger: poster_cancels}
            - {to: bidding, trigger: poster_extends_deadline}

    award_confirmation:
      sources: [{path: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md}]
      # [Entry 2] Explicit join point to task_lifecycle
      joins_task_lifecycle_at: bid_accepted
      states:
        auction_complete:
          transitions: [{to: recommended, trigger: scoring_complete}]
        recommended:
          transitions:
            - {to: award_confirmed, trigger: buyer_confirms}
            - {to: award_rejected, trigger: buyer_rejects}
          timeout: {duration_hours: 72, reminder: true, expire_days: 7}
        award_rejected:
          transitions:
            - {to: recommended, trigger: next_bidder_promoted}
            - {to: re_pooled, trigger: all_bidders_exhausted}
          rejection_reasons: [conflict_of_interest, insufficient_insurance, dbe_shortfall, prohibited_vendor, prior_bad_experience, pls_not_licensed, debarment]
        award_confirmed:
          transitions: [{to: agreement_pending, trigger: subcontract_generated}]
        agreement_pending:
          transitions: [{to: awarded, trigger: both_parties_sign}]
        awarded:
          transitions: [{to: bid_accepted, trigger: work_authorized, note: "Joins task_lifecycle.bid_accepted"}]

    # [Entry 4] Payment flow state machine
    payment_lifecycle:
      sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]
      initial_state: escrow_funded
      terminal_states: [closed]
      states:
        escrow_funded:
          transitions: [{to: milestone_billed, trigger: operator_submits_invoice}]
        milestone_billed:
          transitions:
            - {to: milestone_approved, trigger: buyer_approves}
            - {to: milestone_billed, trigger: buyer_requests_revision}
        milestone_approved:
          transitions: [{to: payment_released, trigger: payment_processed}]
          prompt_payment_timer: true
        payment_released:
          transitions: [{to: retainage_held, trigger: retainage_withheld}]
        retainage_held:
          transitions: [{to: retainage_released, trigger: substantial_completion}]
        retainage_released:
          transitions: [{to: lien_waiver_exchanged, trigger: waiver_signed}]
        lien_waiver_exchanged:
          transitions: [{to: closed, trigger: closeout_complete}]
        closed: {transitions: []}

  skills:
    # [Entry 2] Expanded with references, validation_scripts, examples
    - id: skill:rfp_to_robot_spec
      status: implemented
      version: "1.0"
      description: "Extract task specification from an RFP document"
      inputs: [rfp_document]
      outputs:
        - sensor_requirements
        - accuracy_requirements
        - deliverable_formats
        - budget_ceiling_usd
        - regulatory_requirements
      references:
        - path: .claude/skills/rfp-to-robot-spec/michigan-standards.md
        - path: .claude/skills/rfp-to-robot-spec/aashto-federal-standards.md
        - path: .claude/skills/rfp-to-robot-spec/robot-sensor-mapping.md
      validation_scripts:
        - path: .claude/skills/rfp-to-robot-spec/validate_task_spec.py
      examples_directory: .claude/skills/rfp-to-robot-spec/examples/
      example_count: 7
      execution_stack_coverage: {layer_0: identifies_requirements, layer_2: provides_inputs}
      sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]

    - id: skill:rfp_to_site_recon
      status: implemented
      version: "1.0"
      description: "Generate execution context from RFP + public data sources"
      inputs: [rfp_document, skill:rfp_to_robot_spec.outputs]
      outputs:
        - boundary_polygon
        - airspace_class
        - obstacles
        - weather_norms
        - unknowns
        - pre_mobilization_checklist
      references:
        - path: .claude/skills/rfp-to-site-recon/public-data-sources.md
      validation_scripts:
        - path: .claude/skills/rfp-to-site-recon/validate_site_recon.py
      execution_stack_coverage: {layer_0: flags_constraints, layer_2: provides_inputs}
      staleness_policy: {max_age_days: 90, fields_affected: [airspace_class, obstacles, weather_norms]}
