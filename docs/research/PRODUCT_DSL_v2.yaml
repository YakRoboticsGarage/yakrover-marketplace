# ============================================================
# JOURNEYS — pipeline-stage model with actor handoffs
# [Entry 3] Added operator, agent, and controller journeys
# [Entry 3] Added implementation_status to stages
# [Entry 5] Normalized actor references to use component: prefix
# ============================================================
journeys:
  - id: journey:pre_bid_survey
    name: "Pre-Bid Survey (Happy Path)"
    persona: persona:marco
    phase: phase:v1.5
    implementation_status: partial
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]
    stages:
      - actor: persona:marco
        action: "Types natural language request to Claude"
        example: "I need topo and subsurface data for SR-89A widening, 12 acres, bid deadline Thursday"
        implementation_status: implemented
      - actor: persona:claude_agent
        action: "Parses request into 2 parallel task specs (aerial LiDAR + GPR)"
        tools: [skill:rfp_to_robot_spec, skill:rfp_to_site_recon]
        implementation_status: implemented
      - actor: component:auction_engine
        action: "Opens RFQ, collects bids (6 robots, 4 operators), filters on hard constraints"
        duration: "~2 hours"
        implementation_status: implemented
      - actor: persona:claude_agent
        action: "Runs automated checks (COI, PLS, Part 107, debarment) and presents recommended winners"
        implementation_status: partial
        note: "Debarment check not yet implemented"
      - actor: persona:marco
        action: "Reviews qualifications, confirms award"
        duration: "3 minutes"
        implementation_status: planned
      - actor: component:auction_engine
        action: "Generates subcontracts (ConsensusDocs 751), both operators countersign"
        implementation_status: planned
      - actor: equipment:dji_m350
        action: "SkyView flies corridor Wednesday AM — 2.5 hours, 4.2M pts/sec"
        implementation_status: planned
      - actor: equipment:spot
        action: "RedRock deploys Spot+GPR Wednesday PM — 3.5 hours"
        implementation_status: planned
      - actor: component:settlement
        action: "Settlement triggers: $3,600 total ($2,200 SkyView + $1,400 RedRock)"
        implementation_status: planned
      - actor: persona:marco
        action: "Imports LandXML into Civil 3D, completes earthwork takeoff in 4 hours, bids $14.2M"
        implementation_status: planned
    outcome: "Request to bid-ready data in ~3 days. Human crew: 10-12 days. Saved $4,900 (58%) + won the contract."
    failure_modes:
      - ref: journey:no_robots_available
      - ref: journey:weather_hold

  - id: journey:no_robots_available
    name: "No Robots Available (Journey B)"
    persona: persona:marco
    phase: phase:v1.5
    implementation_status: implemented
    outcome: "Immediate notification, zero charge, demand logged for heatmap"
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]

  - id: journey:weather_hold
    name: "Mid-Task Weather Hold (Journey C)"
    persona: persona:marco
    phase: phase:v1.5
    implementation_status: planned
    outcome: "System pauses, preserves 40% partial data, auto-resumes when NOAA clears, merges seamlessly"
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]

  - id: journey:reject_recovery
    name: "Award Rejection and Recovery"
    persona: persona:marco
    phase: phase:v2.0
    implementation_status: broken
    known_issues:
      - {ref: docs/feedback/FEEDBACK_REJECT_DEAD_END.md, description: "Reject button leads to dead-end in current demo"}
    stages:
      - actor: persona:marco
        action: "Rejects recommended winner (reason: conflict, bad experience, DBE shortfall, etc.)"
        implementation_status: implemented
      - actor: component:auction_engine
        action: "Walks ranked list to next bidder; runs same automated checks"
        implementation_status: broken
      - actor: persona:marco
        action: "Reviews next candidate, confirms or rejects again"
        implementation_status: planned
      - actor: component:auction_engine
        action: "If all bidders exhausted: offer re-post, skip, or withdraw"
        implementation_status: planned
    sources: [{path: docs/research/RESEARCH_REJECT_RECOVERY_FLOW.md}]

  # [Entry 3] New journey: Operator onboarding
  - id: journey:operator_onboarding
    name: "Operator Onboarding (Alex)"
    persona: persona:alex
    phase: phase:v2.0
    implementation_status: partial
    sources: [{path: docs/research/RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md}]
    stages:
      - actor: persona:alex
        action: "Discovers marketplace via industry forum or referral"
        implementation_status: not_applicable
      - actor: persona:alex
        action: "Views 'Become a Survey Operator' page with 3 equipment tiers"
        demo_screen: s-operator
        implementation_status: implemented
      - actor: persona:alex
        action: "Registers firm, uploads Part 107, OSHA cert, insurance COI"
        implementation_status: planned
      - actor: component:auction_engine
        action: "Verifies Part 107 against FAA database, parses ACORD 25, checks PLS"
        implementation_status: planned
      - actor: persona:alex
        action: "Registers robot(s) with ERC-8004 identity, sets pricing and availability"
        implementation_status: planned
      - actor: persona:alex
        action: "Views demand heatmap showing unserved task locations near their geo"
        implementation_status: planned
      - actor: component:auction_engine
        action: "First task match — Alex receives bid opportunity notification"
        implementation_status: planned
      - actor: persona:alex
        action: "Reviews task, submits bid (manual or auto-bid), wins, completes, gets paid"
        implementation_status: planned
    outcome: "First $2,200 earned within a week. Marketplace solves client acquisition."

  # [Entry 3] New journey: Agent onboarding
  - id: journey:agent_onboarding
    name: "Agent Connection (Claude/GPT)"
    persona: persona:claude_agent
    phase: phase:v1.5
    implementation_status: partial
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]
    stages:
      - actor: persona:controller
        action: "Navigates to Agent Link screen, selects AI provider (Claude, GPT, etc.)"
        demo_screen: s-agentlink
        implementation_status: implemented
      - actor: persona:controller
        action: "Generates API key, copies MCP configuration snippet"
        implementation_status: planned
      - actor: persona:claude_agent
        action: "Connects via MCP, runs tool verification (post_task, get_bids, etc.)"
        implementation_status: planned
      - actor: persona:controller
        action: "Sets spending limits, auto-approve threshold, task type restrictions"
        implementation_status: planned
    outcome: "Agent connected and authorized with appropriate financial guardrails."

  # [Entry 3] New journey: Controller setup
  - id: journey:controller_setup
    name: "Company Account Setup (Controller)"
    persona: persona:controller
    phase: phase:v1.5
    implementation_status: planned
    stages:
      - actor: persona:controller
        action: "Creates company account, selects payment method (Stripe or USDC)"
        implementation_status: planned
      - actor: persona:controller
        action: "Uploads payment bond certificate for bonded projects"
        demo_screen: s-pay
        implementation_status: implemented
      - actor: persona:controller
        action: "Sets insurance defaults (minimum CGL, E&O, drone liability per project type)"
        implementation_status: planned
      - actor: persona:controller
        action: "Connects AI assistant via Agent Link flow"
        implementation_status: planned
      - actor: persona:controller
        action: "Invites team members (estimators like Marco) with role-based permissions"
        implementation_status: planned
    outcome: "Company ready to post tasks with financial controls and compliance defaults."

  # [Entry 3] New journey: Recurring task
  - id: journey:recurring_task
    name: "Recurring Progress Monitoring"
    persona: persona:marco
    phase: phase:v2.0
    implementation_status: planned
    stages:
      - actor: persona:marco
        action: "Completes first survey, marks project as recurring (monthly progress monitoring)"
      - actor: persona:claude_agent
        action: "Auto-schedules next 14 flights over 24-month project lifecycle"
      - actor: component:auction_engine
        action: "Sends repeat RFQ to same operator with loyalty pricing, or re-opens if unavailable"
      - actor: persona:marco
        action: "Reviews monthly progress diff — cut/fill vs. design"
    outcome: "Retention mechanism: one project becomes 14 flights over 2 years."

