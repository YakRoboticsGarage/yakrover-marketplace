- id: IMP-037
  title: Add authorizationState nonce freshness check to relay endpoint
  description: 'Before submitting transferWithAuthorization on-chain, call usdc.authorizationState(owner, nonce)
    for each nonce (operator and platform). If true, the nonce was already consumed — return HTTP 409
    with a clear error asking the buyer to re-sign with fresh nonces. This prevents confusing on-chain
    revert errors from duplicate submission attempts (e.g., buyer double-clicked Pay, or the form was
    re-submitted after a network error). Two read calls before submission, no extra gas.'
