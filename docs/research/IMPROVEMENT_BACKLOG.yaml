- id: IMP-089
  title: Operator session identity — persistent state tied to authenticated operator
  description: >
    Operators currently interact with the marketplace statelessly — no concept of "my bids",
    "my earnings", or "my fleet" across sessions. With SQLite persistence (IMP-038), the
    marketplace stores auction data but cannot attribute it to a returning operator. Needed:
    (1) Operator identity binding — use one of: API key (simplest), wallet address (already
    on-chain via ERC-8004), or Stripe Connect account ID (already required for payouts via
    IMP-064). Stripe Connect ID is the pragmatic choice — operators already have one after
    onboarding. (2) Session-aware MCP tools — auction_my_bids(operator_id), auction_my_earnings
    (operator_id), auction_my_fleet(operator_id). These query SQLite filtered by operator.
    (3) Authentication at MCP layer — bearer token or OAuth flow so the MCP server knows
    which operator is calling. Current MCP server has MCP_BEARER_TOKEN but it is a single
    shared token, not per-operator. Considerations: per-operator tokens add complexity
    (token issuance, storage, rotation). Alternative: operator passes their robot_id or
    operator_id as a parameter and the system trusts it (acceptable for demo, not for
    production). For production: OAuth via Stripe Connect or wallet-based auth (EIP-4361
    Sign-In with Ethereum). Depends on IMP-064 (stripe_account_id on OperatorProfile)
    and IMP-038 (SQLite persistence).
