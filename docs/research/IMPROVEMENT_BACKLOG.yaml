- id: IMP-097
  title: verify_commitment() in core.py is defined but never called — add tests or remove
  description: >
    `verify_commitment(request_id, salt, commitment_hash)` at core.py:109 implements FD-4's
    constant-time commitment hash comparison (hmac.compare_digest). It is defined but has zero
    callers across the entire codebase (auction/, worker/, mcp_server.py). Because it is a
    security-sensitive function — constant-time comparison prevents timing-oracle attacks on
    commitment hashes — its absence from the test suite means no regression coverage. Either:
    (a) add a unit test in test_core.py that exercises both the happy path and a tampered hash,
    or (b) mark it with a comment referencing the FD-4 settlement path that will call it (v1.5)
    to make the intent explicit. Do not remove it silently — the constant-time guarantee is
    load-bearing for FD-4.
