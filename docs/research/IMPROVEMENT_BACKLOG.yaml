- id: IMP-036
  title: Add cancelAuthorization to task cancellation flow
  description: 'When a buyer cancels a task that has already had EIP-3009 payment authorizations signed
    (but the relay has not yet submitted them), call usdc.cancelAuthorization(owner, nonce, v, r, s)
    for each stored nonce to invalidate the buyer signed transfers on-chain. Store operator_nonce and
    platform_nonce in the KV commitment record alongside the signatures. Wire into the task cancel endpoint
    so cancellation of a committed-but-unexecuted task automatically revokes the payment authorization.
    This prevents accidental relay submission after task cancellation and gives the buyer clean funds recovery.'
  module: M18_x402
  research_source: R-035
