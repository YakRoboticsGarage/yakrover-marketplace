- id: IMP-030
  title: Remove relay_address from API success response in production
  description: 'The handleRelayUsdc success response includes relay_address: relayWallet.address
    (chatbot/src/index.js line 1717). This exposes the relay hot wallet address in every
    successful payment response, making it trivially discoverable by adversaries who can then
    monitor the ETH balance and time DoS attacks. Remove relay_address from the production
    response body. It may be retained in logs. If needed for debugging, gate it behind an admin
    flag or include only in development/testnet responses.'
