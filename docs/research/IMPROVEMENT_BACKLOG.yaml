  - id: IMP-008
    title: "Extract _calculate_reservation() helper in engine.py"
    description: >-
      The 25% reservation calculation `(price * Decimal("0.25")).quantize(Decimal("0.01"))`
      appears 7 times in auction/engine.py (lines 405, 764, 847, 1051, 1107, 1147, 1201).
      Extract as a private method `_calculate_reservation(price: Decimal) -> Decimal`.
      Reduces duplication, centralizes the rounding rule, and makes the 25% constant
      easy to find and change. No behavior change — pure refactor.
    module: M5_auction_engine
    research_source: "code-review"
    evidence: "auction/engine.py:405,764,847,1051,1107,1147,1201 — 7 identical reservation calculations"
    effort: small
    priority: null
