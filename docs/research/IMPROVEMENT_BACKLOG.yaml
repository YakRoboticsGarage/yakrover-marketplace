- id: IMP-029
  title: Add relay wallet gas balance monitoring via Cloudflare Cron Trigger
  description: 'Add a Cron Trigger to wrangler.toml (e.g., "*/15 * * * *") that runs every 15
    minutes, reads the ETH balance of the relay wallet (0x4b5974229f96ac5987d6e31065d73d6fd8e130d9)
