- id: IMP-093
  title: Replace silent-None optional-import fallback in engine.py with explicit ImportError
  description: >
    engine.py lines 54-76 use a pattern where optional dependencies (WalletLedger,
    ReputationTracker, SyncTaskStore, StripeService, qa_check) are assigned `None` with
    `# type: ignore` comments inside bare `except ImportError` blocks. If a required
    dependency is absent at startup, every call to a method that relies on it raises an
    AttributeError on None at runtime instead of failing fast at import time with a clear
    message. The pattern also defeats static analysis: mypy cannot verify call sites against
    None. Fix: make all required dependencies explicit imports (let ImportError propagate);
    move genuinely optional dependencies to a clearly documented optional extras group and
    guard their use with `if dep is None: raise RuntimeError("install extras[x]")` at the
    call site, not the module level.
  module: M02_engine
  research_source: daily-audit-2026-04-18
  evidence: 'auction/engine.py:54-76 — 6 variables assigned None with type:ignore; AttributeError risk on missing optional extras'
  effort: medium
