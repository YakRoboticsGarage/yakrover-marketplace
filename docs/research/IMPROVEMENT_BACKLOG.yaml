  - id: IMP-015
    title: "Fix 143 mypy type errors to make type-check CI blocking"
    description: >-
      Mypy currently finds 143 errors across 14 files. Most common: 37 no-any-return
      (loosely typed dict returns), 16 union-attr (optional fields accessed without
      None checks), 7 attr-defined (dynamically attached attributes on AuctionEngine).
      Fix by: adding return type annotations to MCP tool handlers, narrowing Optional
      types with guards before access, typing engine attributes properly. Currently
      CI runs mypy with continue-on-error. Goal: make it blocking.
    module: system
    research_source: "code-review"
    evidence: "CI type-check job — 143 errors in 14 files"
    effort: large
    priority: high
    status: implemented
    proposed_date: "2026-04-03"
    decision_date: "2026-04-03"
    decision_notes: "All 143 errors fixed. TYPE_CHECKING imports, TaskRecord.winner property, typed helpers, targeted type: ignore for dynamic patterns. Mypy CI is now blocking."

