    minutes, reads the ETH balance of the relay wallet (0x4b5974229f96ac5987d6e31065d73d6fd8e130d9)
    on each active chain, and writes the result to RATE_LIMIT_KV under key "health:relay_wallet".
    Alert if balance drops below threshold: 0.01 ETH on Base mainnet, 0.05 ETH on Ethereum
    mainnet. A depleted relay wallet causes all USDC payments to silently fail — this is
    a single-point-of-failure for the payment path at construction-scale task values.'
