  - id: IMP-009
    title: "Strip historical version comments from engine.py"
    description: >-
      auction/engine.py contains 44 inline version markers (v0.1, v0.5, v1.0, v1.1)
      that tracked feature additions during incremental development. These comments
      describe when code was added, not why — the git log preserves that history more
      accurately. Strip comments of the form `# v0.x:` and `# v1.x:` that precede
      code blocks, keeping only substantive design rationale comments (e.g. AD-X
      references, security notes). Reduces noise for new developers trying to understand
      the engine's current logic.
    module: M5_auction_engine
    research_source: "code-review"
    evidence: "auction/engine.py — grep 'v0\\.|v1\\.' returns 44 matches"
    effort: small
    priority: null
    status: proposed
    proposed_date: "2026-04-03"
    decision_date: null
    decision_notes: null

  - id: IMP-010
    title: "Split engine.py (1,442 lines) into focused sub-modules"
    description: >-
      auction/engine.py has grown to 1,442 lines containing three distinct concerns:
      (1) state machine + task lifecycle (post_task, accept_bid, execute: ~600 lines),
      (2) payment + settlement logic (reservation, delivery_payment, Stripe transfer:
      ~350 lines), and (3) query/reporting methods (get_task_status, list_tasks,
      review_bids: ~300 lines). Proposed split: engine.py keeps the AuctionEngine class
      and state machine; engine_payment.py extracts the payment helpers; or alternatively
      a mixin approach. Any split must preserve the existing public API — all 35 MCP
      tools and all 264 tests must pass unchanged. Evaluate whether the added indirection
      is worth the navigation improvement before committing.
    module: M5_auction_engine
    research_source: "code-review"
    evidence: "auction/engine.py:1442 lines — post_task L516-636 (120 lines), confirm_delivery L904-1023 (120 lines)"
