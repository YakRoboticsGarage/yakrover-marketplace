- id: IMP-071
  title: Evaluate x402 + Cloudflare Workers for agent-to-robot payment
  description: >
    Coinbase's x402 protocol uses HTTP 402 Payment Required for pay-per-request
    stablecoin payments. Cloudflare Workers now has native x402 support via the
    Agents SDK. The x402 Foundation (Coinbase + Cloudflare) launched April 2026.
    119M+ transactions on Base, $600M annualized volume, zero protocol fees.
    Evaluate whether x402 could replace or complement our current settlement
    flow for robot task payments — particularly for agent-initiated micropayments
    where Stripe's minimum doesn't apply. Key question: x402 is pay-per-request
    (no escrow), but our flow needs hold-and-release. Could x402 handle the
    payment initiation while Stripe Connect or smart contract handles escrow?
    Related: R-053 (Stripe MPP analysis), AD-27 (settlement interface is protocol).
    Sources: https://x.com/0xyoussea/status/2042286187956879447,
    https://docs.cdp.coinbase.com/x402/welcome,
