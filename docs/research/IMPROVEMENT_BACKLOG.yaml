- id: IMP-082
  title: check_hard_constraints() ignores certifications_required — operators without PLS can win PLS-required tasks
  description: >
    auction/core.py check_hard_constraints() (line 473) filters on sensors, indoor_capable,
    battery, and distance_meters only. The certifications_required field in task specs
    (e.g. certifications_required: ["licensed_surveyor"]) is never checked. An operator
    without a PLS license can win — and be paid for — a task that legally requires a
    licensed surveyor stamp. This is a production-blocking safety gap independently
    documented in PRODUCT_MODULE_MAP.md (M36 gap table) and related to IMP-079
    (pls_required flag on task schema) — but the bidding gate itself is missing.
