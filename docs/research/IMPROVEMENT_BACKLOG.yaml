- id: IMP-099
  title: "Hold operator ACH transfer until delivery confirmation, not immediately on payment_intent.succeeded"
  description: >
    worker/src/index.js handleTransferToOperator (line 1373) fires the Stripe Transfer to the
    operator Connect account immediately when PaymentIntent status == "succeeded". But ACH disputes
    (R10 unauthorized — 60-day window; R29 corporate unauthorized — 2-business-day window) can
    reverse the debit AFTER "succeeded". If the operator has already been paid, the platform absorbs
    the full task value. Fix: in the ACH settlement flow, hold the Transfer until (a) delivery record
    is confirmed in KV (auction delivery accepted) — preferred, aligns with commit-on-hire model —
    OR (b) if delivery is not tracked, impose a minimum 3-business-day hold after "succeeded" to
    absorb the R29 window. For consumer accounts (R10, 60-day window), delivery confirmation remains
    the safeguard. Add a KV entry `ach_hold:{piId}` to track hold state; existing ACH lifecycle
    webhook updates the KV when "succeeded"; the transfer step fires only when hold_until <= now
    AND delivery status is "accepted".
  module: M15_stripe_service
  research_source: R-042
  evidence: docs/research/automated/R-042_ach_payment_fraud_risk_controls.md
  effort: medium
  priority: high
  status: proposed
  proposed_date: '2026-04-21'
  decision_date: null
  decision_notes: null

- id: IMP-100
  title: "First-payment ACH cap: $2,500 maximum for buyers with no prior ACH history"
  description: >
    67% of ACH fraud is linked to payments to newly added payees (Oscilar 2026). For YAK, a
    first-time buyer placing a $10K ACH task is the highest-risk transaction pattern. Add a
    check in handleCreateAchIntent (worker/src/index.js line ~1277): query RATE_LIMIT_KV for
    any existing `ach:pi_*` entries associated with this buyer session/email. If none are found
    (first-time ACH buyer), cap amount_cents at 250000 ($2,500) and return a 400 with a message
    directing them to use Card for higher amounts or come back after completing one smaller ACH
    payment successfully. After a successful ACH payment completes (payment_intent.succeeded
    webhook), increment a KV counter `ach_trust:{buyer_hash}`. Cap lifts automatically after 1
    successful prior payment.
