- id: IMP-009
  title: Strip historical version comments from engine.py
  description: auction/engine.py contains 44 inline version markers (v0.1, v0.5, v1.0, v1.1) that tracked feature additions
    during incremental development. These comments describe when code was added, not why — the git log preserves that history
    more accurately. Strip comments of the form `# v0.x:` and `# v1.x:` that precede code blocks, keeping only substantive
    design rationale comments (e.g. AD-X references, security notes). Reduces noise for new developers trying to understand
    the engine's current logic.
