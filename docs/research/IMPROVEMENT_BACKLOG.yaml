- id: IMP-102
  title: "Use Financial Connections balance data to block ACH when account balance < task amount"
  description: >
    worker/src/index.js handleCreateAchIntent already requests financial_connections.permissions
    balances (line 1283). After the buyer completes the Stripe Financial Connections flow, the
    frontend receives the payment method with balance data attached. Add a client-side check in
    the demo/marketplace UI: after Financial Connections resolves, check
    payment_method.us_bank_account.financial_connections_account.balance.available.usd against
    the task amount_cents. If insufficient, surface: "Your account balance appears insufficient
