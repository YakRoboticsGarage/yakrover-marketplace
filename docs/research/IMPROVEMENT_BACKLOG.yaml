- id: IMP-001
  title: Integrate external PLS license verification API (Checkr or MeshVerify)
  description: 'Add a check_pls_license() function to compliance.py following the existing check_sam_exclusion() pattern.
    When PLS_VERIFY_API_KEY is set, call Checkr or MeshVerify to verify active status, good standing, and name match. Without
    a key, return WARN indicating manual review needed. Trigger from upload_document() when doc_type == "pls_license".

    '
  module: M36_pls_review
  research_source: R-006
  evidence: docs/research/automated/R-006_pls_board_apis.md
  effort: medium
  priority: low
  status: deferred
  proposed_date: '2026-04-01'
  decision_date: '2026-04-05'
  decision_notes: Deferred to v2.0+. PLS individual license verification is the wrong problem — should verify the operator
    as a business/individual instead. PLS stamp is the operator responsibility, covered by their E&O insurance. Platform verifies
    the entity, not the specific credential. See R-027.
