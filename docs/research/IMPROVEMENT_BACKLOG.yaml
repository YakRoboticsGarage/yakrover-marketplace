- id: IMP-010
  title: Split engine.py (1,442 lines) into focused sub-modules
  description: 'auction/engine.py has grown to 1,442 lines containing three distinct concerns: (1) state machine + task lifecycle
    (post_task, accept_bid, execute: ~600 lines), (2) payment + settlement logic (reservation, delivery_payment, Stripe transfer:
    ~350 lines), and (3) query/reporting methods (get_task_status, list_tasks, review_bids: ~300 lines). Proposed split: engine.py
    keeps the AuctionEngine class and state machine; engine_payment.py extracts the payment helpers; or alternatively a mixin
    approach. Any split must preserve the existing public API — all 35 MCP tools and all 264 tests must pass unchanged. Evaluate
    whether the added indirection is worth the navigation improvement before committing.'
  module: M5_auction_engine
  research_source: code-review
  evidence: auction/engine.py:1442 lines — post_task L516-636 (120 lines), confirm_delivery L904-1023 (120 lines)
  effort: large
  priority: low
  status: rejected
  proposed_date: '2026-04-03'
  decision_date: '2026-04-03'
  decision_notes: Risk outweighs reward. 1,464 lines is manageable. Splitting risks breaking state machine atomicity. Payment
    logic must stay adjacent to state transitions.
- id: IMP-011
  title: 'Split store.py: separate async and sync implementations'
  description: 'auction/store.py (779 lines) contains two complete storage implementations: AsyncTaskStore (aiosqlite, lines
    88-600) and SyncTaskStore (sqlite3, lines 603-779). The sync implementation is what the production engine uses; the async
    version exists for forward compatibility. Splitting into store_async.py and store_sync.py would make each file ~400 lines,
    with shared helpers (_json_serializer, _json_object_hook, _dumps, _loads, _row_to_task_dict) in store_shared.py or inlined.
    Import alias in store.py can preserve existing import paths.'
  module: M22_sqlite_store
  research_source: code-review
  evidence: auction/store.py:779 lines — AsyncTaskStore L88-600, SyncTaskStore L603-779
  effort: medium
  priority: null
  status: deferred
  proposed_date: '2026-04-03'
  decision_date: '2026-04-03'
  decision_notes: Async store not used in production. Splitting creates 3 files for no user-facing gain. Revisit in v2.0 if
