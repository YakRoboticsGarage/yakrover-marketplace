- id: IMP-004
  title: Deliverable QA system — 4-level buyer-configurable quality checks
  description: 'Implemented as auction/deliverable_qa.py with 4 levels: Level 0 (none, buyer trusts vendor), Level 1 (basic:
    data exists, fields, plausibility), Level 2 (standards: CRS, ASPRS accuracy, USGS density), Level 3 (PLS stamp required).
    Buyer sets qa_level in task spec or defaults by category. LAS-specific laspy checks available as Level 2 enhancement when
    LAS files are delivered.

    '
  module: M35_deliverable_qa
  research_source: R-009
  evidence: docs/research/automated/R-009_las_laz_point_cloud_validation.md
  effort: medium
  priority: high
  status: implemented
  proposed_date: '2026-04-02'
  decision_date: '2026-04-03'
  decision_notes: Implemented in auction/deliverable_qa.py. 26 tests. Broader than original — 4-level system covering simple
    sensor tasks through PLS-stamped surveys.
- id: IMP-005
  title: Add PDAL-based point density check for QL-gated tasks
  description: 'For tasks specifying usgs_quality_level in hard constraints, run a PDAL hexbin density check at delivery time
    using filters.hexbin. Verify >=2 pts/m2 for QL2, >=8 pts/m2 for QL1. Return FAIL if density is below threshold. Can run
    async post-delivery with a configurable timeout window before payment settlement. Install via conda-forge python-pdal;
    consider subprocess pdal CLI as fallback for environments where conda is unavailable.

    '
