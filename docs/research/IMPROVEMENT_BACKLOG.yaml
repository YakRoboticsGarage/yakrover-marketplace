- id: IMP-139
  title: "Prototype disjunctive graph + LLM task decomposition for compound survey tasks (v2.0)"
  description: >
    R-051 (IMR-LLM, ICRA 2026) demonstrated that LLMs fail at direct multi-robot scheduling
    for >3 robots (conflicts, deadlocks) but succeed at formalizing the task as a disjunctive
    graph, which a deterministic FIFO solver then schedules. For YAK v2.0 compound tasks
    (aerial LiDAR + GPR + progress monitoring on a single project), this pattern replaces
    direct score_bids() calls with a graph-based scheduler. Investigation item: prototype the
    LLM decomposition step for a 3-operation compound task using the existing rfp_processor.py
    as the first stage. Output: operation set (type, area, equipment, precedence) → disjunctive
    graph → feasible schedule → separate auction per operation. This is architectural R&D, not
    a v1.x feature.
