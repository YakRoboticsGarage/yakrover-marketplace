    controls (instant verification, first-payment cap IMP-100, hold period IMP-099), false-pretenses
    mitigations, escalation procedure when unauthorized returns approach 0.5%, and annual review date.
    This is a documentation task. The technical controls (IMP-099, IMP-100) are companions but the
    policy doc is the compliance deliverable.
