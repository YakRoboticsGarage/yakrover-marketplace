- id: IMP-135
  title: "sed -i '' in deploy-site.sh fails on Linux/CI"
  description: >
    scripts/deploy-site.sh uses `sed -i '' "s|__BUILD_TIMESTAMP__|...|"` to substitute
    a build timestamp placeholder in the staged output. On macOS (BSD sed), `sed -i ''`
    means in-place edit with no backup suffix. On GNU sed (Linux, CI ubuntu-latest),
    `sed -i ''` fails: "sed: option requires an argument -- 'i'". This is the same bug
    flagged as D13 in docs/archive/review/REVIEW_SYNTHESIS.md for the old deploy-demo.sh
    — it was not fixed before the pattern was re-authored into the replacement script.

    The code path is guarded by `if grep -q "__BUILD_TIMESTAMP__" ...` so it only fires
    when the placeholder is present in an index.html. No current demo site uses this
    placeholder, making the bug latent. But __BUILD_TIMESTAMP__ is a documented feature
    of the script (described in comments), so any operator who adds it will hit a silent
    CI failure. No CI job tests the deploy scripts at all.

    Fix: replace `sed -i ''` with `sed -i` on Linux, or use cross-platform Python one-liner.
    Add a CI step that calls deploy-site.sh with a stub index.html containing the placeholder.
  module: scripts/deploy-site.sh
  research_source: Daily code audit (2026-04-29)
  evidence: >
    scripts/deploy-site.sh: `sed -i '' "s|__BUILD_TIMESTAMP__|...|g"`.
    docs/archive/review/REVIEW_SYNTHESIS.md item D13: identical bug in removed deploy-demo.sh.
    .github/workflows/test.yml: no job exercises deploy scripts.
    CI runs ubuntu-latest (GNU sed). Current demo index.html files have no placeholder.
  effort: low
  priority: medium
  status: proposed
  proposed_date: '2026-04-29'
  decision_date: null
  decision_notes: null
