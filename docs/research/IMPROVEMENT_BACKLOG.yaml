- id: IMP-050
  title: auction_eas_attest ignores chain_id parameter when building the on-chain transaction
  description: >
    auction_eas_attest (auction/mcp_tools.py line 1481) accepts a chain_id parameter
    but hardcodes both the RPC provider ("https://sepolia.base.org") and the transaction
    chainId (84532) regardless of what the caller passes. If chain_id=8453 (Base mainnet)
    is supplied, the attestation payload encodes "mainnet" but the transaction is submitted
    to Sepolia, silently minting a misleading attestation on the wrong network.
    The fix is to route through CHAIN_CONFIG (already defined at line 1089) exactly as
    auction_register_robot_onchain does: look up the chain entry, use its rpc_url and
    chain_id for the Web3 provider and transaction dict. EAS_ADDRESS is the same on both
    chains so no address switch is needed. Also consider moving EAS_ADDRESS, EAS_SCHEMA_UID,
    and EAS_ABI out of register_auction_tools() scope into module constants (complements IMP-049).
  module: M24_mcp_tool_layer
  research_source: code-audit-2026-04-11
  evidence: 'auction/mcp_tools.py line 1509: w3 = Web3(HTTPProvider("https://sepolia.base.org")) — hardcoded; line 1533: "chainId": 84532 — hardcoded; CHAIN_CONFIG at line 1089 already maps 84532 and 8453'
  effort: small
  priority: medium
  status: implemented
  proposed_date: '2026-04-11'
