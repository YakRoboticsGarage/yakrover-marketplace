- id: IMP-031
  title: Add deadline floor validation to handleRelayUsdc (match commit-on-hire minimum)
  description: 'The direct relay endpoint (handleRelayUsdc, chatbot/src/index.js ~line 1685)
    does not enforce a minimum deadline margin — it accepts any future timestamp including
    one that expires in seconds. The commit-on-hire flow (handleCommitPayment, line 1787)
    correctly requires deadline >= now + 300 (5 minutes). Apply the same minDeadline check
    to handleRelayUsdc: reject if deadline < now + 300 with a clear error message. This
    prevents race conditions where a valid permit expires between server receipt and on-chain
    inclusion, wasting relay gas and confusing the buyer.'
