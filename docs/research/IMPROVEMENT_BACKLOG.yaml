- id: IMP-035
  title: Implement EIP-3009 relay endpoint with Multicall3 batch submission
  description: 'Replace the handleRelayUsdc and handleExecutePayment functions in chatbot/src/index.js
    with an EIP-3009 transferWithAuthorization implementation. Buyer signs two TransferWithAuthorization
    EIP-712 messages (one for 88% to operator, one for 12% to platform). Relay submits both via
    Multicall3 aggregate3 at 0xcA11bde05977b3631167028862bE2a173976CA11 with allowFailure=false for
    atomic split. USDC domain: name="USD Coin", version="2". Nonces must be random bytes32 values.
    Remove ERC-2612 ABI fields (permit, nonces, DOMAIN_SEPARATOR) and add EIP-3009 fields
    (transferWithAuthorization, receiveWithAuthorization, authorizationState, cancelAuthorization).
    API body changes: replace {deadline, v, r, s} with {valid_before, operator_nonce, platform_nonce,
    v1, r1, s1, v2, r2, s2, operator_amount, platform_amount}. See R-035 Findings 2-4 for exact ABI strings and code.'
  module: M18_x402
  research_source: R-035
  evidence: docs/research/automated/R-035_eip3009_transferwithauthorization_guide.md
  effort: medium
