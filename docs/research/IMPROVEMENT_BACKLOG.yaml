- id: IMP-026
  title: Use timing-safe comparison for admin key check in Cloudflare Worker
  description: 'chatbot/src/index.js line 607 compares the admin bypass key using plain
    string equality: adminKey === env.ADMIN_KEY. This is technically vulnerable to timing
    attacks. The admin key only bypasses demo rate limiting (not payments or data access),
    so exploitability is very low. However, the fix is one line: replace with
    crypto.subtle.timingSafeEqual() using TextEncoder. Workers runtime supports SubtleCrypto.
    Pattern: const a = new TextEncoder().encode(adminKey); const b = new TextEncoder().encode(env.ADMIN_KEY);
    crypto.subtle.timingSafeEqual(a, b) — wrap in try/catch for length mismatch.
    Low priority but a clean habit for any secret comparison.'
  module: M39_permit_relay
  research_source: code-review
  evidence: chatbot/src/index.js:607 — plain string equality on secret comparison
  effort: small
  priority: low
  status: implemented
  proposed_date: '2026-04-05'
  decision_date: null
  decision_notes: null
- id: IMP-027
  title: Migrate permit relay to EIP-3009 transferWithAuthorization
  description: 'Replace the three-transaction permit+transferFrom pattern in handleRelayUsdc and handleExecutePayment
    with two transferWithAuthorization calls (88% to operator, 12% to platform). EIP-3009
    eliminates the MEV allowance window: no on-chain allowance is created, each transfer is
    atomic, and nonces are random (not sequential) so concurrent transactions are safe. Circle
    USDC on Base already implements transferWithAuthorization. Frontend change: buyer signs two
    EIP-712 messages (or one, if relay aggregates via multicall). This is the structural fix for
    the non-atomicity risk identified in R-034. The permit+transferFrom pattern is still usable
    as a fallback for tokens that do not implement EIP-3009.'
  module: M18_x402
  research_source: R-034
  evidence: docs/research/automated/R-034_erc2612_permit_relay_security.md
  effort: medium
  priority: high
  status: implemented
  proposed_date: '2026-04-06'
  decision_date: '2026-04-07'
  decision_notes: Partially implemented in commit a58560f "IMP-027: EIP-3009 transferWithAuthorization (preferred, permit fallback)". EIP-3009 is now preferred path; ERC-2612 permit retained as fallback. Full rewrite (drop fallback, add Multicall3 batch) tracked as IMP-035. Status corrected by R-META-001 (2026-04-09).
- id: IMP-028
  title: Add server-side permit signature pre-verification before on-chain submission
  description: 'Before calling usdc.permit() on-chain, verify the buyer''s signature server-side
    using ethers.verifyTypedData(domain, types, value, {v,r,s}) and confirm the recovered
    address matches owner. If mismatch, reject with 400 before spending any relay wallet gas.
    Domain should be constructed from: name=USDC, version=2, chainId=chain_id, verifyingContract=usdcAddr.
    Add to both handleRelayUsdc (direct) and handleExecutePayment (commit-on-hire). This prevents
    gas waste on malformed submissions and provides cleaner error messages.'
