- id: IMP-118
  title: "Add dot_state field to task spec and route DOT-specific density thresholds in Level 2 QA"
  description: >
    ODOT (Ohio) requires ≥40 pts/m² and TxDOT (Texas) requires ≥25 pts/m² for airborne LiDAR — neither
    is enforced by the current Level 2 QA engine, which uses only USGS QL thresholds (QL0=20, QL1=8,
    QL2=2, QL3=0.5). Add an optional dot_state field to capability_requirements. In _check_level_2
    (deliverable_qa.py), if dot_state is set, look up a state-specific density override table before
    falling back to USGS QL. Initial table: {OH: 40, TX: 25, MI: None (NCHRP 748 Category 1A, no fixed
    pts/m² threshold)}. Caltrans and MDOT do not publish a fixed pts/m² for airborne work; they use
    scale-based density. The dot_state field also enables future routing of other state-specific rules
    (vertical datum, .dgn format enforcement for ODOT, GEOID18 for TxDOT).
  module: auction/deliverable_qa, auction/core
  research_source: R-010
  evidence: "docs/research/automated/R-010_survey_deliverable_qa_checklists_dot.md"
  effort: small
  priority: null
