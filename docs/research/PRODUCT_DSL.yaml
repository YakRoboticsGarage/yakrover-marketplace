# ============================================================
# LEGAL — contracts, bonds, insurance, compliance
# ============================================================
legal:
  moats:
    - id: legal:payment_bond_verification
      description: "Bond verification flow (MCL 129.201 for MI public projects >$50K). Operators see 'Payment Bonded' badge before bidding."
      strategic_function: moat
      jurisdictions: [MI, federal]
      threshold_usd: 50000
      sureties: [Travelers, Liberty Mutual, CNA, Zurich, Hartford]
      source: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md

    - id: legal:pe_stamped_deliverables
      description: "PLS stamp required on survey plats and deliverables relied upon for construction. All 50 states."
      strategic_function: moat
      note: "Drone operator collects data; PLS supervises and stamps. Dual licensing model."
      source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

    - id: legal:coi_verification
      description: "Automated ACORD 25 parsing. CGL, E&O, drone/aviation liability verified against task minimums."
      strategic_function: trust_building
      source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

    - id: legal:dbe_tracking
      description: "DBE/MBE compliance tracking for federally-funded projects (49 CFR Part 26). MDOT MERS Form 2124A."
      strategic_function: moat
      source: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md

  overhead:
    - id: legal:faa_part_107
      description: "Remote Pilot Certificate required for all commercial drone ops"
      type: compliance
      renewal: "24 months, online recurrent training"
      source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

    - id: legal:laanc
      description: "LAANC authorization for controlled airspace (many urban construction sites)"
      type: compliance
      automatable: true
      api: "Aloft/DroneUp LAANC API"
      source: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md

    - id: legal:money_transmitter
      description: "Payment facilitation may trigger state money transmitter licensing"
      type: risk_mitigation
      mitigation: "v1.5 uses prepaid credits (covered by Stripe's licenses). Escrow (v2.5) requires legal review."
      source: docs/ROADMAP_v4.md

  contract_templates:
    - id: contract:consensusdocs_751
      name: "ConsensusDocs 751 (Short Form)"
      use_case: "Standard survey task orders"
      auto_populated_from: "task spec + winning bid"
      key_terms:
        data_ownership: "Processed deliverables to client; raw data retained by operator"
        liability_cap: "1x task fee"
        indemnification: "Mutual, each party's percentage of negligence (ConsensusDocs model)"
        dispute_resolution: "Negotiation -> mediation -> arbitration"
      digital_execution: "ESIGN/UETA compliant"
      source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

    - id: contract:consensusdocs_750
      name: "ConsensusDocs 750 (Long Form)"
      use_case: "Larger or more complex survey contracts"
      source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

    - id: contract:consensusdocs_752
      name: "ConsensusDocs 752 (Federal)"
      use_case: "Federal government construction subcontracts"
      source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

  insurance_requirements:
    private_project:
      cgl: "$1M per occurrence / $2M aggregate"
      eo: "$1M per claim / $2M aggregate"
      drone_liability: "$1M per occurrence"
      workers_comp: "Statutory"
    dot_public_project:
      cgl: "$2M per occurrence / $5M aggregate"
      eo: "$2M per claim / $5M aggregate"
      drone_liability: "$2M-$5M per occurrence"
      workers_comp: "Statutory"
    source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

  michigan_specifics:
    surveyor_licensing: "MCL 339.2001 et seq."
    firm_authorization: "MCL 339.2007 — Certificate of Authorization required for firms"
    continuing_education: "30 hours per biennial renewal"
    payment_bond_threshold: "MCL 129.201 — public projects >= $50K"
    prompt_payment: "MCL 125.1561 — 10 days after receiving owner payment, 1.5%/mo penalty"
    prompt_payment_exclusions: "MDOT projects, schools, contracts under $30K"
    lien_rights: "MCL 570.1107a-b — surveyors as 'design professionals' since 2018"
    source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

# ============================================================
# ARCHITECTURE — capabilities, components, MCP tools, settlement,
#   execution stack, state machines, skills
# ============================================================
architecture:
  capabilities:
    - id: cap:task_posting
      description: "Agent translates natural language into structured task spec with sensor, accuracy, deliverable requirements"
      status: implemented
      phase: phase:v1.0
    - id: cap:reverse_auction
      description: "RFQ auction — open indefinitely, agent controls close (PD-1)"
      status: implemented
      phase: phase:v1.0
      decision: PD-1
    - id: cap:automated_bidding
      description: "Robots run bid_engine(task) -> Bid autonomously (PD-2)"
      status: implemented
      phase: phase:v1.0
      decision: PD-2
    - id: cap:bid_signing
      description: "Every bid signed with ERC-8004 Ed25519 key (PD-3)"
      status: implemented
      phase: phase:v1.0
      decision: PD-3
    - id: cap:filter_then_score
      description: "Two-phase matching: hard constraint filter then weighted scoring (AD-5, AD-6)"
      status: implemented
      phase: phase:v1.0
      scoring_weights: { price: 0.40, sla: 0.25, confidence: 0.20, reputation: 0.15 }
      decision: AD-6
    - id: cap:fiat_settlement
      description: "Stripe Connect Express + prepaid wallet model"
      status: implemented
      phase: phase:v1.0
      decision: TC-2
    - id: cap:crypto_settlement
      description: "USDC on Base via x402 middleware"
      status: planned
      phase: phase:v1.5
      decision: TC-4
    - id: cap:settlement_abstraction
      description: "4-mode interface supporting immediate/batched x transparent/private"
      status: planned
      phase: phase:v1.5
      decision: FD-1
    - id: cap:commitment_hash
      description: "H(request_id || salt) in on-chain memos, never raw request_id"
      status: planned
      phase: phase:v1.5
      decision: FD-4
    - id: cap:hidden_wallet_addresses
      description: "Robot wallet addresses never in public API responses"
      status: planned
      phase: phase:v1.5
      decision: PP-2
    - id: cap:award_confirmation
      description: "Human reviews recommended winner with automated checks before work starts"
      status: planned
      phase: phase:v2.0
      source: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md
    - id: cap:multi_robot_workflows
      description: "Compound tasks decomposed into ordered/parallel subtasks across robot types"
      status: planned
      phase: phase:v2.0
    - id: cap:privacy_tee
      description: "TEE-based confidential compute for encrypted task matching"
      status: planned
      phase: phase:v2.0
      decision: PP-4
    - id: cap:dtn_batched_settlement
      description: "Batched transparent settlement via DTN for lunar operations"
      status: planned
      phase: phase:v4.0
      decision: LD-8

  components:
    - id: component:auction_engine
      path: auction/engine.py
      description: "Task, Bid, AuctionResult, score_bids(), state machine"
      decisions: [PD-1, PD-2, AD-5, AD-6, AD-7, AD-8]
    - id: component:core
      path: auction/core.py
      description: "Task, Bid, AuctionResult dataclasses, signing"
      decisions: [PD-3, AD-3]
    - id: component:wallet
      path: auction/wallet.py
      description: "WalletLedger with debit/credit log"
      decisions: [TC-2]
    - id: component:stripe_service
      path: auction/stripe_service.py
      description: "Stripe Connect Express + Separate Charges and Transfers"
      decisions: [TC-2, TC-3]
    - id: component:store
      path: auction/store.py
      description: "SQLite persistence via SyncTaskStore"
    - id: component:discovery_bridge
      path: auction/discovery_bridge.py
      description: "ERC-8004 robot discovery"
    - id: component:mcp_server
      path: src/core/server.py
      description: "Fleet MCP server"
    - id: component:mock_fleet
      path: auction/mock_fleet.py
      description: "Simulated robots for testing"
    - id: component:escrow_contract
      path: contracts/RobotTaskEscrow.sol
      status: planned
      phase: phase:v1.5
      decisions: [FD-1, TC-4]
    - id: component:settlement
      path: auction/settlement.py
      status: planned
      phase: phase:v1.5
      decisions: [FD-1, FD-4]

  mcp_tools:
    existing_count: 15
    status_summary: "15 implemented, 3+ planned from gap analysis"
    existing:
      - name: post_task
        wraps: AuctionEngine.post_task
        triggers_state: "null -> posted"
      - name: submit_bid
        wraps: AuctionEngine.submit_bid
        triggers_state: "posted -> bidding"
      - name: accept_bid
        wraps: AuctionEngine.accept_bid
        triggers_state: "bidding -> bid_accepted"
      - name: auction_execute
        wraps: AuctionEngine.execute
        triggers_state: "bid_accepted -> in_progress"
      - name: confirm_delivery
        wraps: AuctionEngine.confirm_delivery
        triggers_state: "delivered -> verified"
      - name: reject_delivery
        wraps: AuctionEngine.reject_delivery
        triggers_state: "delivered -> rejected"
      - name: cancel_task
        wraps: AuctionEngine.cancel_task
      - name: auction_get_status
        note: "Returns available_actions list (AD-14) and next_action hint (AD-13)"
      - name: auction_quick_hire
        note: "Single tool for entire lifecycle — post, bid, accept, execute, confirm (AD-12)"
      - name: auction_fund_wallet
        wraps: WalletLedger.credit
    planned:
      - name: plan_flight
        status: planned
        gap_reference: unknown:flight_planning_api
        description: "Convert boundary polygon + sensor + altitude + overlap into waypoints"
        source: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md
      - name: validate_capture
        status: planned
        gap_reference: unknown:infield_qc
        description: "Check point density, coverage, GSD against task spec before declaring complete"
        source: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md
      - name: file_laanc
        status: identified
        description: "File LAANC authorization via Aloft/DroneUp API"
        source: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md

  settlement:
    interface:
      name: SettlementInterface
      methods: [settle, verify, batch_settle, refund]
      decision: FD-1
    modes:
      - id: settlement:immediate_transparent
        timing: immediate
        privacy: transparent
        chain: base
        protocol: x402
        currency: usdc
        version_implemented: "v1.5"
        escrow_contract: component:escrow_contract
        commitment_hash: "H(request_id || salt)"
        decision: [FD-1, FD-4, TC-4]
      - id: settlement:immediate_private
        timing: immediate
        privacy: shielded
        chain: base_horizen_l3
        protocol: null
        currency: usdc
        version_implemented: null
        version_designed: "v3.0"
        notes: "Horizen L3 on Base — TEE-based compliant privacy, same EVM. Eval in v1.5 (F-12)."
        decision: FD-5
      - id: settlement:batched_transparent
        timing: batched
        privacy: transparent
        chain: base
        protocol: dtn_settlement_bundle
        currency: usdc
        version_implemented: null
        version_designed: "v4.0"
        notes: "Lunar operations — settlement queued until comm window"
        decision: LD-8
      - id: settlement:batched_private
        timing: batched
        privacy: shielded
        chain: null
        version_implemented: null
        version_designed: "v3.0+"
        notes: "Convergence of lunar + privacy tracks"
    payment_split:
      on_acceptance_pct: 25
      on_delivery_pct: 75
      decision: PD-4
    privacy_constraints:
      - rule: "Robot wallet addresses NEVER in API responses"
        decision: PP-2
        enforced_at: api_layer
      - rule: "Commitment hash, never raw request_id, in on-chain memos"
        decision: FD-4
        enforced_at: settlement_layer
      - rule: "No new metadata fields on ERC-8004 entries"
        enforced_at: discovery_bridge
    source: docs/FEATURE_REQUIREMENTS_v15.md

  execution_stack:
    source: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md
    layers:
      - id: layer_0_regulatory
        name: "Regulatory Compliance"
        description: "LAANC, 811 notification, COA, PE oversight"
        automation_level: partial
        human_required: true
        gap_severity: low
        owner: operator

      - id: layer_1_site_access
        name: "Site Access"
        description: "Physical transport to launch position, gate access, safety compliance"
        automation_level: none
        human_required: true
        gap_severity: high_for_remote
        owner: operator
        note: "LOW for on-site robots, HIGH for remote deployment"

      - id: layer_2_mission_planning
        name: "Mission Planning"
        description: "Convert boundary + spec into flight plan / scan plan"
        automation_level: none
        human_required: true  # currently
        gap_severity: high
        planned_tool: plan_flight
        depends_on: [layer_1_site_access]
        inputs_from: [skill:rfp_to_site_recon, skill:rfp_to_robot_spec]

      - id: layer_3_mission_execution
        name: "Mission Execution"
        description: "Fly the plan, avoid obstacles, handle weather holds"
        automation_level: partial
        human_required: false  # modern platforms handle this
        gap_severity: medium
        depends_on: [layer_2_mission_planning]
        note: "Handled by robot firmware (DJI Pilot, Skydio autonomy, Spot API)"

      - id: layer_4_infield_qc
        name: "In-Field Quality Control"
        description: "Validate capture quality before declaring mission complete"
        automation_level: none
        human_required: true  # currently
        gap_severity: high
        planned_tool: validate_capture
        depends_on: [layer_3_mission_execution]
        checks: [point_density_vs_spec, coverage_completeness, gsd_achieved, accuracy_estimate]

      - id: layer_5_deliverable_generation
        name: "Deliverable Generation"
        description: "Raw data -> processed outputs (DTM, ortho, contours, reports)"
        automation_level: partial
        human_required: true  # format conversion to agency standards
        gap_severity: medium
        depends_on: [layer_4_infield_qc]
        processing_models: [operator_processes, platform_saas, marketplace_task]

    coverage_summary:
      skills_cover: "Layer 0 (identified, not executed) + Layer 2 inputs (boundary, constraints)"
      auction_covers: "Operator selection (right robot, certs, location)"
      missing: "Layer 2 (flight planning API), Layer 4 (in-field QC), Layer 5 (automated processing)"

  state_machines:
    task_lifecycle:
      initial_state: posted
      terminal_states: [settled, withdrawn, cancelled, failed]
      source: docs/DECISIONS.md  # AD-8
      states:
        posted:
          transitions: [{to: bidding, trigger: first_bid_received}, {to: withdrawn, trigger: poster_withdraws}]
        bidding:
          transitions: [{to: bid_accepted, trigger: poster_accepts_bid}, {to: withdrawn, trigger: poster_withdraws}]
        bid_accepted:
          transitions:
            - {to: in_progress, trigger: operator_begins_work}
            - {to: bidding, trigger: operator_rejects, action: re_pool}
            - {to: bidding, trigger: operator_timeout, action: re_pool}
        in_progress:
          transitions:
            - {to: delivered, trigger: operator_delivers}
            - {to: bidding, trigger: operator_abandons, action: re_pool}
          timeout: {source: "task.sla_seconds", on_expire: abandon_and_repool}
        delivered:
          transitions:
            - {to: verified, trigger: poster_verifies}
            - {to: in_progress, trigger: poster_rejects, action: request_redelivery}
          timeout: {duration_seconds: 3600, on_expire: auto_accept, decision: AD-7}
        verified:
          transitions: [{to: settled, trigger: settlement_complete}]
        settled: {transitions: []}
        withdrawn: {transitions: []}
        cancelled: {transitions: []}
        failed: {transitions: []}

    award_confirmation:
      source: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md
      states:
        auction_complete:
          transitions: [{to: recommended, trigger: scoring_complete}]
        recommended:
          transitions:
            - {to: award_confirmed, trigger: buyer_confirms}
            - {to: award_rejected, trigger: buyer_rejects}
          timeout: {duration_hours: 72, reminder: true, expire_days: 7}
        award_rejected:
          transitions:
            - {to: recommended, trigger: next_bidder_promoted}
            - {to: re_pooled, trigger: all_bidders_exhausted}
          rejection_reasons: [conflict_of_interest, insufficient_insurance, dbe_shortfall, prohibited_vendor, prior_bad_experience, pls_not_licensed]
        award_confirmed:
          transitions: [{to: agreement_pending, trigger: subcontract_generated}]
        agreement_pending:
          transitions: [{to: awarded, trigger: both_parties_sign}]
        awarded:
          transitions: [{to: in_progress, trigger: work_authorized}]

  skills:
    - id: skill:rfp_to_robot_spec
      status: implemented
      version: "1.0"
      description: "Extract task specification from an RFP document"
      inputs: [rfp_document]
      outputs:
        - sensor_requirements
        - accuracy_requirements
        - deliverable_formats
        - budget_ceiling_usd
        - regulatory_requirements
      execution_stack_coverage: {layer_0: identifies_requirements, layer_2: provides_inputs}
      validation: validate_task_spec.py
      source: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md

    - id: skill:rfp_to_site_recon
      status: implemented
      version: "1.0"
      description: "Generate execution context from RFP + public data sources"
      inputs: [rfp_document, skill:rfp_to_robot_spec.outputs]
      outputs:
        - boundary_polygon
        - airspace_class
        - obstacles
        - weather_norms
        - unknowns
        - pre_mobilization_checklist
      execution_stack_coverage: {layer_0: flags_constraints, layer_2: provides_inputs}
      validation: validate_site_recon.py
      staleness_policy: {max_age_days: 90, fields_affected: [airspace_class, obstacles, weather_norms]}
      source: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md

# ============================================================
# TRANSFER MAP — Earth to Lunar capability transfer
# ============================================================
transfer_map:
  source: docs/research/SYNTHESIS_JTBD_WEDGE_PROPOSAL.md

  sensors_that_transfer:
    - sensor: LiDAR
      earth_use: "Topographic survey, DTM generation, volumetrics"
      lunar_use: "Terrain mapping at Shackleton Crater rim"
      note: "Works better in vacuum — no atmospheric scattering"
    - sensor: RTK-GPS
      earth_use: "Centimeter positioning for survey accuracy"
      lunar_use: "Replaced by LunaNet positioning beacons"
      transfers: false
      replacement: "NASA LunaNet"
    - sensor: Photogrammetry
      earth_use: "3D models, orthomosaics, structure documentation"
      lunar_use: "Boulder field characterization, crater morphology"
      transfers: true
    - sensor: GPR
      earth_use: "Subsurface utility detection, soil profiling"
      lunar_use: "Regolith depth and ice concentration profiling for ISRU"
      transfers: true
    - sensor: Thermal_IR
      earth_use: "Insulation defects, water infiltration"
      lunar_use: "Critical for -173C to +127C surface temperature swing management"
      transfers: true
    - sensor: IMU
      earth_use: "Navigation stabilization"
      lunar_use: "Navigation in reduced gravity (1/6 g)"
      transfers: true

  workflows_that_transfer:
    - earth: "Pre-bid topographic survey"
      lunar: "Terrain mapping for pad siting"
      transfer_quality: direct
    - earth: "Existing condition documentation"
      lunar: "Boulder field and crater characterization"
      transfer_quality: direct
    - earth: "Subsurface GPR assessment"
      lunar: "Regolith depth and ice profiling for ISRU"
      transfer_quality: direct
    - earth: "Progress monitoring (cut/fill)"
      lunar: "Tracking autonomous excavation of landing pads"
