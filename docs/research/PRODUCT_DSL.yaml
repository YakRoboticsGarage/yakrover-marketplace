# ============================================================
# CONSTITUTIONAL — system invariants vs policies
# ============================================================
constitutional:
  invariants:
    - id: inv:wallet_non_negative
      rule: "Wallet balances must never go negative under any scenario"
      enforced_at: wallet_ledger
      source: CLAUDE.md

    - id: inv:bid_signing
      rule: "Bids are signed and non-repudiable from day one"
      decision: PD-3
      enforced_at: bid_submission
      source: docs/DECISIONS.md

    - id: inv:no_wallet_in_api
      rule: "Robot wallet addresses never appear in API responses"
      decision: PP-2
      enforced_at: api_layer
      source: docs/FEATURE_REQUIREMENTS_v15.md

    - id: inv:commitment_hash_only
      rule: "On-chain memos carry only H(request_id || salt), never raw request_id"
      decision: FD-4
      enforced_at: settlement_layer
      source: docs/FEATURE_REQUIREMENTS_v15.md

    - id: inv:idempotent_payments
      rule: "All payment operations must be idempotent — handle retries safely"
      enforced_at: settlement_layer
      source: CLAUDE.md

    - id: inv:no_hardcoded_keys
      rule: "NEVER hardcode Stripe API keys, wallet private keys, or USDC addresses in source"
      enforced_at: code_review
      source: CLAUDE.md

    - id: inv:payment_audit_trail
      rule: "Every payment state change logged to SQLite audit trail"
      enforced_at: settlement_layer
      source: CLAUDE.md

    - id: inv:minimum_task_price
      rule: "No task below $0.50 USD"
      decision: TC-1
      enforced_at: post_task
      source: docs/DECISIONS.md

  policies:
    - id: pol:scoring_weights
      rule: "Scoring: price 40%, SLA 25%, confidence 20%, reputation 15%"
      adjustable_by: platform_admin
      decision: AD-6
      source: docs/DECISIONS.md

    - id: pol:auto_accept_timeout
      rule: "Delivery auto-accepted after 3600 seconds if agent doesn't respond"
      adjustable_by: per_task
      decision: AD-7
      source: docs/DECISIONS.md

    - id: pol:payment_split
      rule: "25% on acceptance, 75% on delivery"
      adjustable_by: platform_admin
      decision: PD-4
      source: docs/DECISIONS.md

    - id: pol:insurance_minimums
      rule: "CGL $1M/$2M, E&O $1M/$2M, drone $1M for private; doubled for DOT"
      adjustable_by: per_account
      source: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md

    - id: pol:coi_expiration_alerts
      rule: "Yellow at 30 days, red at 7 days"
      adjustable_by: platform_admin
      source: docs/USER_JOURNEY_CONSTRUCTION_v01.md

    - id: pol:award_timeout
      rule: "72-hour reminder, 7-day expiration if GC does not act"
      adjustable_by: per_task
      source: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md

    - id: pol:reject_warning
      rule: "After 3+ rejections, warn: 'Multiple rejections may indicate scope or budget issue'"
      adjustable_by: platform_admin
      source: docs/research/RESEARCH_REJECT_RECOVERY_FLOW.md

    - id: pol:high_trust_seed
      rule: "v1 assumes good-faith actors. No disputes, arbitration, reputation slashing, or fraud detection."
      decision: PD-7
      adjustable_by: phase_gate
      source: docs/DECISIONS.md

  agent_governance:
    - rule: "Agent may not override operator pricing"
      source: docs/DECISIONS.md
    - rule: "Agent must verify delivery before releasing payment (PD-5)"
      source: docs/DECISIONS.md
    - rule: "Agent controls auction close timing — no forced timer (PD-1)"
      source: docs/DECISIONS.md
    - rule: "Agent spending limit configurable per account (Marco: $5K/task, auto-approve under $500)"
      source: docs/USER_JOURNEY_CONSTRUCTION_v01.md
    - rule: "Agent cannot approve its own deliverables in future oracle-assisted verification"
      phase: phase:v3.0

# ============================================================
# GLOSSARY — domain terms for LLM and new-reader clarity
# ============================================================
glossary:
  reverse_auction: "Buyer posts a task, multiple sellers (robot operators) bid. Lowest qualified bid wins. Opposite of traditional auction where buyers bid up."
  MCP: "Model Context Protocol — standard for connecting AI agents to external tools and services. An agent uses MCP to call marketplace tools (post_task, get_bids, etc.)."
  ERC_8004: "Ethereum token standard for on-chain robot identity. Each robot has a registered identity that enables discovery, reputation, and payment."
  x402: "HTTP payment protocol by Coinbase. Embeds payment proof in HTTP headers so robots can be paid per-task via USDC."
  JTBD: "Jobs-to-be-Done — framework for understanding what customers hire products to do. Marco hires robots to get pre-bid survey data faster."
  DTN: "Delay-Tolerant Networking — store-and-forward protocol for high-latency links (Earth-Moon). Messages queue at each node until the next link is available."
  BBS_plus: "BBS+ signatures — anonymous credential scheme allowing robots to prove aggregate reputation stats without revealing individual task history."
  LAANC: "Low Altitude Authorization and Notification Capability — FAA system for automated drone airspace authorization."
  PLS: "Professional Land Surveyor — state-licensed individual required to stamp survey deliverables. Robots operate under PLS supervision."
  ConsensusDocs: "Industry-standard construction contract forms. ConsensusDocs 750/751 are subcontractor agreements used in the marketplace."
  TEE: "Trusted Execution Environment — hardware-secured computing enclave. Used for privacy-preserving task matching and scoring."
  commitment_hash: "H(request_id || salt) — cryptographic hash stored on-chain instead of raw task ID. Proves payment-task linkage without revealing which task."
  RFQ: "Request for Qualifications — procurement document issued by DOTs to select qualified contractors for design-build projects."
  GC: "General Contractor — the prime contractor who hires survey subcontractors (and robot operators) to complete portions of a project."
  NSSDA: "National Standard for Spatial Data Accuracy — the US standard for reporting positional accuracy of geospatial data (used for LiDAR QC)."

