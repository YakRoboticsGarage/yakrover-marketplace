  # ===== OPERATOR IDENTITY & VERIFICATION =====

  - id: R-027
    title: "Robot operator identity verification — individuals and businesses"
    module: M10_compliance
    hypothesis: "The platform should verify the operator entity (individual or business), not chase individual PLS license numbers. Business registry checks, KYC/KYB services (Middesk, Berbix, Stripe Identity, Persona), and existing compliance data (insurance COI, SAM.gov) may be sufficient to establish operator trust without per-credential verification."
    status: complete
    priority: critical
    estimated_sessions: 2
    completed_date: "2026-04-12"
    depends_on: []
    output_file: "docs/research/automated/R-027_operator_identity_verification.md"
    improvement_proposals: [IMP-064, IMP-065, IMP-066, IMP-067]
    spawned: [R-028]
    notes: "Key findings: (1) Stripe Connect Express KYC is the right mandatory baseline gate — zero marginal cost, covers regulatory KYC. (2) Middesk is the right entity-level KYB for tasks >= $25K. (3) INFORM Act does not apply to services. (4) Most serious construction survey operators are LLCs (Stripe USDC payout path less relevant). (5) Current verify_operator() 'compliant' flag is incorrectly strict — needs task_type context. (6) OperatorProfile missing stripe_account_id — operators can be activated without payout path. R-028 (Stripe Identity as KYC) is now unblocked."

  - id: R-028
    title: "Stripe Identity and Connect KYC as operator verification"
    module: M10_compliance
    hypothesis: "Stripe Connect Express already performs KYC/KYB during onboarding — identity verification, business registration check, sanctions screening. If an operator has a verified Connect account, that may be sufficient platform trust for most task values."
    status: complete
    priority: high
    estimated_sessions: 1
    completed_date: "2026-04-16"
    depends_on: [R-027]
    output_file: "docs/research/automated/R-028_stripe_connect_kyc_operator_verification.md"
    improvement_proposals: [IMP-085, IMP-086, IMP-087]
    spawned: [R-050]
    notes: "Hypothesis confirmed with caveats. payouts_enabled=True on Connect Express account is sufficient baseline trust for <$10K tasks (ID, SSN/EIN, OFAC, PEP screening included). Critical gap: activate() checks stripe_account_id != None but does NOT call get_account() to verify payouts_enabled=True — operator with incomplete onboarding can be activated. Stripe Identity ($1.50/check) is the right escalation for auto-verification failures. Stripe does NOT verify SoS registration (Middesk IMP-066 remains correct for $25K+ tasks). account.updated webhook needed to auto-suspend OFAC-flagged operators post-activation."

  # ===== PLATFORM ADMINISTRATION =====

  - id: R-032
    title: "Platform admin console — key management, wallet monitoring, service health"
    module: M34_admin_console
    hypothesis: "The platform currently has 6 worker secrets, 2 on-chain wallets, and 5+ external service accounts scattered across Cloudflare dashboard, .env files, and browser bookmarks. A centralized admin console or at minimum a documented operational runbook would reduce the risk of key rotation failures, depleted gas wallets, and expired API tokens."
    status: queued
    priority: high
    estimated_sessions: 2
    depends_on: []
    notes: "Current inventory: (1) Worker secrets: ANTHROPIC_API_KEY, GITHUB_TOKEN, RELAY_PRIVATE_KEY, PINATA_JWT, STRIPE_SECRET_KEY (pending), STRIPE_WEBHOOK_SECRET (pending). (2) Wallets: platform 0xe333...8e5, relay 0x4b59...0d9 — need ETH monitoring for gas. (3) External: Stripe, Pinata, Cloudflare, here.now, The Graph. Research: (a) What does a production admin dashboard need? (b) Key rotation strategy for each secret. (c) Wallet balance alerting (relay runs out of ETH = payments stop). (d) Health check endpoints for each service. (e) Runbook vs dashboard — what's appropriate at current scale?"

  - id: R-033
    title: "Secret management and key rotation for production marketplace"
    module: M34_admin_console
