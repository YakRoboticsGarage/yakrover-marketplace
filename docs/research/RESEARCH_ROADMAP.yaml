  # ===== SPAWNED BY NEW CODE: gasless USDC relay (commits 44ae91f, 2e6bfe9) =====

  - id: R-034
    title: "ERC-2612 permit relay security: MEV risk, replay attacks, and relay wallet custody"
    module: M18_x402
    hypothesis: "The new /api/relay-usdc Cloudflare Worker (commit 44ae91f) submits permit + transferFrom on behalf of the buyer, paying gas from RELAY_PRIVATE_KEY. This design has known risks: (1) permit signature replay on other chains if deadline is not enforced, (2) MEV sandwich attacks on the transferFrom tx, (3) relay wallet as a hot wallet custody risk holding gas funds. Research best practices for permit relay design: deadline validation, nonce checks, fee estimation, and whether a paymaster pattern (ERC-4337) is safer at construction-scale ($10K-$45K) payments."
    status: queued
    priority: high
    estimated_sessions: 1
    depends_on: []
    spawned_from: "git:44ae91f (ERC-2612 permit relay)"
    spawned_date: "2026-04-05"
    notes: "New code shipped 2026-04-05. Relay wallet 0x4b59...0d9 is funded EOA paying gas for permit+transferFrom. Validate: chain ID binding in permit domain separator, deadline enforced server-side, transferFrom reverts handled, relay wallet replenishment strategy."
