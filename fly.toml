app = 'yakrover-marketplace'
primary_region = 'ams'

[build]

[env]
  PYTHONPATH = '.'
  AUCTION_DB_PATH = '/data/auction.db'

[mounts]
  source = 'yakrover_data'
  destination = '/data'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = 'http'
    port = 8001
    path = '/health'
    interval = '30s'
    timeout = '10s'
    grace_period = '120s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
