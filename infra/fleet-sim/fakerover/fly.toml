app = 'yakrover-fakerover'
primary_region = 'ord'

[build]

[env]
  CATEGORY = 'fakerover'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[deploy]
  strategy = 'immediate'
