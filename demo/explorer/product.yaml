# ============================================================
# STYLE GUIDE — report formatting reference
# [v2.2] From _REPORT-STYLE.md
# ============================================================
style_guide:
  document: {path: docs/REPORT-STYLE.md}
  applies_to: "Pitch deck, investor materials, customer-facing docs, research summaries, demo copy"
  does_not_apply_to: "Raw research notes, YAML ontology, code comments, internal feedback files"
  core_standard: "Every sentence must earn its place."
  anti_pattern_reference: "https://tropes.fyi/tropes-md"
  key_rules:
    - "Active voice. State finding first, reasoning second."
    - "Source every number. Unsourced numbers are assumed fabricated."
    - "Never say '0 competitors.' Describe the white space."
    - "Phase gates, not year targets."
    - "No blockchain/MCP/ERC-8004 jargon in customer-facing materials. See gtm.interface_language for the full mapping."
  gc_language_test: "Would a Michigan highway GC estimator with no tech background read this and immediately know what it means?"
  interface_language_ref: "See gtm.interface_language for the complete technical-to-interface term mapping (added v2.5, 2026-04-10)."

# ============================================================
# MANTRA + ESSENCE — anchoring statements
# ============================================================
mantra: "Reverse auction marketplace for physical survey tasks. Buyers post requirements, operators bid, platform verifies and settles."
essence: "This file is the authoritative reference for product entities, strategic assumptions, architectural decisions, and build sequence. Consult this before individual research documents when they conflict."
