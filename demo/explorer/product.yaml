        duration: "1-2 weeks"
    why_operators_list:
      - "Utilization improvement — weather cancellations and seasonal slowdowns create idle equipment days that marketplace tasks can fill"
      - "Geographic expansion without overhead — bid on tasks outside normal service area when demand exists"
      - "Demand pipeline — client acquisition is the primary failure mode for independent operators (per onboarding research)"
      - "Recurring task flow — progress monitoring contracts generate 12-24 months of repeat work per project"
      - "Administrative overhead reduction — contracts, compliance verification, invoicing, and payment collection handled by platform"

    # [v2.4] Operator value propositions — what concretely changes vs. status quo
    value_propositions:
      - id: prop:immediate_payment
        claim: "Payment on verified delivery reduces operator cash flow cycle from 45-90 days (industry standard) to same-day"
        status_quo: |
          Industry standard is Net-30, but Net-60 and Net-90 exist on larger and public projects.
          Pay-when-paid clauses are common — the GC pays the sub only after the owner pays the GC.
          In practice, survey subs wait 45-90 days from invoice to payment.
          Michigan has no private prompt payment statute — private project timing is purely contractual.
          Retainage withholds 5-10% until project closeout, months after fieldwork is done.
          Billd (construction fintech) exists specifically to advance payment to subs waiting on GCs — proving the pain is real enough to build a business around.
        marketplace_change: |
          Buyer funds are committed at hire (EIP-3009 authorization signed before work begins).
          Payment executes on verified delivery — days from task completion, not 45-90 days.
          No invoice submission. No pay-app cycle (AIA G702/G703). No chasing the GC.
          No pay-when-paid risk — the buyer's commitment is direct to the marketplace, not contingent on an upstream owner payment.
          No retainage on single-task survey jobs.
        magnitude: "Reduces operator payment cycle from 45-90 days to same-day on delivery acceptance"
        who_benefits_most: "Independent operators and small firms (1-5 people) who lack the cash reserves to float 60-90 days of receivables"
        evidence:
          - {source: "RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md", finding: "Survey subs wait 45-90 days in practice. Michigan has no private prompt payment statute."}
          - {source: "RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md", finding: "Cash flow crunch listed as 'common' failure mode for new operators"}
          - {source: "RESEARCH_SKILL_CANDIDATES.md", finding: "Late payment is the #1 cash flow killer for small subs"}
          - {source: "Billd (billd.com)", finding: "VC-funded fintech exists solely to advance payments to construction subs — validates the pain point"}
        caveats:
          - "Applies to single-task survey jobs completed in hours/days. Multi-month project lifecycle contracts (progress monitoring over 14 months) will still need milestone billing."
          - "Large GCs may prefer invoice terms (Net-30/60) over prepaid commitment. The marketplace must support both buyer types."
          - "Platform must hold committed funds between hire and delivery — potential money transmission implications (see unknown:money_transmission_escrow)."
      - id: prop:no_invoice_tracking
        claim: "Platform handles invoicing, pay application submission, and collection. Operators are not required to manage payment administration."
        status_quo: |
          Operators submit AIA G702/G703 pay applications monthly. GC reviews, marks up, includes in their own pay app to the owner.
          Lien waivers must be exchanged at each payment. Missing a waiver creates payment holds.
          Small operators without office staff track this manually — missed deadlines mean missed payments.
        marketplace_change: |
          Delivery verification triggers payment automatically. No pay app to submit.
          No lien waiver exchange on marketplace tasks (marketplace is the contracting party, not the property).
          Payment status visible in real time — no calling the GC's AP department.
        who_benefits_most: "Solo operators and small firms without dedicated office/admin staff"
        evidence:
          - {source: "RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md", finding: "Progress billing via AIA G702/G703 is standard for contracts over ~$25K"}
          - {source: "RESEARCH_SKILL_CANDIDATES.md", finding: "Lien waiver and prompt payment monitoring ranked as needed skills precisely because the current process is manual and error-prone"}
      - id: prop:demand_pipeline
        claim: "Client acquisition is the primary reported failure mode for independent drone operators. The marketplace aggregates buyer demand and matches it to operator capabilities."
        status_quo: "368K+ Part 107 holders, growing 50K/year. Equipment is accessible ($3-27K entry). The bottleneck is client acquisition, not certification or hardware."
        marketplace_change: "Operators receive bid opportunities matched to their equipment, location, and certifications from day one."
        evidence:
          - {source: "RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md", finding: "Can't find clients is #1 cause of failure"}
    # [Entry 3] Operator churn modeling
    churn_risks:
      - trigger: "Low bid volume in first 30 days"
        mitigation: "Demand heatmap showing upcoming task locations"
      - trigger: "Payment delays (> 10 days)"
        mitigation: "Prompt payment compliance per MCL 125.1561"
      - trigger: "Platform takes too large a fee"
        mitigation: "Transparent fee structure, competitive with direct client acquisition cost"

