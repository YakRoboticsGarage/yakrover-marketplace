# ============================================================
# COMPETITION RANKING — Integration Judge (Judge 3)
#
# 1st: ENTRY 5 (Ontology Purist) — The structural fixes (ID normalization,
#      type declarations, dangling reference cleanup, glossary enrichment)
#      are foundational. Every other entry's improvements become MORE useful
#      once the ontology is machine-traversable. Without Entry 5's fixes,
#      the YAML remains a human-readable document pretending to be a schema.
#      The six structural defects and four thejaymo gaps are precise,
#      actionable, and improve every downstream consumer.
#
# 2nd: ENTRY 4 (Legal Critic) — Identified 5 CRITICAL gaps (retainage,
#      lien waivers, disputed state, money transmission, insurance).
#      These are not theoretical — they are legal obligations that block
#      production launch. The payment flow state machine is the highest-
#      impact single addition.
#
# 3rd: ENTRY 2 (Technical Architect) — MCP tool schemas, state machine
#      inconsistencies, and refund semantics are implementation-critical.
#      The cross-repo coherence and execution stack contracts bring
#      engineering rigor the v1.1 lacked.
#
# 4th: ENTRY 3 (UX Critic) — Operator/agent journey parity, demo screen
#      mapping, feedback integration, and manual-task flagging are all
#      valid gaps. The implementation_status field is a practical tool for
#      tracking ideal vs. actual.
#
# 5th: ENTRY 1 (Strategy Critic) — Validation register, competitive moats,
#      lunar business model, and talisman metadata are strategically sound
#      but less urgent than structural/legal/technical fixes. Still, every
#      idea is incorporated below.
#
# ALL 5 entries contributed unique improvements integrated into v2.0.
# ============================================================

# ============================================================
# PRODUCT_DSL.yaml — Ontological Map of the Robot Task Auction Marketplace
# The single document that describes the entire product, its strategy,
# its assumptions, its risks, and what to build next.
# ============================================================
# Schema version: 2.0
# Generated: 2026-03-29
# Revised: 2026-03-29 — integrates all 5 competition critiques
# Synthesis of: Architect (entity-relationship), Strategist (bet chains,
#   unknowns, transfer maps), Engineer (MCP tools, settlement, execution stack),
#   Ontology Purist (ID normalization, types, cross-refs), Legal Critic
#   (payment flow, insurance, data ownership), UX Critic (journey parity,
#   demo mapping, feedback), Strategy Critic (validation, moats, talisman),
#   Technical Architect (tool schemas, state machine fixes, refund semantics)
# Reference: https://github.com/tehjaymo/thejaymo.net (Knowledge Object patterns)
# ============================================================

