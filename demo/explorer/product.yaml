# ============================================================
# GTM — go-to-market strategy (separate from roadmap)
# ============================================================
gtm:
  first_customers:
    who: "Estimators at mid-size civil GCs ($50-500M revenue) in Michigan"
    where: "Michigan (primary — Detroit/Kalamazoo I-94 corridor). Ohio secondary."
    pain: "Survey scheduling bottleneck costs 2-3 missed bids/quarter (~$500K-$1M per missed bid)"
    discretionary_budget: "$15K per bid for pre-construction services"
    target_count: 15
    named_targets: "Dan's Excavating (Jim Doescher), Ajax Paving, Angelo Iafrate, C.A. Hull, Fisher Contracting (Andy LeBeau)"
    validation_status: "0/15 have in-house survey. 0/15 use drones. 6/15 on Procore."
    sources: [{path: docs/research/SYNTHESIS_JTBD_WEDGE_PROPOSAL.md}, {path: github.com/rafaeldavid/robotTAM/outreach/gc-briefing-packets.md}]

  first_operators:
    who: "Part 107 drone survey operators in Michigan with construction experience"
    target_count: 14
    named_targets: "SSI (MDOT partner, 40-50 employees), DroneView Technologies, Drone Brothers (350+ pilots)"
    competitive_watch: "Drone Brothers operates a pilot network on Procore — closest competitive model"
    lowest_friction: "Emmet Drones (already on Droners.io)"
    sources: [{path: github.com/rafaeldavid/robotTAM/outreach/operator-briefing-packets.md}]

  channels:
    - name: "Direct outreach to 15 target Michigan GCs"
      stage: phase:v1.5
      playbook: github.com/rafaeldavid/robotTAM/outreach/gc-engagement-package.md
    - name: "Direct outreach to 14 target Michigan operators"
      stage: phase:v1.5
      playbook: github.com/rafaeldavid/robotTAM/outreach/operator-engagement-package.md
    - name: "MDOT pilot program via SSI partnership"
      stage: phase:v2.0
      evidence: "SSI is confirmed MDOT survey partner. MDOT has 'UAS Systems Development Consulting Service' RFP."
      sources: [{path: docs/research/market/RESEARCH_MICHIGAN_RFP_EXAMPLES.md}]
    - name: "AGC Michigan and MSPS networking events"
      stage: phase:v1.5
    - name: "Construction technology conferences (CONEXPO-CON/AGG)"
      stage: phase:v2.0

  messaging:
    to_buyers: "Qualified survey bids returned in hours. Compliance verification, deliverable QA, and payment handled by the platform."
    to_operators: "Marketplace aggregates demand from GCs. Operators receive bid opportunities matched to their equipment, certifications, and location."
    to_investors: "Construction survey marketplace with $1.2B wedge TAM. Same auction engine, operator network, and sensor stacks extend to mining ($3.95/5) and infrastructure inspection ($3.65/5)."

  terminology:
    brand: "Robot Marketplace — Turner Construction used 'robot' without hesitation for Boston Dynamics Spot. Term is accepted in construction contexts."
    in_ui: "drone (for aerial), robot (for legged), autonomous equipment (for heavy machinery)"
    in_specs: "UAS (government contexts), autonomous survey platform (formal)"
    sources: [{path: docs/research/RESEARCH_TERMINOLOGY_ROBOT_VS_INDUSTRY.md}]

  # [v2.5] Interface language mapping — how technical terms appear in buyer/operator-facing UI
  # Rule: use professional registry / business language, not protocol or DeFi terminology.
  # Test: "Would a Michigan highway GC estimator understand this without Googling?"
  interface_language:
    principle: "Blockchain is an integrity mechanism, not a feature. Present it as verification infrastructure, never as a selling point."
    mapping:
      # Identity & Registration
      - technical: "ERC-8004"
        interface: "identity registry"
        context: "Referenced as 'the identity registry' or just 'the registry'. Never surfaced as an EIP number."
      - technical: "agent ID / agentId"
        interface: "Registration #"
        context: "Like a license number. Displayed as '#12345' in UI."
      - technical: "agent card / registrationFile"
        interface: "published profile"
        context: "The operator's machine-readable profile. IPFS is the storage layer, not the feature."
      - technical: "IPFS"
        interface: "published profile"
        context: "Never mention IPFS in buyer-facing UI. In technical details: 'profile source'."
      - technical: "mint / minting"
        interface: "register / registering identity"
        context: "Operators 'register', they don't 'mint'. Registration creates a verifiable record."
      - technical: "8004scan.io"
        interface: "Identity registry"
        context: "Link text is 'Identity registry', not '8004scan'. URL stays the same."

      # Blockchain & Networks
      - technical: "chain / blockchain"
        interface: "network"
        context: "In advanced settings: 'Registration Network'. In collapsible details: 'Registry network'."
      - technical: "Base Mainnet"
        interface: "Production (Base)"
        context: "Only in advanced settings dropdown. Default selection."
      - technical: "Base Sepolia / Ethereum Sepolia"
        interface: "Test (Base Sepolia) / Test (Ethereum Sepolia)"
        context: "Testnet names preserved in parentheses for developers, but prefixed with 'Test'."
      - technical: "on-chain"
        interface: "registered / verified"
        context: "Operators are 'registered', not 'on-chain'. Discovery finds 'registered operators', not 'on-chain robots'."
      - technical: "gas / gas fee"
        interface: "registration fee" or omit
        context: "Say 'covered by the platform' or 'no fee to you'. Never mention gas."
      - technical: "block explorer / basescan.org"
        interface: "On-chain record"
        context: "Only in collapsible verification section. Button title explains purpose."
      - technical: "subgraph"
        interface: omit
        context: "Internal indexing infrastructure. Never surfaced. Use 'indexing in progress' for pending state."

      # Payment
      - technical: "USDC"
        interface: "Stablecoin (USDC)"
        context: "Lead with 'Stablecoin', add '(USDC)' in parentheses where needed for clarity."
      - technical: "wallet / crypto wallet"
        interface: "payment address" or "payment account"
        context: "In payment flow: 'payment address'. In error messages: 'payment app' or 'crypto wallet' (since they need to install one)."
      - technical: "EIP-3009 / transferWithAuthorization"
        interface: omit
        context: "Internal payment mechanism. Buyer sees 'Authorize payment'. Never mention the EIP."
      - technical: "permit / signature"
        interface: "authorize"
        context: "Buyer 'authorizes payment', not 'signs a permit'."
      - technical: "Stripe Connect"
        interface: "Stripe Connect"
        context: "Industry-standard term. Acceptable as-is for operators. For buyers: just 'Card / Bank transfer'."

      # Robot Control
      - technical: "MCP / Model Context Protocol"
        interface: "robot control system" or omit
        context: "In registration form: 'Robot Control URL'. In confirmation: 'sends commands to your robot'. In Claude Code mode: MCP is acceptable (developer audience)."
      - technical: "MCP endpoint"
        interface: "Robot Control URL" or "Robot API"
        context: "Registration form label. In verification details: 'Robot API'."
      - technical: "MCP tools / tool_use"
        interface: "commands" or "capabilities"
        context: "Robot has 'X commands available', not 'X MCP tools'. In verification details: 'Available commands'."
      - technical: "tools/list"
        interface: omit
        context: "Internal discovery mechanism. Show result as 'X commands available', not the protocol call."

    where_technical_is_ok:
      - "Collapsible 'Verification & technical details' section in operator profile popup"
      - "Claude Code registration mode (developer audience)"
      - "Code comments and internal variable names"
      - "Console.warn/error messages (developer debugging)"
      - "API documentation and MCP tool descriptions"

# ============================================================
# CONSTITUTIONAL — system invariants vs policies
# [Entry 2] Added test_id and ci_gate to invariants
# ============================================================
constitutional:
  invariants:
    - id: inv:wallet_non_negative
      rule: "Wallet balances must never go negative under any scenario"
      enforced_at: wallet_ledger
      test_id: "test_wallet_never_negative"
      ci_gate: "uv run pytest auction/tests/test_wallet.py -k negative"
      sources: [{path: CLAUDE.md}]

    - id: inv:bid_signing
      rule: "Bids are signed and non-repudiable from day one"
      decisions: [decision:PD-3]
      enforced_at: bid_submission
      test_id: "test_bid_signature_required"
      ci_gate: "uv run pytest auction/tests/test_core.py -k signing"
      sources: [{path: docs/DECISIONS.md}]

    - id: inv:no_wallet_in_api
      rule: "Robot wallet addresses never appear in API responses"
      decisions: [decision:PP-2]
      enforced_at: api_layer
      test_id: "test_no_wallet_in_response"
      ci_gate: "grep -r 'wallet_address' auction/ --include='*.py' | grep -v test | grep -v '#'"
      sources: [{path: docs/FEATURE_REQUIREMENTS_v15.md}]

    - id: inv:commitment_hash_only
      rule: "On-chain memos carry only H(request_id || salt), never raw request_id"
      decisions: [decision:FD-4]
      enforced_at: settlement_layer
      test_id: "test_commitment_hash_not_raw_id"
      sources: [{path: docs/FEATURE_REQUIREMENTS_v15.md}]

    - id: inv:idempotent_payments
      rule: "All payment operations must be idempotent — handle retries safely"
      enforced_at: settlement_layer
      test_id: "test_payment_idempotency"
      sources: [{path: CLAUDE.md}]

    - id: inv:no_hardcoded_keys
      rule: "NEVER hardcode Stripe API keys, wallet private keys, or USDC addresses in source"
      enforced_at: code_review
      ci_gate: "uv run ruff check auction/ --select S105,S106"
      sources: [{path: CLAUDE.md}]

    - id: inv:payment_audit_trail
      rule: "Every payment state change logged to SQLite audit trail"
      enforced_at: settlement_layer
      test_id: "test_audit_trail_completeness"
      sources: [{path: CLAUDE.md}]

    - id: inv:minimum_task_price
      rule: "No task below $0.50 USD"
      decisions: [decision:TC-1]
      enforced_at: post_task
      test_id: "test_minimum_price_enforced"
      sources: [{path: docs/DECISIONS.md}]

  policies:
    - id: pol:scoring_weights
      rule: "Scoring: price 40%, SLA 25%, confidence 20%, reputation 15% (construction default)"
      adjustable_by: platform_admin
      canonical_location: scoring_profiles.scoring:construction
      decisions: [decision:AD-6]
      sources: [{path: docs/DECISIONS.md}]

    - id: pol:auto_accept_timeout
      rule: "Delivery auto-accepted after 3600 seconds if agent doesn't respond"
      adjustable_by: per_task
      decisions: [decision:AD-7]
      sources: [{path: docs/DECISIONS.md}]

    - id: pol:payment_split
      rule: "100% on delivery (commit-on-hire: permit signed on award, executed on delivery acceptance)"
      adjustable_by: platform_admin
      canonical_location: architecture.settlement.payment_split
      decisions: [decision:PD-4]
      sources: [{path: docs/DECISIONS.md}]

    - id: pol:insurance_minimums
      rule: "CGL $1M/$2M, E&O $1M/$2M, drone $1M for private; doubled for DOT"
      adjustable_by: per_account
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: pol:coi_expiration_alerts
      rule: "Yellow at 30 days, red at 7 days"
      adjustable_by: platform_admin
      sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]

    - id: pol:award_timeout
      rule: "72-hour reminder, 7-day expiration if GC does not act"
      adjustable_by: per_task
      sources: [{path: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md}]

    - id: pol:reject_warning
      rule: "After 3+ rejections, warn: 'Multiple rejections may indicate scope or budget issue'"
      adjustable_by: platform_admin
      sources: [{path: docs/research/RESEARCH_REJECT_RECOVERY_FLOW.md}]

    - id: pol:high_trust_seed
      rule: "v1 assumes good-faith actors. No disputes, arbitration, reputation slashing, or fraud detection."
      decisions: [decision:PD-7]
      adjustable_by: phase_gate
      sources: [{path: docs/DECISIONS.md}]

    # [Entry 3] Design constraint from feedback
    - id: pol:screen_count_target
      rule: "Core buyer flow should be completable in 4 screens or fewer"
      origin: docs/feedback/CRITIQUE_PRODUCT.md
      status: not_met
      note: "Demo currently has 6+ steps. Known gap."

    # [Entry 3] Navigation constraint from feedback
    - id: pol:back_navigation
      rule: "Every screen must have back navigation to the previous step"
      origin: docs/feedback/CRITIQUE_UX_DESIGN.md
      status: not_met

  agent_governance:
    - rule: "Agent may not override operator pricing"
      sources: [{path: docs/DECISIONS.md}]
    - rule: "Agent must verify delivery before releasing payment (PD-5)"
      sources: [{path: docs/DECISIONS.md}]
    - rule: "Agent controls auction close timing — no forced timer (PD-1)"
      sources: [{path: docs/DECISIONS.md}]
    - rule: "Agent spending limit configurable per account (Marco: $5K/task, auto-approve under $500)"
      sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]
    - rule: "Agent cannot approve its own deliverables in future oracle-assisted verification"
      phase: phase:v3.0
    # [Entry 3] Agent-to-agent interaction policy
    - rule: "Agent-to-agent negotiation (buyer agent <-> operator agent) deferred to v3.0+"
      phase: phase:v3.0
      note: "Fetch.ai has 3M+ agents with agent-to-agent negotiation. Monitor for competitive pressure."

