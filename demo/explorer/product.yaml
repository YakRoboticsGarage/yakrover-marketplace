legal:
  moats:
    - id: legal:payment_bond_verification
      description: "Bond verification flow (MCL 129.201 for MI public projects >$50K). Operators see 'Payment Bonded' badge before bidding."
      strategic_function: moat
      jurisdictions: [MI, federal]
      threshold_usd: 50000
      sureties: [Travelers, Liberty Mutual, CNA, Zurich, Hartford]
      sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]
      # [2026-03-30] Implementation status:
      implementation:
        circular_570_lookup: real  # 501 companies from fiscal.treasury.gov Excel
        state_licensing_check: real  # 56 state/territory columns from Circular 570
        underwriting_limit_check: real  # Dollar limits from Circular 570
        pdf_bond_extraction: real  # PyMuPDF text extraction
        surety_name_matching: real  # Exact + fuzzy matching against 501 entries
        bond_is_active_check: not_possible  # No public API — surety portals are web forms
        power_of_attorney_auth: not_possible  # Requires surety portal or phone
        am_best_rating: not_possible  # Paid subscription ($5K+/yr)
        sam_gov_exclusion: planned  # Free API available, needs API key registration
      data_source: "auction/data/circular_570.xlsx (real Treasury data, 501 companies)"
      data_updated: "2026-03-30"

    - id: legal:pe_stamped_deliverables
      description: "PLS stamp required on survey plats and deliverables relied upon for construction. All 50 states."
      strategic_function: moat
