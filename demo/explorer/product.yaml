  settlement:
    interface:
      name: SettlementInterface
      methods: [settle, verify, batch_settle, refund]
      decisions: [decision:FD-1]
      # [Entry 2] Refund semantics
      refund_definition:
        signature: "refund(receipt: SettlementReceipt, reason: RefundReason, amount: Decimal) -> RefundReceipt"
        reasons: [buyer_timeout, delivery_failure, dispute_resolution, partial_quality_failure]
        refund_receipt_fields: [original_receipt_id, refund_amount, refund_reason, refund_tx_hash, timestamp]
        mode_constraints:
          immediate: "Refund processed immediately on Base"
          batched: "Refund queued in next DTN bundle — cannot claw back in-transit bundles"
          private: "Refund uses same shielded channel as original settlement"
      # [Entry 4] Hold for disputes
      hold_pending_dispute:
        signature: "hold(receipt: SettlementReceipt, dispute_id: str) -> HoldReceipt"
        description: "Freezes escrowed funds during dispute resolution"
    modes:
      - id: settlement:immediate_transparent
        timing: immediate
        privacy: transparent
        chain: base  # Demo on Base (gas-efficient). Production on Ethereum mainnet. Chain is config value.
        protocol: "EIP-3009 transferWithAuthorization (migrated from ERC-2612 permit in v1.2 per R-034 security audit)"
        currency: usdc
        distribution: "100% to operator (platform fee removed in v1.2/demo-5). Prior: 88/12 via splits.org."
        version_implemented: "v1.1 (ERC-2612 + 88/12 split), v1.2 (EIP-3009 + 100% to operator)"
        escrow_contract: component:escrow_contract
        commitment_hash: "H(request_id || salt)"
        decisions: [decision:FD-1, decision:FD-4, decision:TC-4]
        notes: "v1.1: ERC-2612 permit + splits.org 88/12 split. v1.2: migrated to EIP-3009 (no MEV window, no on-chain allowance) + removed platform fee for demo simplicity. Buyer signs EIP-712 in-browser, Worker submits transferWithAuthorization. Gas ~$0.005 on Base."
        usdc_addresses:
          base_mainnet: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
          base_sepolia: "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
      - id: settlement:immediate_private
        timing: immediate
        privacy: shielded
        chain: base_horizen_l3
        protocol: null
        currency: usdc
        version_implemented: null
        version_designed: "v3.0"
        notes: "Horizen L3 on Base — TEE-based compliant privacy, same EVM. Eval in v1.5 (feature:F-12)."
        decisions: [decision:FD-5]
      - id: settlement:batched_transparent
        timing: batched
        privacy: transparent
        chain: base
        protocol: dtn_settlement_bundle
        currency: usdc
        version_implemented: null
        version_designed: "v4.0"
        notes: "Lunar operations — settlement queued until comm window"
        decisions: [decision:LD-8]
      - id: settlement:batched_private
        timing: batched
        privacy: shielded
        chain: null
        version_implemented: null
        version_designed: "v3.0+"
        notes: "Convergence of lunar + privacy tracks"
    payment_split:
      # [v2.4] Fixed: PD-4 says full payment on delivery, commit-on-hire means permit signed on award but no money moves
      on_acceptance_pct: 0
      on_delivery_pct: 100
      mechanism: "Commit-on-hire: buyer signs gasless authorization (EIP-3009) at award time. Platform executes transferWithAuthorization on delivery acceptance. No money moves until delivery verified."
      platform_fee_pct: 0  # Removed in v1.2/demo-5 for demo simplicity. 12% buyer-side fee planned for production (see financial.revenue_model).
      decisions: [decision:PD-4]
      canonical: true  # [Entry 5] marks this as the canonical location (vs pol:payment_split)
    privacy_constraints:
      - rule: "Robot wallet addresses NEVER in API responses"
        decisions: [decision:PP-2]
        enforced_at: api_layer
      - rule: "Commitment hash, never raw request_id, in on-chain memos"
        decisions: [decision:FD-4]
        enforced_at: settlement_layer
      - rule: "No new metadata fields on ERC-8004 entries"
        enforced_at: discovery_bridge
    sources: [{path: docs/FEATURE_REQUIREMENTS_v15.md}]

  execution_stack:
    sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]
    layers:
      # [Entry 2] Added layer_contract with inputs/outputs/passes_to
      - id: layer:0_regulatory
        name: "Regulatory Compliance"
        description: "LAANC, 811 notification, COA, PE oversight"
        automation_level: partial
        human_required: true
        gap_severity: low
        owner: operator
        layer_contract:
          inputs: [task_spec.regulatory_requirements, site_recon.airspace_class]
          outputs: [laanc_authorization, pe_oversight_assignment, safety_plan]
          passes_to: layer:1_site_access

      - id: layer:1_site_access
        name: "Site Access"
        description: "Physical transport to launch position, gate access, safety compliance"
        automation_level: none
        human_required: true
        gap_severity: medium
        owner: operator
        note: "LOW for on-site robots, HIGH for remote deployment"
        layer_contract:
          inputs: [laanc_authorization, site_recon.boundary_polygon, safety_plan]
          outputs: [robot_at_launch_position, site_conditions_confirmed]
          passes_to: layer:2_mission_planning

      - id: layer:2_mission_planning
        name: "Mission Planning"
        description: "Convert boundary + spec into flight plan / scan plan"
        automation_level: none
        human_required: true  # currently
        gap_severity: high
        planned_tool: plan_flight
        depends_on: [layer:1_site_access]
        inputs_from: [skill:rfp_to_site_recon, skill:rfp_to_robot_spec]
        layer_contract:
          inputs:
            - {field: boundary_polygon, from: skill:rfp_to_site_recon, format: "GeoJSON Polygon"}
            - {field: airspace_class, from: skill:rfp_to_site_recon}
            - {field: obstacles_within_1nm, from: skill:rfp_to_site_recon}
            - {field: sensor_requirements, from: skill:rfp_to_robot_spec}
            - {field: accuracy_required, from: skill:rfp_to_robot_spec}
          outputs: [flight_plan, scan_plan, estimated_duration]
          passes_to: layer:3_mission_execution

      - id: layer:3_mission_execution
        name: "Mission Execution"
        description: "Fly the plan, avoid obstacles, handle weather holds"
        automation_level: partial
        human_required: false
        gap_severity: medium
        depends_on: [layer:2_mission_planning]
        note: "Handled by robot firmware (DJI Pilot, Skydio autonomy, Spot API)"
        layer_contract:
          inputs: [flight_plan, weather_clearance]
          outputs: [raw_sensor_data, flight_log, coverage_report]
          passes_to: layer:4_infield_qc

      - id: layer:4_infield_qc
        name: "In-Field Quality Control"
        description: "Validate capture quality before declaring mission complete"
        automation_level: none
        human_required: true  # currently
        gap_severity: high
        planned_tool: validate_capture
        depends_on: [layer:3_mission_execution]
        checks:
          - {name: point_density_vs_spec, threshold_source: "task_spec.accuracy_required.point_density"}
          - {name: coverage_completeness, threshold: ">=95%"}
          - {name: gsd_achieved, threshold_source: "task_spec.accuracy_required.gsd_cm"}
          - {name: accuracy_estimate, threshold_source: "task_spec.accuracy_required.vertical_ft"}
        layer_contract:
          inputs: [raw_sensor_data, task_spec.accuracy_required]
          outputs: [qc_report, pass_fail_status]
          passes_to: layer:5_deliverable_generation

      - id: layer:5_deliverable_generation
        name: "Deliverable Generation"
        description: "Raw data -> processed outputs (DTM, ortho, contours, reports)"
        automation_level: partial
        human_required: true  # format conversion to agency standards
        gap_severity: medium
        depends_on: [layer:4_infield_qc]
        processing_models: [operator_processes, platform_saas, marketplace_task]
        layer_contract:
          inputs: [raw_sensor_data, qc_report, task_spec.deliverable_formats]
          outputs: [processed_deliverables, pe_review_package]
          passes_to: null  # terminal layer

    coverage_summary:
      skills_cover: "Layer 0 (identified, not executed) + Layer 2 inputs (boundary, constraints)"
      auction_covers: "Operator selection (right robot, certs, location)"
      missing: "Layer 2 (flight planning API), Layer 4 (in-field QC), Layer 5 (automated processing)"

  state_machines:
    task_lifecycle:
      initial_state: posted
      terminal_states: [settled, withdrawn, cancelled, failed]
      sources: [{path: docs/DECISIONS.md, section: "AD-8"}]
      # [Entry 2] Added re_pooled and expired states
      # [Entry 4] Added disputed state
      states:
        posted:
          transitions:
            - {to: bidding, trigger: first_bid_received}
            - {to: withdrawn, trigger: poster_withdraws}
            - {to: expired, trigger: deadline_reached}
        bidding:
          transitions:
            - {to: bid_accepted, trigger: poster_accepts_bid}
            - {to: withdrawn, trigger: poster_withdraws}
            - {to: expired, trigger: deadline_reached}
        bid_accepted:
          transitions:
            - {to: in_progress, trigger: operator_begins_work}
            - {to: re_pooled, trigger: operator_rejects}
            - {to: re_pooled, trigger: operator_timeout}
        re_pooled:
          description: "Task returns to bidding pool after operator rejection or timeout"
          transitions:
            - {to: bidding, trigger: re_opened}
            - {to: withdrawn, trigger: poster_withdraws}
        in_progress:
          transitions:
            - {to: delivered, trigger: operator_delivers}
            - {to: re_pooled, trigger: operator_abandons}
          timeout: {source: "task.sla_seconds", on_expire: abandon_and_repool}
        delivered:
          transitions:
            - {to: verified, trigger: poster_verifies}
            - {to: in_progress, trigger: poster_rejects, action: request_redelivery}
            - {to: disputed, trigger: operator_contests_rejection}
          timeout: {duration_seconds: 3600, on_expire: auto_accept, decisions: [decision:AD-7]}
        # [Entry 4] Disputed state with financial holds
        disputed:
          description: "Buyer rejected delivery and operator contests — funds held pending resolution"
          transitions:
            - {to: mediation, trigger: mediation_initiated}
            - {to: verified, trigger: dispute_resolved_for_operator}
            - {to: re_pooled, trigger: dispute_resolved_for_buyer}
          settlement_action: hold_pending_dispute
          routing:
            under_25k: fast_track
            over_25k: standard
        mediation:
          transitions:
            - {to: arbitration, trigger: mediation_failed}
            - {to: verified, trigger: mediation_resolved_for_operator}
            - {to: cancelled, trigger: mediation_resolved_for_buyer}
        arbitration:
          transitions:
            - {to: verified, trigger: arbitration_for_operator}
            - {to: cancelled, trigger: arbitration_for_buyer}
        verified:
          transitions: [{to: settled, trigger: settlement_complete}]
        settled: {transitions: []}
        withdrawn: {transitions: []}
        cancelled: {transitions: []}
        failed: {transitions: []}
        expired:
          description: "Task deadline reached without completion"
          transitions:
            - {to: cancelled, trigger: poster_cancels}
            - {to: bidding, trigger: poster_extends_deadline}

    award_confirmation:
      sources: [{path: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md}]
      # [Entry 2] Explicit join point to task_lifecycle
      joins_task_lifecycle_at: bid_accepted
      states:
        auction_complete:
          transitions: [{to: recommended, trigger: scoring_complete}]
        recommended:
          transitions:
            - {to: award_confirmed, trigger: buyer_confirms}
            - {to: award_rejected, trigger: buyer_rejects}
          timeout: {duration_hours: 72, reminder: true, expire_days: 7}
        award_rejected:
          transitions:
            - {to: recommended, trigger: next_bidder_promoted}
            - {to: re_pooled, trigger: all_bidders_exhausted}
          rejection_reasons: [conflict_of_interest, insufficient_insurance, dbe_shortfall, prohibited_vendor, prior_bad_experience, pls_not_licensed, debarment]
        award_confirmed:
          transitions: [{to: agreement_pending, trigger: subcontract_generated}]
        agreement_pending:
          transitions: [{to: awarded, trigger: both_parties_sign}]
        awarded:
          transitions: [{to: bid_accepted, trigger: work_authorized, note: "Joins task_lifecycle.bid_accepted"}]

    # [Entry 4] Payment flow state machine
    payment_lifecycle:
      sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]
      initial_state: escrow_funded
      terminal_states: [closed]
      states:
        escrow_funded:
          transitions: [{to: milestone_billed, trigger: operator_submits_invoice}]
        milestone_billed:
          transitions:
            - {to: milestone_approved, trigger: buyer_approves}
            - {to: milestone_billed, trigger: buyer_requests_revision}
        milestone_approved:
          transitions: [{to: payment_released, trigger: payment_processed}]
          prompt_payment_timer: true
        payment_released:
          transitions: [{to: retainage_held, trigger: retainage_withheld}]
        retainage_held:
          transitions: [{to: retainage_released, trigger: substantial_completion}]
        retainage_released:
          transitions: [{to: lien_waiver_exchanged, trigger: waiver_signed}]
        lien_waiver_exchanged:
          transitions: [{to: closed, trigger: closeout_complete}]
        closed: {transitions: []}

  skills:
    # [Entry 2] Expanded with references, validation_scripts, examples
    - id: skill:rfp_to_robot_spec
      status: implemented
      version: "1.0"
      description: "Extract task specification from an RFP document"
      inputs: [rfp_document]
      outputs:
        - sensor_requirements
        - accuracy_requirements
        - deliverable_formats
        - budget_ceiling_usd
        - regulatory_requirements
      references:
        - path: .claude/skills/rfp-to-robot-spec/michigan-standards.md
        - path: .claude/skills/rfp-to-robot-spec/aashto-federal-standards.md
