personas:
  - id: persona:sarah
    name: "Sarah — Facilities Manager"
    role: buyer
    phase: phase:v1.0
    jtbd:
      - situation: "Manages a warehouse network and needs periodic environmental readings (temperature, humidity) across facilities"
        motivation: "Get sensor data without coordinating directly with hardware operators or understanding robot capabilities"
        outcome: "Sensor readings delivered to dashboard within hours of request"
    pain: "Coordinating with individual robot operators is manual and time-consuming for routine tasks"
    sources: [{path: docs/ROADMAP_v4.md}]

  - id: persona:marco
    name: "Marco Reyes — Senior Estimator"
    role: buyer
    phase: phase:v1.5
    company: "Ridgeline Civil ($180M revenue, 340 employees, Phoenix HQ)"
    discretionary_authority_usd: 15000
    active_bids: "4-6 simultaneous"
    jtbd:
      - situation: "Spring letting season. 3 bids overlap. Both in-house survey crews booked through October. External crews quote 5-6 day turnaround at $8-10K."
        motivation: "Get accurate topographic and subsurface data into Civil 3D before Thursday's bid deadline without delaying the estimate."
        outcome: "Bid submitted with earthwork quantities derived from PLS-stamped survey data. Won $14.2M highway contract."
    pain: "Scheduling, not cost. Survey crew unavailability during peak season is the binding constraint. Marketplace reduces turnaround from 5-6 days to same-day flight with 24hr delivery."
    evidence:
      - {source: "SYNTHESIS_JTBD_WEDGE_PROPOSAL.md", finding: "Construction site surveying scored 4.25/5 across 8 verticals. Pre-bid topo is the highest-frequency task type."}
      - {source: "USER_JOURNEY_CONSTRUCTION_v01.md", finding: "Marco's journey validated across 5 variants: happy path, weather hold, no robots, rejection recovery, recurring task."}
      - {source: "GC_BRIEFING_PACKETS.md", finding: "0/15 target Michigan GCs have in-house survey departments. All outsource to PLS-stamped firms."}
      - {source: "RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md", finding: "Survey subs wait 45-90 days for payment in practice. Marketplace pays on verified delivery."}
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}, {path: docs/research/SYNTHESIS_JTBD_WEDGE_PROPOSAL.md}]

  - id: persona:alex
    name: "Alex — Independent Operator"
    role: operator
    phase: phase:v2.0
    jtbd:
      - situation: "Owns DJI M350+L2 ($40K invested). Gets 2-3 survey jobs per month via word of mouth. Equipment sits idle 70%+ of available days."
        motivation: "Fill idle equipment days and reduce dependence on cold-calling GCs for work."
        outcome: "Consistent task flow from marketplace. First $2,200 earned within a week of registration."
    pain: "Client acquisition is the primary reported failure mode for independent drone operators — not certification, not equipment cost, not technical capability."
    equipment: [equipment:dji_m350, equipment:zenmuse_l2]
    evidence:
      - {source: "RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md", finding: "'Can't find clients' listed as #1 cause of failure for new operators."}
      - {source: "RESEARCH_MARKETPLACE_JUSTIFICATION.md", finding: "$150K robot idle 70% costs $105K/yr in depreciated downtime. Multi-vendor bidding yields 10-25% savings."}
      - {source: "OPERATOR_BRIEFING_PACKETS.md", finding: "14 Michigan operators profiled. Drone Brothers (350+ pilots) operates the closest existing analog to this model."}
      - {source: "RESEARCH_BUY_A_ROBOT_STORY.md", finding: "Hardware entry ladder starts at EUR 30-50 (Tumbller). Professional tier (DJI M350+L2) is $26-28K."}
    sources: [{path: docs/research/RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md}, {path: github.com/rafaeldavid/robotTAM/outreach/operator-briefing-packets.md}]

  # [Entry 3] New persona: Controller
  - id: persona:controller
    name: "Controller / AP Manager"
    role: controller
    phase: phase:v1.5
    jtbd:
      - situation: "CFO directs controller to set up the company's marketplace account and configure financial controls before estimators begin using it."
        motivation: "Configure payment methods, insurance defaults, and agent spending limits. Ensure compliance with internal procurement policies."
        outcome: "Company account operational with appropriate financial guardrails. Estimators can post tasks within pre-approved budget limits."
    evidence:
      - {source: "USER_JOURNEY_CONSTRUCTION_v01.md", finding: "Controller sets $5K/task agent limit, $500 auto-approve threshold. Three payment tracks: bond certificate, ACH/escrow, prepaid credit."}
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]

  - id: persona:diane
    name: "Diane — Program Manager"
    role: buyer
    phase: phase:v2.0
    jtbd:
      - situation: "Manages government infrastructure inspections where task specifications contain classified or sensitive facility details."
        motivation: "Commission robot survey work without exposing sensitive site information to operators who are not cleared or need-to-know."
        outcome: "Encrypted task specs, privacy-preserving settlement, and audit trails that satisfy government compliance requirements."
    evidence:
      - {source: "RESEARCH_PRIVACY_CHAINS.md", finding: "Horizen L3 on Base is the leading candidate for Mode 2 (immediate private) settlement. EU AMLR Article 79 constrains fully-private chains."}
      - {source: "FOUNDATIONAL_TECH_ANALYSIS.md", finding: "Privacy is application-layer (TEE/viewer keys), not chain-layer. Platform-mediated TEE is the AMLR compliance strategy."}
    sources: [{path: docs/ROADMAP_v4.md}, {path: docs/research/technical/RESEARCH_PRIVACY_CHAINS.md}]

  - id: persona:mine_surveyor
    name: "Mine Surveyor"
    role: buyer
    phase: phase:v2.5
    jtbd:
      - situation: "Manages surveying for an active mining or quarrying operation. Needs volumetric stockpile measurements and highwall stability assessments on a recurring schedule."
        motivation: "Get accurate volumetric data for inventory reconciliation and safety compliance without maintaining a dedicated survey crew."
        outcome: "Monthly volumetric reports with point cloud deliverables. $5-20K per survey."
    evidence:
      - {source: "RESEARCH_WEDGE_INDUSTRY_ANALYSIS.md", finding: "Mining scores 3.95/5 — same equipment and operators as construction, strongest lunar sensor transfer path."}
    sources: [{path: docs/research/RESEARCH_WEDGE_INDUSTRY_ANALYSIS.md}]

  - id: persona:bridge_pm
    name: "Bridge Program Manager"
    role: buyer
    phase: phase:v3.0
    jtbd:
      - situation: "Responsible for federally mandated bridge inspections across a state DOT portfolio. 23 CFR 650 requires biennial inspection of all public bridges."
        motivation: "Commission element-level bridge inspections using drone/robot platforms that produce NBI-formatted deliverables, reducing inspector time on-structure."
        outcome: "NBI-compliant inspection reports generated from robot-captured data. Reduced lane closures and inspector safety exposure."
    evidence:
      - {source: "RESEARCH_WEDGE_INDUSTRY_ANALYSIS.md", finding: "Infrastructure monitoring scores 3.65/5. 600K+ US bridges require mandated inspection — regulatory-driven demand."}
      - {source: "RESEARCH_ROBOTS_AND_SENSORS.md", finding: "Flyability ELIOS 3 ($50-80K) for confined-space inspection, Gecko TOKA for climbing/crawling. Specialized form factors required."}
    sources: [{path: docs/research/RESEARCH_WEDGE_INDUSTRY_ANALYSIS.md}]

  - id: persona:kenji
    name: "Kenji — JAXA Project Coordinator"
    role: buyer
    phase: phase:v4.0
    jtbd:
      - situation: "Coordinates lunar surface survey operations for Artemis-program construction. Communication latency of 1.3-8 seconds RTT. Multi-hour blackouts between relay windows."
        motivation: "Dispatch survey tasks to lunar rovers from Earth using the same auction and settlement infrastructure proven in construction operations."
        outcome: "Terrain mapping tasks dispatched via DTN, executed autonomously during comm blackouts, settled on-chain when relay window opens."
    evidence:
      - {source: "SYNTHESIS_JTBD_WEDGE_PROPOSAL.md", finding: "LiDAR, GPR, photogrammetry, and thermal sensors transfer directly from construction to lunar operations."}
      - {source: "ROADMAP_v4.md", finding: "Lunar phase requires DTN/Bundle Protocol (RFC 9171), thin Moon-side agent in C/Rust, and batched settlement tolerating days-long delay."}
    sources: [{path: docs/ROADMAP_v4.md}]

  - id: persona:claude_agent
    name: "Claude (AI Agent)"
    role: agent
    phase: phase:v1.0
    jtbd:
      - situation: "Buyer describes survey need in natural language. Agent must translate to structured task specification, select appropriate sensor types, and manage the auction lifecycle."
        motivation: "Automate the RFP-to-task-spec translation, bid evaluation, compliance verification, and delivery QA that would otherwise require a procurement specialist."
        outcome: "Buyer gets qualified bids within hours without needing to understand drone types, sensor specifications, or data formats."
    capabilities:
      - "Translate natural language to structured task specs with ASPRS accuracy classes and USGS quality levels"
      - "Decompose multi-sensor requests into parallel subtasks (e.g., aerial LiDAR + GPR)"
      - "Evaluate bids on capability, reputation, price using vertical-specific scoring profiles"
      - "Schedule around weather windows via NOAA Aviation Weather API"
      - "Auto-schedule recurring progress monitoring over project lifecycle"
    # [Entry 3] Agent authorization boundaries
    authorization:
      spending_limit_per_task_usd: 5000
      auto_approve_under_usd: 500
      configurable_by: persona:controller
    failure_modes:
      - "Misparses RFP — decomposes into wrong sensor types for the project requirements"
      - "Recommends filtered-out bidder — insurance or license gap missed in compliance check"
      - "Over-decomposes simple task into unnecessary subtasks, increasing cost"
    evidence:
      - {source: "RESEARCH_MARKETPLACE_JUSTIFICATION.md", finding: "McKinsey: agentic AI in procurement delivers 19-21% lower costs, 58% shorter cycles."}
      - {source: "USER_JOURNEY_CONSTRUCTION_v01.md", finding: "Agent decomposes 'I need topo for SR-89A' into 2 parallel tasks (aerial LiDAR + GPR), selects sensors, evaluates bids."}
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]

  - id: persona:platform_admin
    name: "Platform Administrator"
    role: admin
    phase: phase:v1.5
    jtbd: "Monitor health, manage payouts, oversee settlement"
    sources: [{path: docs/ROADMAP_v4.md}]

# ============================================================
# JOURNEYS — pipeline-stage model with actor handoffs
# [Entry 3] Added operator, agent, and controller journeys
# [Entry 3] Added implementation_status to stages
# [Entry 5] Normalized actor references to use component: prefix
# ============================================================
journeys:
  - id: journey:pre_bid_survey
    name: "Pre-Bid Survey (Happy Path)"
    persona: persona:marco
    phase: phase:v1.5
    implementation_status: partial
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]
    stages:
      - actor: persona:marco
        action: "Types natural language request to Claude"
        example: "I need topo and subsurface data for SR-89A widening, 12 acres, bid deadline Thursday"
        implementation_status: implemented
      - actor: persona:claude_agent
        action: "Parses request into 2 parallel task specs (aerial LiDAR + GPR)"
        tools: [skill:rfp_to_robot_spec, skill:rfp_to_site_recon]
        implementation_status: implemented
      - actor: component:auction_engine
        action: "Opens RFQ, collects bids (6 robots, 4 operators), filters on hard constraints"
        duration: "~2 hours"
        implementation_status: implemented
      - actor: persona:claude_agent
        action: "Runs automated checks (COI, PLS, Part 107, debarment) and presents recommended winners"
        implementation_status: partial
        note: "Debarment check not yet implemented"
      - actor: persona:marco
        action: "Reviews qualifications, confirms award"
        duration: "3 minutes"
        implementation_status: planned
      - actor: component:auction_engine
        action: "Generates subcontracts (ConsensusDocs 751), both operators countersign"
        implementation_status: planned
      - actor: equipment:dji_m350
        action: "SkyView flies corridor Wednesday AM — 2.5 hours, 4.2M pts/sec"
        implementation_status: planned
      - actor: equipment:spot
        action: "RedRock deploys Spot+GPR Wednesday PM — 3.5 hours"
        implementation_status: planned
      - actor: component:settlement
        action: "Settlement triggers: $3,600 total ($2,200 SkyView + $1,400 RedRock)"
        implementation_status: planned
      - actor: persona:marco
        action: "Imports LandXML into Civil 3D, completes earthwork takeoff in 4 hours, bids $14.2M"
        implementation_status: planned
    outcome: "Request to bid-ready data in ~3 days. Human crew: 10-12 days. Saved $4,900 (58%) + won the contract."
    failure_modes:
      - ref: journey:no_robots_available
      - ref: journey:weather_hold

  - id: journey:no_robots_available
    name: "No Robots Available (Journey B)"
    persona: persona:marco
    phase: phase:v1.5
    implementation_status: implemented
    outcome: "Immediate notification, zero charge, demand logged for heatmap"
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]

  - id: journey:weather_hold
    name: "Mid-Task Weather Hold (Journey C)"
    persona: persona:marco
    phase: phase:v1.5
    implementation_status: planned
    outcome: "System pauses, preserves 40% partial data, auto-resumes when NOAA clears, merges seamlessly"
    sources: [{path: docs/USER_JOURNEY_CONSTRUCTION_v01.md}]

  - id: journey:reject_recovery
    name: "Award Rejection and Recovery"
    persona: persona:marco
    phase: phase:v2.0
    implementation_status: broken
    known_issues:
      - {ref: docs/feedback/FEEDBACK_REJECT_DEAD_END.md, description: "Reject button leads to dead-end in current demo"}
    stages:
      - actor: persona:marco
        action: "Rejects recommended winner (reason: conflict, bad experience, DBE shortfall, etc.)"
        implementation_status: implemented
      - actor: component:auction_engine
        action: "Walks ranked list to next bidder; runs same automated checks"
        implementation_status: broken
      - actor: persona:marco
        action: "Reviews next candidate, confirms or rejects again"
        implementation_status: planned
      - actor: component:auction_engine
        action: "If all bidders exhausted: offer re-post, skip, or withdraw"
        implementation_status: planned
    sources: [{path: docs/research/RESEARCH_REJECT_RECOVERY_FLOW.md}]

  # [Entry 3] New journey: Operator onboarding
  - id: journey:operator_onboarding
    name: "Operator Onboarding (Alex)"
    persona: persona:alex
    phase: phase:v2.0
    implementation_status: partial
    sources: [{path: docs/research/RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md}]
