# ============================================================
# VISION — stable identity + testable thesis + positioning
# ============================================================
vision:
  north_star: "Reverse auction marketplace connecting construction buyers with certified drone/robot survey operators."
  mechanism: reverse_auction_marketplace
  category: robot_task_marketplace
  tagline: "Buyers post survey requirements. Qualified operators bid. Platform verifies deliverables and settles payment."
  sources: [{path: docs/research/SYNTHESIS_JTBD_WEDGE_PROPOSAL.md}]

  thesis:
    claim: "Construction site surveying is the right wedge market for a robot task auction marketplace"
    confidence: 0.8
    evidence:
      - "US construction surveying = $8B/yr; pre-bid surveys = $1.2B/yr"
      - "67% of major US construction firms already use drones"
      - "Sensor stack (LiDAR, RTK-GPS, GPR, photogrammetry) transfers directly to lunar ops"
      - "No direct competitor exists — auction + physical robots + AI agents is an open gap"
    sources: [{path: docs/research/SYNTHESIS_JTBD_WEDGE_PROPOSAL.md}]

  positioning:
    vs_botshare: "Botshare is fixed-price robot rental (China, 600+ providers). This platform uses competitive bidding with qualification-based scoring."
    vs_rentahuman: "RentAHuman dispatches human workers for AI agent tasks (600K+ workers). Same dispatch architecture, but supply side is certified robot operators rather than human labor."
    vs_fabric_openmind: "Fabric/OpenMind builds robot economy protocol infrastructure on Base ($20M Pantera round). This platform operates at the marketplace application layer, not the protocol layer."
    vs_akash: "Akash Network proves reverse auction works for compute resources on Cosmos. This platform applies the same mechanism to physical survey tasks."
    direct_competitors: none
    sources: [{path: docs/research/RESEARCH_COMPETITIVE_LANDSCAPE.md}]

# ============================================================
# BET CHAIN — dependent strategic bets with evidence
# [Entry 5] gravity_effect on ALL bets, not just 4 of 7
# ============================================================
bet_chain:
  sources: [{path: docs/research/DEBATE_SCHEMA_STRATEGIST.md}]
  bets:
    - id: bet:survey_bottleneck_real
      claim: "Primary buyer pain point is survey scheduling speed, not unit cost. Crew unavailability during peak season costs mid-size GCs an estimated 2-3 missed bids per quarter."
      confidence: 0.85
      gravity_effect: "Foundational assumption. If scheduling is not the primary pain point, the construction wedge thesis does not hold. Requires direct GC validation."
      evidence_for:
        - "Marco's crews booked solid March-October; 3 overlapping bids each spring letting season"
        - "Human crew: $8-10K, 5-6 day turnaround. Marketplace: $1.5-3K, same-day flight, 24hr delivery"
      evidence_against:
        - "Some GCs may have sufficient in-house survey capacity"
      falsified_by: "Zero GCs sign up within 90 days citing scheduling pain"
      validated_by: "12+ senior estimators at ENR Top 400 regional firms cite scheduling as top-3 pain"
      depends_on: []
      enables: [bet:construction_wedge_works]
      sources: [{path: docs/research/SYNTHESIS_JTBD_WEDGE_PROPOSAL.md}]

    - id: bet:robot_supply_exists
      claim: "Sufficient Part 107 drone operators with survey-grade equipment exist in target geographies (MI, AZ, NV, NM) to serve initial demand"
      gravity_effect: "Supply-side assumption. If operator density is insufficient, the marketplace cannot fulfill posted tasks. Validate by operator registration rate in target geos."
      confidence: 0.75
      evidence_for:
        - "368,600+ FAA Part 107 holders (end 2023), growing ~50K/year"
        - "67% of major US construction firms already use drones"
        - "DJI M350+L2 is ~$27K — hundreds of independent operators own this config"
      evidence_against:
        - "Rural coverage gaps (Journey B: Raton, NM — nearest operator 180 miles away)"
        - "Operators may resist automated bid engines"
      falsified_by: "Fewer than 5 operators register in AZ/NV/NM within 60 days of launch"
      validated_by: "5+ operators register within 60 days without paid acquisition"
      depends_on: []
      enables: [bet:construction_wedge_works]
      sources: [{path: docs/research/RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md}]

    - id: bet:agent_mediation_adds_value
      claim: "Agent-assisted task specification adds measurable value over a manual booking interface — decomposing RFPs into sensor-specific tasks, evaluating operator qualifications, and validating deliverables"
      gravity_effect: "Differentiation assumption. If buyers can post tasks equally well without agent assistance, the platform reduces to a directory. Validate by comparing time-to-spec and task completion rates with and without agent."
      confidence: 0.8
      evidence_for:
        - "McKinsey: agentic AI in procurement delivers 19-21% lower costs, 58% shorter cycles"
        - "Marco says 'I need topo for SR-89A' — agent decomposes into 2 parallel tasks, selects sensors, evaluates bids"
        - "Portal requires buyer to know robot types, sensor specs, data formats — which is the expertise they are buying"
      evidence_against:
        - "Simple repeat tasks (monthly progress flights) may not need agent intelligence"
      falsified_by: "Buyers consistently bypass agent to post tasks manually"
      validated_by: "Agent-mediated tasks complete 50%+ faster than manual-posted tasks"
      depends_on: []
      enables: [bet:construction_wedge_works]
      sources: [{path: docs/research/RESEARCH_MARKETPLACE_JUSTIFICATION.md}]

    - id: bet:construction_wedge_works
      claim: "Construction site surveying scores highest (4.25/5) across 8 evaluated verticals on market size, operator availability, regulatory clarity, and sensor transfer potential"
      confidence: 0.8
      gravity_effect: "Convergence assumption. Depends on all three precursor assumptions holding. If construction wedge fails, subsequent vertical expansion has no foundation."
      depends_on: [bet:survey_bottleneck_real, bet:robot_supply_exists, bet:agent_mediation_adds_value]
      enables: [bet:mining_expansion, bet:infra_expansion, bet:lunar_transfer]
      falsified_by: "No operator signs up in target geo within 90 days of launch"
      validated_by: "10 GC customers complete paid surveys with NPS > 40"
      sources: [{path: docs/research/RESEARCH_WEDGE_INDUSTRY_ANALYSIS.md}]

    - id: bet:mining_expansion
      claim: "Mining and quarrying scores 3.95/5. Same equipment (LiDAR drones, ground robots) and operators serve both verticals."
      confidence: 0.7
      gravity_effect: "Expansion assumption. Tests whether the marketplace generalizes beyond construction. If mining operators reject the model, vertical expansion strategy requires revision."
      depends_on: [bet:construction_wedge_works]
      enables: [bet:lunar_transfer]
      falsified_by: "Mining operators reject marketplace model due to geographic concentration"
      validated_by: "3+ mining operators register and complete paid volumetric surveys"
      sources: [{path: docs/research/RESEARCH_WEDGE_INDUSTRY_ANALYSIS.md}]

    - id: bet:infra_expansion
      claim: "Infrastructure monitoring scores 3.65/5. 600K+ US bridges require federally mandated inspection (23 CFR 650), creating regulatory-driven demand."
      confidence: 0.7
      gravity_effect: "Regulatory-pull assumption. Unlike construction (buyer-driven demand), infrastructure has a federal inspection mandate. Risk: specialized form factors (bridge crawlers, confined-space drones) may fragment the supply side."
      depends_on: [bet:construction_wedge_works]
      enables: [bet:lunar_transfer]
      falsified_by: "Specialized form factors (bridge crawlers) cannot be aggregated on supply side"
      validated_by: "1+ DOT pilot produces NBI-formatted deliverables via marketplace"
      sources: [{path: docs/research/RESEARCH_WEDGE_INDUSTRY_ANALYSIS.md}]

    - id: bet:lunar_transfer
      claim: "Earth construction/mining sensor stacks and workflows transfer to lunar surface operations"
      gravity_effect: "Long-horizon assumption. If lunar-specific requirements (radiation hardening, vacuum operation, comm latency) invalidate Earth-proven workflows, lunar operations become a separate product rather than a vertical extension."
      confidence: 0.6
      depends_on: [bet:construction_wedge_works, bet:mining_expansion]
      enables: []
      falsified_by: "Lunar-specific requirements (radiation hardening, vacuum operation, comm latency) invalidate Earth-proven workflows"
      validated_by: "Simulated lunar task completes using Earth-proven auction engine + DTN protocol"
      sources: [{path: docs/research/SYNTHESIS_JTBD_WEDGE_PROPOSAL.md}]

# [Entry 1] Validation register — experiments that update bet confidence
validation_register:
  sources: [{path: docs/research/COMPETITION_1_STRATEGY.md}]
  experiments:
    - id: experiment:gc_discovery_interviews
      bet_tested: bet:survey_bottleneck_real
      method: "Interview 20 senior estimators at ENR Top 400 regional firms"
      success_signal: "12+ cite scheduling as top-3 pain"
      status: not_started
      confidence_delta: "+0.10 if positive, -0.30 if negative"
    - id: experiment:operator_signup_60day
      bet_tested: bet:robot_supply_exists
      method: "Launch operator registration in AZ/NV/NM"
      success_signal: "5+ operators register within 60 days"
      status: not_started
      confidence_delta: "+0.10 if positive, -0.25 if negative"
    - id: experiment:agent_vs_manual_time
      bet_tested: bet:agent_mediation_adds_value
      method: "A/B test time-to-spec for 10 tasks: agent-mediated vs manual posting"
      success_signal: "Agent-mediated completes 50%+ faster"
      status: not_started
      confidence_delta: "+0.10 if positive, -0.20 if negative"
    - id: experiment:first_10_gc_nps
      bet_tested: bet:construction_wedge_works
      method: "Survey first 10 paying GC customers"
      success_signal: "NPS > 40"
      status: not_started
      confidence_delta: "+0.15 if positive, -0.25 if negative"

# ============================================================
# UNKNOWNS — things we don't know, with severity and deadlines
# [Entry 5] Added threatens: links to bets
# [Entry 5] Added implied_critiques per thejaymo pattern
# ============================================================
unknowns:
  sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]
  register:
    - id: unknown:flight_planning_api
      question: "No flight planning API exists in the MCP tool set — how does a robot get from boundary polygon to waypoints?"
      severity: blocks_launch
      gap_reference: layer:2_mission_planning
      threatens: [bet:agent_mediation_adds_value]
      implied_critique: "The agent cannot orchestrate what it cannot plan. Without this, agent mediation is limited to bid evaluation."
      mitigation: "Build plan_flight MCP tool that calls DJI Pilot 2 / Pix4Dcapture API"
      resolve_by: phase:v2.0
      sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]

    - id: unknown:autonomous_terrain_nav
      question: "Autonomous navigation over unstructured construction terrain is unsolved at required reliability"
      severity: degrades_experience
      threatens: [bet:robot_supply_exists]
      implied_critique: "If robots cannot self-deploy, the marketplace is a human-mediated dispatch service, not an autonomous marketplace."
      mitigation: "Rely on operator-deployed robots (human transports to site) for v1.5-v2.0; on-site deployment model"
      resolve_by: phase:v2.0
      sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]

    - id: unknown:infield_qc
      question: "No in-field data quality validation — robot cannot verify capture meets spec before leaving site"
      severity: blocks_launch
      gap_reference: layer:4_infield_qc
      threatens: [bet:construction_wedge_works]
      implied_critique: "Without QC, the marketplace delivers data of unknown quality. GCs will not trust unvalidated data for bids."
      mitigation: "Build validate_capture MCP tool checking point density, coverage, GSD against task spec"
      resolve_by: phase:v2.0
      # [v2.4] R-009 automated research: PDAL and laspy 2.x libraries identified for LAS/LAZ validation.
      # USGS LBS v2.1 defines automatable acceptance checklist. DeliveryPayload.data is currently open dict with zero validation.
      research_update: {ref: "docs/research/automated/R-009_las_laz_point_cloud_validation.md", finding: "PDAL Python bindings are the path to automated LAS QA"}
      sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]

    - id: unknown:operator_adoption
      question: "Will operators adopt automated bid engines or resist?"
      severity: degrades_experience
      threatens: [bet:robot_supply_exists]
      implied_critique: "Automated bidding is the core product thesis. If operators insist on manual bid review, marketplace speed advantage shrinks."
      mitigation: "Start with manual bid review; auto-bidding is opt-in"
      resolve_by: phase:v1.5
      sources: [{path: docs/research/RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md}]

    - id: unknown:payment_bond_scale
      question: "Does payment bond verification scale beyond Michigan?"
      severity: limits_scale
      threatens: [bet:construction_wedge_works]
      implied_critique: "Bond verification is listed as a moat, but moats that do not scale are just local features."
      mitigation: "Start with top 5 sureties (Travelers, Liberty Mutual, CNA, Zurich, Hartford); expand"
      resolve_by: phase:v2.0
      sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]
      # [2026-03-30] PARTIALLY RESOLVED: Circular 570 Excel contains 501 surety companies
      # with state licensing for all 56 US states/territories. Verification scales nationally.
      # Remaining gap: real-time bond status (active/cancelled) requires surety portal access.
      # No surety company offers a public REST API. Verification portals are web forms only.
      # Surety companies with online verification: Merchants Bonding, Intact, Frankenmuth.
      # Major sureties (Travelers, Liberty Mutual, CNA, Zurich, Hartford): phone/email only.
      resolution_status: partially_resolved
      resolution_note: "Circular 570 verification scales nationally (501 companies, all states). Bond-is-active verification requires surety partnerships — no public API exists."

    - id: unknown:eu_amlr_interpretation
      question: "EU AMLR Article 79 (July 2027) bans CASPs from handling privacy-preserving digital assets — how broadly interpreted?"
      severity: limits_scale
      threatens: [bet:lunar_transfer]
      implied_critique: "If privacy rails are blocked in the EU, shielded settlement modes cannot serve European space agencies."
      mitigation: "Platform-mediated TEE model designed for most conservative interpretation; legal opinion before v3.0"
      resolve_by: phase:v3.0
      sources: [{path: docs/research/RESEARCH_PRIVACY_CHAINS.md}]

    - id: unknown:horizen_l3_viability
      question: "Is Horizen L3 on Base mature enough for Mode 2 settlement?"
      severity: degrades_experience
      threatens: [bet:construction_wedge_works]
      implied_critique: "The privacy roadmap depends on a single L3 provider. If they fail, privacy settlement is delayed indefinitely."
      mitigation: "v1.5 evaluation (feature:F-12); settlement abstraction ensures fallback to app-layer TEE on Base"
      resolve_by: phase:v1.5
      sources: [{path: docs/FEATURE_REQUIREMENTS_v15.md}]

    - id: unknown:regulatory_autonomous_drone
      question: "Regulatory status of fully autonomous commercial drone operations is ambiguous (Part 108 BVLOS is new)"
      severity: limits_scale
      threatens: [bet:robot_supply_exists, bet:agent_mediation_adds_value]
      implied_critique: "If autonomous ops stay heavily restricted, the marketplace must broker human-piloted missions — reducing the AI agent value prop."
      mitigation: "Part 107 + LAANC sufficient for v1.5-v2.0; monitor Part 108 adoption"
      resolve_by: phase:v2.0
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: unknown:lunar_comm_relay
      question: "Lunar Pathfinder provides intermittent coverage — multi-hour blackouts are default"
      severity: blocks_launch  # for v4.0 specifically
      threatens: [bet:lunar_transfer]
      implied_critique: "DTN tolerance is necessary but the business model must also tolerate days-long settlement delays."
      mitigation: "Idempotent DTN bundles; batched settlement tolerates hours-to-days delay; <50% uptime assumed"
      resolve_by: phase:v4.0
      sources: [{path: docs/ROADMAP_v4.md}]

    # [Entry 4] New unknowns from legal critique
    - id: unknown:money_transmission_escrow
      question: "Does holding funds in a platform-controlled escrow account make us a money transmitter?"
      severity: blocks_launch
      threatens: [bet:construction_wedge_works]
      implied_critique: "Escrow is in the architecture but licensing is not. Launching escrow without MTL is a federal crime."
      mitigation: "Legal review before escrow launch; Stripe covers v1.5 prepaid model. Escrow at v2.5 requires state-by-state analysis."
      resolve_by: phase:v2.5
      sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]

