# ============================================================
# PITCH INSIGHTS — synthesized critique perspectives
# [v2.2] From 3 pitch critique documents
# ============================================================
pitch_insights:
  gc_perspective:
    source: "VP of Preconstruction, $200M Michigan highway GC"
    core_message: "Pitch the deliverable, not the platform"
    key_feedback:
      - "Lead with emergency re-survey use case, not routine survey cycle"
      - "60-80% cost reduction claim is a red flag. Survey is 0.3-0.5% of project cost. Wrong thing to optimize."
      - "I want speed on the deliverable, not speed on the bid"
      - "PLS-affiliated is meaningless. Either the deliverable carries a PLS stamp or it doesn't."
      - "Show me LandXML that imports into HeavyBid. One real project example beats the entire pitch."
      - "Blockchain, MCP, ERC-8004, USDC are negative signals in construction"
    pilot_requirement: "Free 10-acre topo survey, LandXML for HeavyBid, Michigan PLS stamp, 0.1 ft vertical match"
    sources: [{path: github.com/rafaeldavid/robotTAM/critiques/pitch-critique-construction.md}]

  vc_perspective:
    source: "Simulated seed-stage partner, construction-tech fund"
    core_message: "One LOI + one operator agreement + one co-founder = fundable"
    verdict: "Interesting thesis, not yet fundable. Would take a second meeting."
    strengths:
      - "Problem slide is the best slide. 43-RFP decomposition shows real homework."
      - "0/15 GCs with in-house drone survey is genuine greenfield signal"
      - "12% buyer-side with operator-gets-100% is smart positioning"
    weaknesses:
      - "Zero customers, zero revenue, zero LOIs. Dev metrics are not traction."
      - "0 direct competitors on cover slide is investor repellent"
      - "Revenue in M4 with no team and no co-founders is not credible"
      - "$12-15M cap with no revenue and no team: comparable seed rounds had founding teams of 2-3"
      - "Lunar slide undermines construction credibility"
    competitive_framing:
      x_axis: "Procurement Automation (manual/phone ... AI-agent-mediated)"
      y_axis: "Physical Execution (software-only ... owns task completion)"
      white_space: "Nobody automates procurement AND delivers physical execution"
    sources: [{path: github.com/rafaeldavid/robotTAM/critiques/pitch-critique-vc.md}]

  cto_perspective:
    source: "Senior engineer, marketplace platform background, evaluating co-founder role"
    core_message: "Deliverable QA pipeline is the hardest unsolved piece"
    verdict: "Not yet, but interested. Needs one completed transaction."
    key_risks:
      - "Four hard problems stitched together as one product: NLP extraction, task decomposition, operator matching, deliverable QA"
      - "Cold start / chicken-and-egg not addressed in pitch"
      - "Platform promises Civil 3D-ready deliverables but has no data processing pipeline"
      - "12% take on $72K task ($8,640 fee) invites disintermediation after first match"
      - "On-chain settlement is premature. No GC or operator is asking for USDC."
    join_requirements:
      - "One completed transaction (even manually brokered)"
      - "Drop crypto and lunar from near-term plan"
      - "Conversations with 3+ actual GCs"
      - "Founder-market fit story, not just a bullet point"
    sources: [{path: github.com/rafaeldavid/robotTAM/critiques/pitch-critique-technical.md}]

  synthesis:
    all_three_agree_on:
      - "The domain research is genuine and impressive"
      - "Zero customer validation is the single biggest gap"
      - "Lunar/blockchain are distractions in customer-facing materials"
      - "One real deliverable on one real project matters more than the platform"
    recommended_next_action: "Complete one manually-brokered survey transaction with a Michigan GC. Produce a PLS-stamped LandXML deliverable that imports into HeavyBid or Civil 3D."

