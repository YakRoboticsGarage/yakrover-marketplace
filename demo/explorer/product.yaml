    bottleneck: "Finding first client — not certification or equipment. Marketplace solves this."
    sources: [{path: docs/research/RESEARCH_OPERATOR_ONBOARDING_CONSTRUCTION.md}]
    steps:
      - name: "FAA Part 107"
        duration: "2-4 weeks"
