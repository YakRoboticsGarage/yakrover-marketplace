    planned:
      - name: plan_flight
        status: planned
        gap_reference: unknown:flight_planning_api
        description: "Convert boundary polygon + sensor + altitude + overlap into waypoints"
        parameters:
          - {name: boundary, type: "GeoJSON Polygon", required: true}
          - {name: sensor_id, type: string, required: true}
          - {name: altitude_agl_m, type: number, required: true}
          - {name: overlap_pct, type: number, required: true, default: 70}
        returns: {type: FlightPlan, fields: [waypoints, estimated_duration_min, estimated_coverage_km2]}
        errors: [INVALID_BOUNDARY, SENSOR_NOT_FOUND, ALTITUDE_OUT_OF_RANGE]
        sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]
      - name: validate_capture
        status: planned
        gap_reference: unknown:infield_qc
        description: "Check point density, coverage, GSD against task spec before declaring complete"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: capture_path, type: string, required: true}
        returns: {type: QCReport, fields: [pass, point_density_achieved, coverage_pct, gsd_cm, accuracy_estimate]}
        errors: [TASK_NOT_FOUND, CAPTURE_NOT_FOUND, QC_CHECK_FAILED]
        sources: [{path: docs/research/ANALYSIS_AUTONOMOUS_EXECUTION_GAPS.md}]
      - name: file_laanc
        status: identified
        description: "File LAANC authorization via Aloft/DroneUp API"
        parameters:
          - {name: boundary, type: "GeoJSON Polygon", required: true}
