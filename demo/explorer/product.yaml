    enum: [built, next, future, planned, implemented, identified]
    description: "Lifecycle status of any capability, phase, or tool"
  gap_severity:
    enum: [blocks_launch, degrades_experience, limits_scale, low, medium, high]
    description: "Impact severity for unknowns and execution gaps"
  automation_level:
    enum: [none, partial, full]
    description: "How automated a layer or capability is"
  role:
    enum: [buyer, operator, agent, admin, controller]
    description: "User role in the marketplace"
  strategic_function:
    enum: [moat, trust_building, compliance, risk_mitigation]
    description: "Why a legal or compliance element exists"
  relationship_type:
    enum: [depends_on, contradicts, implements, consumes, produces, threatens, resolves, enables, supersedes, impacts]
