      sources: [{path: docs/ROADMAP_v4.md}]

    # [Entry 4] Money transmission expanded
    - id: legal:money_transmission_detail
      description: "State-by-state money transmitter analysis for escrow and crypto settlement"
      type: risk_mitigation
      stripe_coverage: "Stripe holds money transmitter licenses; platform pass-through is covered"
      escrow_licensing_required: true
      crypto_msb_registration: "FinCEN MSB registration required if platform touches USDC outside Stripe flow"
      ny_bitlicense: "Required if serving NY customers with crypto settlement"
      resolve_before: phase:v2.5
      sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]

  contract_templates:
    - id: contract:consensusdocs_751
      name: "ConsensusDocs 751 (Short Form)"
      use_case: "Standard survey task orders"
      auto_populated_from: "task spec + winning bid"
      key_terms:
        data_ownership: "Processed deliverables to client; raw data retained by operator for E&O defense"
        liability_cap: "1x task fee"
        indemnification: "Mutual, each party's percentage of negligence (ConsensusDocs model)"
        dispute_resolution: "Negotiation -> mediation -> arbitration"
        # [Entry 4] Billing format
        billing_format: "AIA G702/G703 for progress billing"
        # [Entry 4] Limitation of liability
        limitation_of_liability: "Displayed at award time. Cap = 1x task fee."
      digital_execution: "ESIGN/UETA compliant"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: contract:consensusdocs_750
      name: "ConsensusDocs 750 (Long Form)"
      use_case: "Larger or more complex survey contracts"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

    - id: contract:consensusdocs_752
      name: "ConsensusDocs 752 (Federal)"
      use_case: "Federal government construction subcontracts"
      sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  insurance_requirements:
    # [Entry 4] All 6 coverage types
    private_project:
      cgl: "$1M per occurrence / $2M aggregate"
      eo: "$1M per claim / $2M aggregate"
      drone_liability: "$1M per occurrence"
      workers_comp: "Statutory"
      umbrella_excess: "Not typically required"
      commercial_auto: "$1M combined single limit"
    dot_public_project:
      cgl: "$2M per occurrence / $5M aggregate"
      eo: "$2M per claim / $5M aggregate"
      drone_liability: "$2M-$5M per occurrence"
      workers_comp: "Statutory"
      umbrella_excess: "$2M-$10M"
      commercial_auto: "$1M-$2M combined single limit"
    # [Entry 4] E&O tail coverage
    eo_tail_policy:
      type: claims_made
      risk: "Operator who drops E&O after project exposes platform to downstream claims"
      tail_coverage_minimum_years: 3
      platform_enforcement: "Flag operators whose E&O lapses within tail period"
    # [Entry 4] Statute of limitations affecting E&O
    statute_of_limitations:
      - {state: TX, years: 10, note: "Survey error claims"}
      - {state: MI, years: 6, note: "Professional malpractice"}
      - {state: AZ, years: 6, note: "Professional malpractice"}
    sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  # [Entry 4] Payment flow as first-class state machine
  payment_flow:
    description: "Legally-required payment chain from bond to closeout"
    states:
      - escrow_funded
      - milestone_billed
      - milestone_approved
      - payment_released
      - retainage_held
      - retainage_released
      - lien_waiver_exchanged
      - closed
    retainage:
      default_pct: 10
      michigan_reduction: "Reducible to 0% after 50% completion on public projects"
      release_trigger: "Substantial completion + final inspection"
    prompt_payment_timers:
      - jurisdiction: MI
        statute: "MCL 125.1561"
        days_after_owner_payment: 10
        penalty_monthly_pct: 1.5
        exclusions: "MDOT projects, schools, contracts under $30K"
      - jurisdiction: federal
        statute: "Prompt Payment Act (31 USC 3901)"
        days_after_acceptance: 30
        penalty: "Per-diem interest at Treasury rate"
    lien_waiver:
      required: true
      exchange_point: "After final payment, before closeout"
      michigan_statute: "MCL 570.1101 et seq."
    billing_format: "AIA G702/G703"
    sources: [{path: docs/research/RESEARCH_CONSTRUCTION_PAYMENT_FLOWS.md}]

  # [Entry 4] Data ownership as first-class entity
  data_ownership:
    raw_sensor_data:
      owner: operator
      rationale: "Retained for E&O liability defense"
      retention_years: 7
    processed_deliverables:
      owner: client
      transfer_trigger: "Final payment received"
    derived_products:
      owner: "Jointly licensed — client gets exclusive use for project; operator retains for portfolio/training"
      note: "Who owns the 3D model generated from a point cloud the client paid for? Must be addressed in contract."
    platform_data_rights:
      task_metadata: "Platform retains anonymized task metadata for analytics and benchmarking"
      bid_data: "Platform retains anonymized bid data for pricing intelligence"
      training_data: "Platform may NOT use client deliverables for model training without explicit consent"
    privacy:
      neighboring_property:
        risk: "Drone surveys near property boundaries can capture private data"
        mitigation: "Privacy buffer zone configurable per task; default 50ft from boundary"
        legal_basis: "United States v. Causby, Nevada drone trespass law"
      pii_in_operator_profiles:
        fields_affected: [pls_license_number, home_address, tax_id]
        applicable_laws: [CCPA, state_privacy_laws]
        classification: "PII — encrypted at rest, access-controlled"
    sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  # [Entry 4] Multi-state PLS licensing model
  pls_licensing:
    description: "Professional Land Surveyor licensing varies by state — marketplace must track per-state requirements"
    states:
      - state: MI
        statute: "MCL 339.2001 et seq."
        firm_authorization: "MCL 339.2007 — Certificate of Authorization required for firms"
        continuing_education: "30 hours per biennial renewal"
      - state: AZ
        statute: "ARS 32-101 et seq."
        reciprocity: "NCEES record accepted"
        continuing_education: "30 hours per biennial renewal"
      - state: NV
        statute: "NRS 625"
        reciprocity: "Comity with NCEES"
        continuing_education: "30 hours per biennial renewal"
      - state: NM
        statute: "NMSA 61-23-1 et seq."
        reciprocity: "NCEES record accepted"
        continuing_education: "30 hours per biennial renewal"
    sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  michigan_specifics:
    surveyor_licensing: "MCL 339.2001 et seq."
    firm_authorization: "MCL 339.2007 — Certificate of Authorization required for firms"
    continuing_education: "30 hours per biennial renewal"
    payment_bond_threshold: "MCL 129.201 — public projects >= $50K"
    prompt_payment: "MCL 125.1561 — 10 days after receiving owner payment, 1.5%/mo penalty"
    prompt_payment_exclusions: "MDOT projects, schools, contracts under $30K"
    lien_rights: "MCL 570.1107a-b — surveyors as 'design professionals' since 2018"
    sources: [{path: docs/research/RESEARCH_LEGAL_FRAMEWORK_SURVEY_CONTRACTS.md}]

  # [v2.2] PLS automation options from RESEARCH_PLS_AUTOMATION_OPTIONS.md
  pls_automation:
    statute: "MCL 339.2007 — electronic seal and electronic signature explicitly permitted in Michigan"
    statute_url: "https://www.legislature.mi.gov/Laws/MCL?objectName=mcl-339-2007"
    legal_constraint: "PLS must have professional responsibility for the work product. Judgment cannot be delegated to AI. No state board accepts automated stamping without licensed professional review."
    minimum_human_time_per_task: "5-15 minutes (with AI pre-screening and electronic seal via API)"
    options:
      - id: pls:option_1
        name: "Operator brings own PLS"
        description: "Operator has PLS on staff or under contract. Marketplace verifies license only."
        pls_review_time: "30 min to 2 hours"
        who_pays: "Operator (baked into bid price)"
        automation_level: none
        risk: "Operators without PLS arrangement cannot bid on stamped deliverables"
      - id: pls:option_2
        name: "PLS as a service (marketplace PLS network)"
        description: "Marketplace contracts with PLSs in each state. Routes completed data for review. PLS cost is a line item ($200-$500/review)."
        pls_review_time: "30 min to 2 hours"
        who_pays: "Buyer (separate line item)"
        automation_level: partial
        advantage: "Any operator can bid, even without their own PLS. Supply grows."
        risk: "PLS must actually review, not rubber-stamp. Stamp mill arrangements violate licensing law."
        precedent: "Partner ESI and similar survey coordination firms match field crews with remote PLSs"
      - id: pls:option_3
        name: "AI-assisted PLS review (reduce review time)"
        description: "QA tool pre-screens deliverables (point density, RMSE, CRS, file format, gaps). PLS reviews QA report + spot-checks."
        pls_review_time: "15-30 minutes"
        who_pays: "Platform absorbs QA tool cost; PLS review still charged to buyer"
        automation_level: partial
        maps_to_skills: [skill:deliverable_validator, skill:capture_qc]
      - id: pls:option_4
        name: "Electronic seal via API"
        description: "PLS reviews dashboard, clicks approve. System applies digital seal via DocuSign/DocuSeal API. PLS never handles file directly."
        pls_review_time: "5-15 minutes"
        who_pays: "Platform absorbs seal cost; PLS review charged to buyer"
        automation_level: partial
        api_options: ["DocuSign eSignature REST API", "DocuSeal (open source)", "Custom PKI digital seal"]
        legal_basis: "Valid in Michigan (MCL 339.2007). Valid in most UETA/E-SIGN Act states."
      - id: pls:option_5
        name: "Platform employs PLSs directly"
        description: "Marketplace hires PLSs as W-2 or dedicated contractors. Every deliverable reviewed in-house."
        pls_review_time: "Same as Option 2"
        who_pays: "Built into platform take rate"
        automation_level: partial
        cost: "$80-120K/yr per PLS"
        risk: "Need one per state. Platform becomes professional services firm."
    recommended_phasing:
      phase_1: "v1.5-v2.0: Option 1 + Option 3 (operator brings PLS, marketplace builds QA tool)"
      phase_2: "v2.0-v2.5: Option 2 + Option 4 (PLS network + electronic seal API, 3-5 PLSs in MI/OH)"
      phase_3: "v3.0+: Consider Option 5 only if 50+ reviews/month makes dedicated staff cheaper"
    sources: [{path: docs/research/legal/RESEARCH_PLS_AUTOMATION_OPTIONS.md}]

# ============================================================
# ARCHITECTURE — capabilities, components, MCP tools, settlement,
#   execution stack, state machines, skills
# [Entry 2] Added tool schemas, fixed state machines, added refund semantics
# [Entry 2] Added scoring_profiles per vertical
# [Entry 2] Added frontend component
# [Entry 2] Added repos section for cross-repo coherence
# ============================================================
architecture:
  capabilities:
    - id: cap:task_posting
      description: "Agent translates natural language into structured task spec with sensor, accuracy, deliverable requirements"
      status: implemented
      phase: phase:v1.0
    - id: cap:reverse_auction
      description: "RFQ auction — open indefinitely, agent controls close"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:PD-1]
    - id: cap:automated_bidding
      description: "Robots run bid_engine(task) -> Bid autonomously"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:PD-2]
    - id: cap:bid_signing
      description: "Every bid signed with ERC-8004 Ed25519 key"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:PD-3]
    - id: cap:filter_then_score
      description: "Two-phase matching: hard constraint filter then weighted scoring"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:AD-5, decision:AD-6]
    - id: cap:fiat_settlement
      description: "Stripe Connect Express + prepaid wallet model"
      status: implemented
      phase: phase:v1.0
      decisions: [decision:TC-2]
    - id: cap:crypto_settlement
      description: "Gasless USDC on Base via EIP-3009 transferWithAuthorization (migrated from ERC-2612 permit after security audit R-034)"
      status: implemented
      phase: phase:v1.2
      decisions: [decision:TC-4]
      note: "v1.1: ERC-2612 permit + 88/12 split. v1.2: migrated to EIP-3009, removed platform fee (100% to operator). Base mainnet live."
    # [v2.4] New capabilities from v1.1-v1.3 demo build
    - id: cap:ach_bank_transfer
      description: "ACH bank debit via Stripe us_bank_account — buyer pays by routing+account number"
      status: implemented
      phase: phase:v1.3
      note: "No authorize/capture for ACH — platform-level hold required. Stripe collects into platform, Transfer to operator on delivery."
      sources: [{path: docs/architecture/PLAN_ACH_AND_PAYMENT_TRANSLATION.md}]
    - id: cap:three_method_payment_selector
      description: "Buyer chooses Card / Bank Transfer / Stablecoin at checkout — marketplace translates to operator payout"
      status: implemented
      phase: phase:v1.3
      note: "Payment method translation: buyer pays however they want, operator receives via their preferred method."
      sources: [{path: docs/architecture/PLAN_ACH_AND_PAYMENT_TRANSLATION.md}]
    - id: cap:real_robot_integration
      description: "MCPRobotAdapter bridges marketplace MCP server to real on-chain robots via ERC-8004 on Base mainnet"
      status: implemented
      phase: phase:v1.1
      note: "Tumbller robot live — move, read sensors via MCP. 4 robots registered on Base mainnet (FakeRover-Finland-01, Berlin-01/02/03)."
      sources: [{path: docs/architecture/PLAN_REAL_ROBOT_INTEGRATION.md}]
    - id: cap:always_on_infrastructure
      description: "Marketplace + fleet on Fly.io (fakerover, robot MCP, marketplace MCP) — no laptop dependency"
      status: implemented
      phase: phase:v1.1
      sources: [{path: docs/architecture/PLAN_STABLE_INFRASTRUCTURE.md}]
    - id: cap:schema_driven_qa
      description: "delivery_schema in task spec — robot self-validates before submitting, QA engine validates delivery"
      status: implemented
      phase: phase:v1.1
      note: "JSON Schema: required/type/minimum/maximum/minItems/maxItems. No task-type-specific code in QA engine."
      sources: [{path: docs/architecture/PLAN_SCHEMA_DRIVEN_QA.md}]
    - id: cap:settlement_abstraction
      description: "4-mode interface supporting immediate/batched x transparent/private"
      status: planned
      phase: phase:v1.5
      decisions: [decision:FD-1]
    - id: cap:commitment_hash
      description: "H(request_id || salt) in on-chain memos, never raw request_id"
      status: planned
      phase: phase:v1.5
      decisions: [decision:FD-4]
    - id: cap:hidden_wallet_addresses
      description: "Robot wallet addresses never in public API responses"
      status: planned
      phase: phase:v1.5
      decisions: [decision:PP-2]
    - id: cap:award_confirmation
      description: "Human reviews recommended winner with automated checks before work starts"
      status: planned
      phase: phase:v2.0
      sources: [{path: docs/research/RESEARCH_AWARD_CONFIRMATION_PROCESS.md}]
    - id: cap:multi_robot_workflows
      description: "Compound tasks decomposed into ordered/parallel subtasks across robot types"
      status: planned
      phase: phase:v2.0
    # [Entry 3] Manual-flagged task triage
    - id: cap:manual_task_flagging
      description: "Smart triage: tasks that require human specialists flagged and routed to specialist vendors"
      status: planned
      phase: phase:v2.0
      example: "Task 3 flagged MANUAL — requires human tunnel survey manager"
    - id: cap:privacy_tee
      description: "TEE-based confidential compute for encrypted task matching"
      status: planned
      phase: phase:v2.0
      decisions: [decision:PP-4]
    - id: cap:dtn_batched_settlement
      description: "Batched transparent settlement via DTN for lunar operations"
      status: planned
      phase: phase:v4.0
      decisions: [decision:LD-8]

  # [v2.2] Deployment architecture from TECHNICAL_MCP_DEPLOYMENT.md
  deployment:
    hosting:
      provider: "here.now"
      plan: "Authenticated (permanent)"
      cost_monthly_usd: 0
      domain: "yakrobot.bid"
      ssl: "Auto (Cloudflare)"
      deploy_command: "here-now publish <dir> --slug <slug>"
    live_sites:
      - url: "https://yakrobot.bid"
        slug: gleaming-sierra-28gb
        description: "Main interactive demo — MDOT I-94 RFQ walkthrough"
        source: demo/index.html
      - url: "https://yakrobot.bid/yaml"
        slug: wistful-mantra-9vnz
        description: "YAML ontology explorer — browse PRODUCT_DSL live"
        source: docs/site/
      - url: "https://yakrobot.bid/pitch"
        slug: bronze-osprey-nsj6
        description: "Pitch deck — investor/partner presentation"
      - url: "https://yakrobot.bid/demo"
        slug: sturdy-riddle-vvar
        description: "Live auction demo — Claude orchestrates real MCP tools, 3-method payment (Card/ACH/USDC)"
        source: docs/mcp_demo_5/index.html
    worker:
      name: yakrobot-chat
      platform: "Cloudflare Workers"
      endpoints:
        - "POST /api/chat — chatbot proxy to Anthropic API (streaming)"
        - "POST /api/demo — tool_use loop with MCP server (10 tools, max 8 iterations)"
        - "POST /api/feedback — visitor feedback collection"
        - "GET /api/health — liveness check"
        # [v2.4] v1.3 ACH + payment endpoints
        - "POST /api/create-ach-intent — Stripe PaymentIntent with us_bank_account for ACH bank transfer"
        - "POST /api/transfer-to-operator — push funds to operator's Stripe Connect account after delivery"
        - "POST /api/commit-payment — receive gasless USDC authorization (EIP-3009 signature) from buyer"
      source: chatbot/src/index.js
      rate_limits: {chat: "25/day/IP", demo: "5/day/IP", feedback: "5/day/IP"}
    # [v2.4] Fly.io always-on infrastructure (v1.1+)
    fly_io:
      description: "Always-on deployment — no laptop dependency. Added in v1.1."
      apps:
        - name: fakerover
          description: "Robot simulator (fakerover HTTP API)"
          url: "yakrover.online"
        - name: robot-mcp
          description: "Robot MCP server (yakrover-8004-mcp)"
        - name: marketplace-mcp
          description: "Marketplace MCP server (mcp_server.py)"
      sources: [{path: docs/architecture/PLAN_STABLE_INFRASTRUCTURE.md}]
    mcp_server:
      path: mcp_server.py
      description: "Standalone REST API exposing 36 MCP tools for web demo"
      endpoints:
        - "GET /health — status, tool count, fleet size, wallet balance"
        - "GET /api/tools — list all available tools"
        - "POST /api/tool/{name} — invoke any MCP tool"
      tunnel: "Cloudflare Tunnel (named: yak-demo) or cloudflared quick tunnel"
      tunnel_domain: "mcp.yakrobot.bid"
    architecture_summary: |
      yakrobot.bid (here.now static hosting)
        demo/index.html .............. Main demo (interactive walkthrough)
        docs/mcp_demo_5/index.html ... Live MCP demo (Claude + real auction + 3-method payment)
        docs/site/ ................... YAML ontology explorer
      yakrobot-chat (Cloudflare Worker)
        /api/chat .................... Chatbot → Anthropic Messages API (streaming)
        /api/demo .................... Tool-use loop → MCP server (non-streaming)
        /api/create-ach-intent ....... Stripe ACH PaymentIntent
        /api/transfer-to-operator .... Stripe Connect transfer on delivery
        /api/commit-payment .......... EIP-3009 gasless USDC authorization
      Fly.io (always-on, v1.1+)
        fakerover .................... Robot simulator (yakrover.online)
        robot-mcp .................... Robot MCP server (ERC-8004)
        marketplace-mcp .............. Marketplace MCP server (36 tools)
      mcp_server.py (local + Cloudflare Tunnel)
        /api/tool/{name} ............. REST proxy to 36 MCP tools
        /health ...................... Status endpoint
      SQLite (local, :memory: for demo)
    database:
      mvp: "SQLite (:memory: for demo, file-backed for persistence)"
      migration_trigger: ">1 instance or >10 concurrent auction writers"
      target: "Postgres (production)"
    path_to_real_operators: "Deploy -> public MCP URL -> operators connect Claude Code -> bid on real tasks"
    sources: [{path: docs/architecture/TECHNICAL_MCP_DEPLOYMENT.md}, {path: chatbot/DEPLOY.md}]

  # [Entry 2] Scoring profiles per vertical
  scoring_profiles:
    - id: scoring:construction
      vertical: vertical:construction
      weights: {price: 0.40, sla: 0.25, confidence: 0.20, reputation: 0.15}
      decisions: [decision:AD-6]
    - id: scoring:mining
      vertical: vertical:mining
      weights: {price: 0.35, sla: 0.25, confidence: 0.20, reputation: 0.15, volumetric_accuracy: 0.05}
    - id: scoring:infrastructure
      vertical: vertical:infrastructure
      weights: {price: 0.25, sla: 0.20, confidence: 0.15, reputation: 0.10, nbi_certification_match: 0.15, form_factor_availability: 0.15}
    - id: scoring:lunar
      vertical: null
      weights: {price: 0.30, speed: 0.20, confidence: 0.15, track_record: 0.10, power_margin: 0.15, dust_exposure: 0.10}
      decisions: [decision:LD-6]

  components:
    - id: component:auction_engine
      path: auction/engine.py
      description: "Task, Bid, AuctionResult, score_bids(), state machine"
      decisions: [decision:PD-1, decision:PD-2, decision:AD-5, decision:AD-6, decision:AD-7, decision:AD-8]
      impacts: [cap:reverse_auction, cap:automated_bidding, cap:filter_then_score]
    - id: component:core
      path: auction/core.py
      description: "Task, Bid, AuctionResult dataclasses, signing"
      decisions: [decision:PD-3, decision:AD-3]
    - id: component:wallet
      path: auction/wallet.py
      description: "WalletLedger with debit/credit log"
      decisions: [decision:TC-2]
    - id: component:stripe_service
      path: auction/stripe_service.py
      description: "Stripe Connect Express + Separate Charges and Transfers"
      decisions: [decision:TC-2, decision:TC-3]
    - id: component:store
      path: auction/store.py
      description: "SQLite persistence via SyncTaskStore"
    - id: component:discovery_bridge
      path: auction/discovery_bridge.py
      description: "ERC-8004 robot discovery"
      consumes: [repo:yakrover-8004-mcp]
    - id: component:mcp_server
      path: mcp_server.py
      description: "Standalone REST API exposing 36 MCP tools for web demo and tunnel access"
      status: implemented
      phase: phase:v1.0
    - id: component:mock_fleet
      path: auction/mock_fleet.py
      description: "Simulated robots for testing"
    - id: component:escrow_contract
      path: contracts/RobotTaskEscrow.sol
      status: planned
      phase: phase:v1.5
      decisions: [decision:FD-1, decision:TC-4]
    - id: component:settlement
      path: auction/settlement.py
      status: planned
      phase: phase:v1.5
      decisions: [decision:FD-1, decision:FD-4]
    # [Entry 2] Frontend component
    - id: component:frontend
      path: demo/index.html
      description: "Interactive demo with robot cards, live feed, operator sign-up, GC auction flow"
      status: implemented
      phase: phase:v1.0
      note: "Hosted on here.now at yakrobot.bid. Schema.org pricing ($0.25-$5.00) needs reconciling with construction pricing ($1,500-$5,000)."
    - id: component:mcp_demo
      path: docs/mcp_demo_5/index.html
      description: "Live auction demo (demo-5) — Claude orchestrates real MCP tools, 3-method payment selector (Card/ACH/USDC)"
      status: implemented
      phase: phase:v1.3
      note: "Hosted on here.now at yakrobot.bid/demo. 5-phase buyer flow: Setup → Auction → Dispatch (payment) → Execute → Done. Renders markdown in step feed."
    - id: component:chatbot_worker
      path: chatbot/src/index.js
      description: "Cloudflare Worker — chat proxy to Anthropic API + demo tool_use loop"
      status: implemented
      phase: phase:v1.0
      decisions: []
      note: "Rate-limited (25 chat/day, 5 demo/day per IP). Injection detection. CORS for yakrobot.bid + here.now origins."

  # [Entry 2] External repos consumed by the marketplace
  repos:
    - id: repo:yakrover-8004-mcp
      url: "https://github.com/YakRoboticsGarage/yakrover-8004-mcp"
      consumed_by: component:discovery_bridge
      provides:
        - "ERC-8004 agent card with tool surface"
        - "MCP tools for yakrover control"
      agent_card_fields: [min_price, accepted_currencies, reputation_score, sensor_capabilities]
      note: "External MCP server — agents must coordinate between this and component:mcp_server"
    - id: repo:tumbller-8004-mcp
      url: "https://github.com/YakRoboticsGarage/tumbller-8004-mcp"
      erc8004: true
    - id: repo:tello-8004-mcp
      url: "https://github.com/YakRoboticsGarage/tello-8004-mcp"
      erc8004: true
    - id: repo:cryptobotics-whitepaper
      url: "https://github.com/YakRoboticsGarage/cryptobotics-whitepaper"
      note: "Whitepaper never referenced in v1.1 YAML — should be cited for vision section"

  mcp_tools:
    # [v2.5] Updated: 36 tools implemented (was 35 in v2.4)
    existing_count: 36
    status_summary: "36 implemented, 3 planned from gap analysis"
    # [Entry 2] Full parameter/return/error schemas for each tool
    existing:
      - name: post_task
        wraps: AuctionEngine.post_task
        triggers_state: "null -> posted"
        parameters:
          - {name: description, type: string, required: true}
          - {name: requirements, type: object, required: false}
          - {name: max_price_usd, type: number, required: false}
          - {name: deadline_seconds, type: integer, required: false}
        returns: {type: Task, fields: [task_id, status, created_at]}
        errors: [INVALID_TASK_SPEC, BELOW_MINIMUM_PRICE, INSUFFICIENT_FUNDS]
      - name: submit_bid
        wraps: AuctionEngine.submit_bid
        triggers_state: "posted -> bidding"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: robot_id, type: string, required: true}
          - {name: price_usd, type: number, required: true}
          - {name: sla_seconds, type: integer, required: true}
          - {name: confidence, type: number, required: true}
          - {name: signature, type: string, required: true}
        returns: {type: Bid, fields: [bid_id, task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_NOT_ACCEPTING_BIDS, INVALID_SIGNATURE, PRICE_BELOW_MINIMUM]
      - name: accept_bid
        wraps: AuctionEngine.accept_bid
        triggers_state: "bidding -> bid_accepted"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: bid_id, type: string, required: true}
        returns: {type: AuctionResult, fields: [task_id, winning_bid_id, status]}
        errors: [TASK_NOT_FOUND, BID_NOT_FOUND, TASK_NOT_IN_BIDDING]
      - name: auction_execute
        wraps: AuctionEngine.execute
        triggers_state: "bid_accepted -> in_progress"
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: Task, fields: [task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_NOT_ACCEPTED]
      - name: confirm_delivery
        wraps: AuctionEngine.confirm_delivery
        triggers_state: "delivered -> verified"
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: Task, fields: [task_id, status, settlement_receipt]}
        errors: [TASK_NOT_FOUND, TASK_NOT_DELIVERED]
      - name: reject_delivery
        wraps: AuctionEngine.reject_delivery
        triggers_state: "delivered -> rejected"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: reason, type: string, required: true}
        returns: {type: Task, fields: [task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_NOT_DELIVERED]
      - name: cancel_task
        wraps: AuctionEngine.cancel_task
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: Task, fields: [task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_IN_PROGRESS]
      - name: auction_get_status
        note: "Returns available_actions list (AD-14) and next_action hint (AD-13)"
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: TaskStatus, fields: [task_id, status, available_actions, next_action]}
        errors: [TASK_NOT_FOUND]
      - name: auction_quick_hire
        note: "Single tool for entire lifecycle — post, bid, accept, execute, confirm (AD-12)"
        parameters:
          - {name: description, type: string, required: true}
          - {name: robot_id, type: string, required: true}
          - {name: max_price_usd, type: number, required: false}
        returns: {type: AuctionResult, fields: [task_id, winning_bid_id, status]}
        errors: [INVALID_TASK_SPEC, ROBOT_NOT_FOUND, INSUFFICIENT_FUNDS]
      - name: auction_fund_wallet
        wraps: WalletLedger.credit
        parameters:
          - {name: robot_id, type: string, required: true}
          - {name: amount_usd, type: number, required: true}
        returns: {type: WalletBalance, fields: [robot_id, balance_usd]}
        errors: [ROBOT_NOT_FOUND, INVALID_AMOUNT]
      # [Entry 2] 5 previously unaccounted tools
      - name: get_bids
        wraps: AuctionEngine.get_bids
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: list, items: Bid}
        errors: [TASK_NOT_FOUND]
      - name: get_task
        wraps: AuctionEngine.get_task
        parameters:
          - {name: task_id, type: string, required: true}
        returns: {type: Task}
        errors: [TASK_NOT_FOUND]
      - name: list_tasks
        wraps: AuctionEngine.list_tasks
        parameters:
          - {name: status, type: string, required: false}
        returns: {type: list, items: Task}
        errors: []
      - name: get_wallet_balance
        wraps: WalletLedger.balance
        parameters:
          - {name: robot_id, type: string, required: true}
        returns: {type: WalletBalance, fields: [robot_id, balance_usd]}
        errors: [ROBOT_NOT_FOUND]
      - name: deliver_task
        wraps: AuctionEngine.deliver
        triggers_state: "in_progress -> delivered"
        parameters:
          - {name: task_id, type: string, required: true}
          - {name: deliverable_url, type: string, required: false}
        returns: {type: Task, fields: [task_id, status]}
        errors: [TASK_NOT_FOUND, TASK_NOT_IN_PROGRESS]
    # Tools added in v1.0.1+ (construction compliance, RFP processing, operator management)
