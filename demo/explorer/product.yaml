# ============================================================
# TRANSFER MAP — Earth to Lunar capability transfer
# [Entry 1] Added lunar business model
# [Entry 5] Equipment refs use IDs, not prose names
# ============================================================
transfer_map:
  sources: [{path: docs/research/SYNTHESIS_JTBD_WEDGE_PROPOSAL.md}]

  sensors_that_transfer:
    - sensor: LiDAR
      equipment_refs: [equipment:zenmuse_l2, equipment:spot_blk_arc]
      earth_use: "Topographic survey, DTM generation, volumetrics"
      lunar_use: "Terrain mapping at Shackleton Crater rim"
      transfers: true
      note: "Works better in vacuum — no atmospheric scattering"
    - sensor: RTK-GPS
      earth_use: "Centimeter positioning for survey accuracy"
      lunar_use: "Replaced by LunaNet positioning beacons"
      transfers: false
      replacement: "NASA LunaNet"
    - sensor: Photogrammetry
      equipment_refs: [equipment:zenmuse_p1]
      earth_use: "3D models, orthomosaics, structure documentation"
      lunar_use: "Boulder field characterization, crater morphology"
      transfers: true
    - sensor: GPR
      earth_use: "Subsurface utility detection, soil profiling"
      lunar_use: "Regolith depth and ice concentration profiling for ISRU"
      transfers: true
    - sensor: Thermal_IR
      earth_use: "Insulation defects, water infiltration"
      lunar_use: "Critical for -173C to +127C surface temperature swing management"
      transfers: true
    - sensor: IMU
      earth_use: "Navigation stabilization"
      lunar_use: "Navigation in reduced gravity (1/6 g)"
      transfers: true

  workflows_that_transfer:
    - earth: "Pre-bid topographic survey"
      lunar: "Terrain mapping for pad siting"
      transfer_quality: direct
    - earth: "Existing condition documentation"
      lunar: "Boulder field and crater characterization"
      transfer_quality: direct
    - earth: "Subsurface GPR assessment"
      lunar: "Regolith depth and ice profiling for ISRU"
      transfer_quality: direct
    - earth: "Progress monitoring (cut/fill)"
      lunar: "Tracking autonomous excavation of landing pads"
      transfer_quality: direct
    - earth: "As-built verification"
      lunar: "Habitat foundation confirmation before pressurization"
      transfer_quality: direct

  software_that_transfers:
    - "Auction engine and scoring function"
    - "Agent orchestration and task decomposition"
    - "ERC-8004 identity and reputation system"
    - "Point cloud classification and terrain modeling"
    - "Volumetric computation and deviation analysis"
    - "Deliverable pipeline and format conversion"

  gaps_lunar_requires:
    sources: [{path: docs/ROADMAP_v4.md}]
    items:
      - "Radiation-hardened electronics"
      - "Vacuum-rated mechanical systems"
      - "DTN/Bundle Protocol communication (RFC 9171) tolerating multi-hour blackouts"
      - "Reduced gravity navigation (1/6 g)"
      - "Regolith dust mitigation for optics and mechanisms"
      - "Solar/RTG power management with lunar night hibernation"
      - "Thin Moon-side agent: minimal C/Rust state machine (not Python)"
      - "Checkpoint-and-resume for 14-day lunar night transitions"

  lunar_task_spec_extensions:
    sources: [{path: docs/ROADMAP_v4.md}]
    fields:
      - thermal_window
      - power_budget_wh
      - illumination_required
      - comm_window_required

  # [Entry 1] Lunar business model — who pays and how
  lunar_business_model:
    gravity_effect: "The lunar narrative is only credible if the business model transfers, not just the sensors."
    open_questions:
      - "NASA CLPS contracts are firm-fixed-price to payload providers, not reverse-auction"
      - "Who is the buyer: NASA directly, CLPS payload provider, or commercial lunar company?"
      - "Auction mechanism may need adaptation: pre-qualified pool + task order, not open RFQ"
    procurement_vehicles:
      - {name: "CLPS", type: firm_fixed_price, buyer: NASA, relevance: "Task orders to pre-qualified providers"}
      - {name: "Artemis support", type: cost_plus, buyer: NASA, relevance: "Survey work as subcontract"}
      - {name: "Commercial lunar", type: negotiated, buyer: "ispace/Astrobotic/Intuitive Machines", relevance: "Most auction-compatible"}

