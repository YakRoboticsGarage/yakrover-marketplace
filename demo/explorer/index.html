<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Task Auction Protocol — Product Brief</title>
<link rel="icon" href="yak-icon.png">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --ink: #0f1419;
  --ink2: #3d4854;
  --ink3: #6e7a86;
  --paper: #fafaf8;
  --paper2: #f0efeb;
  --paper3: #e6e4df;
  --rule: #d4d1ca;
  --rust: #b44d2d;
  --rust-bg: #fdf3ef;
  --teal: #1a7a6d;
  --teal-bg: #eef8f6;
  --slate: #3d5a80;
  --slate-bg: #edf2f7;
  --warm: #8b6914;
  --warm-bg: #fdf8ec;
  --r: 3px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', 'Menlo', monospace;
}

html { font-size: 15px; scroll-behavior: smooth }
body { font-family: var(--font); background: var(--paper); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased }

/* ---- NAV ---- */
.topnav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,250,248,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--rule);
  padding: 0 24px;
  display: flex; align-items: center; gap: 24px;
  height: 48px; overflow-x: auto;
}
.topnav-brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0 }
.topnav-brand img { width: 22px; height: 22px; border-radius: 3px }
.topnav-brand span { font-weight: 700; font-size: 0.8rem; letter-spacing: 0.04em; color: var(--ink) }
.topnav-links { display: flex; gap: 2px; flex-shrink: 0 }
.topnav-links a {
  font-size: 0.73rem; font-weight: 500; color: var(--ink3);
  text-decoration: none; padding: 6px 10px; border-radius: var(--r);
  transition: all 0.15s; white-space: nowrap;
}
.topnav-links a:hover { color: var(--ink); background: var(--paper2) }
.topnav-links a.active { color: var(--rust); background: var(--rust-bg) }
.topnav-search { margin-left: auto; flex-shrink: 0 }
.topnav-search input {
  width: 200px; padding: 5px 10px; border: 1px solid var(--rule);
  border-radius: var(--r); background: var(--paper); font: inherit;
  font-size: 0.73rem; color: var(--ink); outline: none;
}
.topnav-search input:focus { border-color: var(--rust); box-shadow: 0 0 0 2px var(--rust-bg) }
.topnav-search input::placeholder { color: var(--ink3) }

/* ---- LAYOUT ---- */
.wrap { max-width: 920px; margin: 0 auto; padding: 0 24px }
section { padding: 48px 0 32px; border-bottom: 1px solid var(--rule) }
section:last-child { border-bottom: none }
.sec-label { font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink3); margin-bottom: 6px }
.sec-title { font-size: 1.5rem; font-weight: 700; line-height: 1.2; margin-bottom: 6px }
.sec-sub { font-size: 0.85rem; color: var(--ink2); max-width: 560px; margin-bottom: 24px }

/* ---- HERO ---- */
.hero { padding: 56px 0 40px; text-align: center; border-bottom: 1px solid var(--rule) }
.hero .mantra { font-size: 1.9rem; font-weight: 700; line-height: 1.15; letter-spacing: -0.02em; max-width: 600px; margin: 0 auto 12px }
.hero .tagline { font-size: 0.9rem; color: var(--ink2); max-width: 480px; margin: 0 auto 28px; font-style: italic }
.hero-stats { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap }
.hero-stat { text-align: center }
.hero-stat .num { font-size: 1.6rem; font-weight: 700; color: var(--rust); line-height: 1.1 }
.hero-stat .lbl { font-size: 0.62rem; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500 }

/* ---- GRID helpers ---- */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px }
@media(max-width:640px){ .g2,.g3 { grid-template-columns: 1fr } }

/* ---- CARDS ---- */
.card {
  background: #fff; border: 1px solid var(--rule); border-radius: var(--r);
  padding: 16px; transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.04) }
.card-sm { padding: 12px }
.card h3 { font-size: 0.82rem; font-weight: 600; margin-bottom: 4px }
.card p, .card li { font-size: 0.78rem; color: var(--ink2); line-height: 1.5 }
.card ul { padding-left: 16px; margin-top: 4px }
.card ul li { margin-bottom: 2px }
.card .meta { font-size: 0.68rem; color: var(--ink3); margin-top: 6px }

/* ---- BADGES ---- */
.badge {
  display: inline-block; font-size: 0.58rem; font-weight: 600;
  padding: 2px 6px; border-radius: 2px; text-transform: uppercase;
  letter-spacing: 0.04em; vertical-align: middle;
}
.b-built { background: var(--teal-bg); color: var(--teal) }
.b-next { background: var(--warm-bg); color: var(--warm) }
.b-future { background: var(--paper2); color: var(--ink3) }
.b-high { background: #fde8e8; color: #b91c1c }
.b-med { background: var(--warm-bg); color: var(--warm) }
.b-low { background: var(--teal-bg); color: var(--teal) }

/* ---- CONFIDENCE BAR ---- */
.conf { display: flex; align-items: center; gap: 8px; margin-top: 6px }
.conf-track { flex: 1; height: 4px; background: var(--paper2); border-radius: 2px; max-width: 100px }
.conf-fill { height: 100%; background: var(--teal); border-radius: 2px }
.conf-pct { font-family: var(--mono); font-size: 0.68rem; font-weight: 500; color: var(--ink2) }

/* ---- TIMELINE ---- */
.timeline { position: relative; padding-left: 20px }
.timeline::before { content: ''; position: absolute; left: 5px; top: 4px; bottom: 4px; width: 1px; background: var(--rule) }
.tl-item { position: relative; padding-bottom: 20px }
.tl-item:last-child { padding-bottom: 0 }
.tl-dot {
  position: absolute; left: -20px; top: 3px; width: 11px; height: 11px;
  border-radius: 50%; border: 2px solid var(--rule); background: var(--paper);
}
.tl-item.done .tl-dot { background: var(--teal); border-color: var(--teal) }
.tl-item.active .tl-dot { background: var(--rust); border-color: var(--rust); box-shadow: 0 0 0 3px var(--rust-bg) }
.tl-title { font-size: 0.82rem; font-weight: 600; display: flex; align-items: center; gap: 8px }
.tl-body { font-size: 0.75rem; color: var(--ink2); margin-top: 3px }
.tl-body ul { padding-left: 16px; margin-top: 2px }
.tl-body li { margin-bottom: 1px }

/* ---- TABLE ---- */
.tbl { width: 100%; border-collapse: collapse; font-size: 0.75rem }
.tbl th { text-align: left; font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink3); padding: 6px 10px; border-bottom: 2px solid var(--rule) }
.tbl td { padding: 8px 10px; border-bottom: 1px solid var(--paper2); vertical-align: top; color: var(--ink2) }
.tbl tr:last-child td { border-bottom: none }
.tbl td:first-child { color: var(--ink); font-weight: 500 }

/* ---- SEARCH RESULTS ---- */
.search-results { padding: 32px 0 }
.sr-item { padding: 10px 0; border-bottom: 1px solid var(--paper2) }
.sr-item:last-child { border-bottom: none }
.sr-path { font-family: var(--mono); font-size: 0.65rem; color: var(--ink3) }
.sr-val { font-size: 0.78rem; color: var(--ink2); margin-top: 2px }
.sr-val mark { background: var(--rust-bg); color: var(--rust); padding: 0 2px; border-radius: 1px }

/* ---- DETAIL TOGGLE ---- */
details { margin-top: 8px }
details summary {
  font-size: 0.72rem; color: var(--ink3); cursor: pointer; user-select: none;
  font-weight: 500; list-style: none;
}
details summary::before { content: '+ '; font-family: var(--mono) }
details[open] summary::before { content: '- ' }
details .detail-body { margin-top: 6px; padding-left: 12px; border-left: 1px solid var(--rule); font-size: 0.75rem; color: var(--ink2) }

/* ---- PERSONA CARDS ---- */
.persona-card .persona-detail { display: none; }
.persona-card.expanded .persona-detail { display: block; }
.persona-card.expanded .persona-chevron { transform: rotate(180deg); }
.persona-header:hover { opacity: 0.8 }

.jtbd-block { background: var(--paper2); border-radius: var(--r); padding: 10px 12px }
.jtbd-row { display: flex; gap: 8px; padding: 3px 0; font-size: 0.75rem }
.jtbd-label { flex-shrink: 0; width: 60px; font-weight: 600; color: var(--ink3); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.04em; padding-top: 1px }
.jtbd-text { color: var(--ink2) }

.evidence-row { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--paper2); font-size: 0.73rem }
.evidence-row:last-child { border-bottom: none }
.evidence-source { flex-shrink: 0; width: 200px; font-family: var(--mono); font-size: 0.65rem; color: var(--ink3); word-break: break-all }
.evidence-finding { color: var(--ink2) }
@media(max-width:640px){
  .evidence-row { flex-direction: column; gap: 2px }
  .evidence-source { width: auto }
  .jtbd-row { flex-direction: column; gap: 2px }
  .jtbd-label { width: auto }
}

/* ---- MISC ---- */
.mono { font-family: var(--mono) }
.muted { color: var(--ink3) }
.accent { color: var(--rust) }
.text-sm { font-size: 0.75rem }
.text-xs { font-size: 0.68rem }
.mt-16 { margin-top: 16px }
.mt-8 { margin-top: 8px }
.mb-8 { margin-bottom: 8px }
.hidden { display: none }

@media(max-width:640px){
  .topnav { padding: 0 12px; gap: 12px }
  .topnav-links a { padding: 6px 6px; font-size: 0.68rem }
  .topnav-search input { width: 120px }
  .wrap { padding: 0 16px }
  .hero .mantra { font-size: 1.4rem }
  .hero-stats { gap: 20px }
  section { padding: 32px 0 24px }
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-brand"><img src="yak-icon.png" alt=""><span>RTAP</span></div>
  <div class="topnav-links" id="nav"></div>
  <div class="topnav-search"><input type="text" id="search" placeholder="Search..." oninput="doSearch(this.value)"></div>
</nav>

<div id="app">
  <div class="wrap" style="padding:80px 24px;text-align:center;color:var(--ink3)">Loading product ontology...</div>
</div>

<script>
var D = null;

var SECTIONS = [
  { id:'overview', label:'Overview' },
  { id:'protocol', label:'Protocol' },
  { id:'bets', label:'Bets' },
  { id:'users', label:'Users' },
  { id:'market', label:'Market' },
  { id:'roadmap', label:'Roadmap' },
  { id:'equipment', label:'Equipment' },
  { id:'payment', label:'Payment' },
  { id:'risks', label:'Risks' },
];

fetch('product.yaml').then(r=>r.text()).then(function(t){
  D = jsyaml.load(t);
  buildNav();
  render();
}).catch(function(e){
  document.getElementById('app').innerHTML='<div class="wrap" style="padding:80px 24px;text-align:center;color:#b91c1c">Failed to load: '+esc(e.message)+'</div>';
});

function buildNav(){
  var h='';
  SECTIONS.forEach(function(s){
    h+='<a href="#'+s.id+'">'+s.label+'</a>';
  });
  document.getElementById('nav').innerHTML=h;
  // Scroll spy
  var links=document.querySelectorAll('.topnav-links a');
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(en.isIntersecting){
        links.forEach(function(l){l.classList.toggle('active',l.getAttribute('href')==='#'+en.target.id)});
      }
    });
  },{rootMargin:'-48px 0px -70% 0px'});
  // Will observe after render
  setTimeout(function(){
    SECTIONS.forEach(function(s){
      var el=document.getElementById(s.id);
      if(el) obs.observe(el);
    });
  },100);
}

function render(){
  var h='';
  h+=renderHero();
  h+='<div class="wrap">';
  h+=renderOverview();
  h+=renderProtocol();
  h+=renderBets();
  h+=renderUsers();
  h+=renderMarket();
  h+=renderRoadmap();
  h+=renderEquipment();
  h+=renderPayment();
  h+=renderRisks();
  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

// ---- HERO ----
function renderHero(){
  var v=D.vision||{};
  var es=D.executive_summary||{};
  return '<div class="hero"><div class="wrap">'+
    '<div class="mantra">'+ esc(es.one_line || v.north_star || '') +'</div>'+
    '<div class="tagline">'+ esc(v.tagline||'') +'</div>'+
  '</div></div>';
}
function stat(n,l){ return '<div class="hero-stat"><div class="num">'+n+'</div><div class="lbl">'+l+'</div></div>' }

// ---- OVERVIEW ----
function renderOverview(){
  var es=D.executive_summary||{};
  var v=D.vision||{};
  var h='<section id="overview">';
  h+='<div class="sec-label">Overview</div>';
  h+='<div class="sec-title">What is this?</div>';
  h+='<div class="sec-sub">'+esc((es.central_answer||[])[0]||'')+'</div>';

  // Three problems
  h+='<div class="g3">';
  (es.core_problem||[]).forEach(function(p){
    h+='<div class="card card-sm"><p>'+esc(p)+'</p></div>';
  });
  h+='</div>';

  // Thesis
  if(v.thesis){
    h+='<div class="card mt-16"><h3>Thesis <span class="badge b-next">Confidence '+Math.round((v.thesis.confidence||0)*100)+'%</span></h3>';
    h+='<p>'+esc(v.thesis.claim||'')+'</p>';
    if(v.thesis.evidence){
      h+='<details><summary>Evidence</summary><div class="detail-body"><ul>';
      v.thesis.evidence.forEach(function(e){ h+='<li>'+esc(e)+'</li>' });
      h+='</ul></div></details>';
    }
    h+='</div>';
  }

  // Positioning
  if(v.positioning){
    h+='<div class="mt-16 mb-8" style="font-size:0.82rem;font-weight:600">Positioning vs. Adjacents</div>';
    h+='<table class="tbl"><thead><tr><th>Level</th><th>Competitor</th><th>Distinction</th></tr></thead><tbody>';
    var pos=v.positioning;
    function renderPosGroup(group, label){
      if(!group||typeof group!=='object') return;
      Object.keys(group).forEach(function(k){
        if(k==='sources'||k==='direct_competitors') return;
        h+='<tr><td>'+esc(label)+'</td><td>'+esc(k.replace(/^vs_/,'').replace(/_/g,' '))+'</td><td>'+esc(group[k])+'</td></tr>';
      });
    }
    if(pos.protocol_level) renderPosGroup(pos.protocol_level, 'Protocol');
    if(pos.application_level) renderPosGroup(pos.application_level, 'Application');
    // Fallback for flat positioning (pre-v2.7)
    if(!pos.protocol_level&&!pos.application_level){
      Object.keys(pos).forEach(function(k){
        if(k==='sources'||k==='direct_competitors') return;
        h+='<tr><td></td><td>'+esc(k.replace(/^vs_/,'').replace(/_/g,' '))+'</td><td>'+esc(pos[k])+'</td></tr>';
      });
    }
    h+='</tbody></table>';
  }

  h+='</section>';
  return h;
}

// ---- PROTOCOL ----
function renderProtocol(){
  var v=D.vision||{};
  var arch=D.architecture||{};
  var h='<section id="protocol">';
  h+='<div class="sec-label">Architecture</div>';
  h+='<div class="sec-title">Protocol Components</div>';
  h+='<div class="sec-sub">Five components that make physical-world tasks liquid. Domain-agnostic runtime, vertical-specific schemas.</div>';

  // Protocol components
  var comps=v.protocol_components||[];
  if(comps.length){
    h+='<div class="g3" style="grid-template-columns:1fr 1fr;margin-bottom:16px">';
    comps.forEach(function(c){
      h+='<div class="card card-sm">';
      h+='<h3>'+esc(c.name||'')+'</h3>';
      h+='<p>'+esc(c.function||'')+'</p>';
      if(c.file) h+='<div class="meta mono">'+esc(c.file)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // Architecture layers
  var layers=arch.layers;
  if(layers){
    h+='<div class="mt-16 mb-8" style="font-size:0.82rem;font-weight:600">Protocol vs. Product Layers</div>';
    h+='<table class="tbl"><thead><tr><th>Layer</th><th>Description</th><th>License</th></tr></thead><tbody>';
    Object.keys(layers).forEach(function(k){
      var l=layers[k];
      var name=k.replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
      var sb=k==='protocol'?'b-built':(k==='vertical_construction'?'b-next':'b-future');
      h+='<tr><td><span class="badge '+sb+'">'+esc(name)+'</span></td><td>'+esc(l.description||'')+'</td><td class="mono">'+esc(l.license||'')+'</td></tr>';
    });
    h+='</tbody></table>';

    // Module lists
    h+='<details class="mt-8"><summary>Module breakdown</summary><div class="detail-body">';
    Object.keys(layers).forEach(function(k){
      var l=layers[k];
      if(l.modules&&l.modules.length){
        var name=k.replace(/_/g,' ');
        h+='<div class="mb-8"><strong class="text-xs">'+esc(name)+':</strong> <span class="mono text-xs">'+l.modules.map(esc).join(', ')+'</span></div>';
      }
    });
    h+='</div></details>';
  }

  h+='</section>';
  return h;
}

// ---- BETS ----
function renderBets(){
  var bc=D.bet_chain||{};
  var bets=bc.bets||[];
  var h='<section id="bets">';
  h+='<div class="sec-label">Strategy</div>';
  h+='<div class="sec-title">Bet Chain</div>';
  h+='<div class="sec-sub">Dependent strategic bets. Each must hold for the next to matter.</div>';

  bets.forEach(function(b){
    var pct=Math.round((b.confidence||0)*100);
    h+='<div class="card" style="margin-bottom:10px">';
    h+='<h3>'+esc(shortId(b.id||''))+'</h3>';
    h+='<p>'+esc(b.claim||'')+'</p>';
    h+='<div class="conf"><div class="conf-track"><div class="conf-fill" style="width:'+pct+'%"></div></div><span class="conf-pct">'+pct+'%</span></div>';
    if(b.depends_on&&b.depends_on.length){
      h+='<div class="meta">Depends on: '+b.depends_on.map(function(d){return esc(shortId(d))}).join(', ')+'</div>';
    }
    if(b.enables&&b.enables.length){
      h+='<div class="meta">Enables: '+b.enables.map(function(d){return esc(shortId(d))}).join(', ')+'</div>';
    }
    h+='<details><summary>Evidence &amp; falsification</summary><div class="detail-body">';
    if(b.evidence_for){h+='<div class="mb-8"><strong style="font-size:0.7rem">For:</strong><ul>';b.evidence_for.forEach(function(e){h+='<li>'+esc(e)+'</li>'});h+='</ul></div>';}
    if(b.evidence_against){h+='<div class="mb-8"><strong style="font-size:0.7rem">Against:</strong><ul>';b.evidence_against.forEach(function(e){h+='<li>'+esc(e)+'</li>'});h+='</ul></div>';}
    if(b.falsified_by) h+='<div class="mb-8"><strong style="font-size:0.7rem">Falsified by:</strong> '+esc(b.falsified_by)+'</div>';
    if(b.validated_by) h+='<div><strong style="font-size:0.7rem">Validated by:</strong> '+esc(b.validated_by)+'</div>';
    h+='</div></details>';
    h+='</div>';
  });

  h+='</section>';
  return h;
}

// ---- USERS ----
function renderUsers(){
  var personas=D.personas||[];
  var h='<section id="users">';
  h+='<div class="sec-label">Users</div>';
  h+='<div class="sec-title">Who is this for?</div>';
  h+='<div class="sec-sub">Every feature traces back to one of these personas.</div>';

  personas.forEach(function(p){
    var phaseLabel='';
    if(p.phase){
      var ps=p.phase.replace('phase:','');
      var built=ps==='v1.0'||ps==='v1.1'||ps==='v1.2'||ps==='v1.3';
      phaseLabel=' <span class="badge '+(built?'b-built':'b-future')+'">'+esc(ps)+'</span>';
    }
    var roleLabel=' <span class="badge" style="background:var(--slate-bg);color:var(--slate)">'+esc(p.role||'')+'</span>';

    h+='<div class="card persona-card" style="margin-bottom:10px">';

    // Header row — always visible
    h+='<div class="persona-header" onclick="this.parentElement.classList.toggle(\'expanded\')" style="cursor:pointer;display:flex;align-items:baseline;gap:8px">';
    h+='<h3 style="flex:1">'+esc(p.name||'')+roleLabel+phaseLabel+'</h3>';
    h+='<span class="persona-chevron" style="font-size:0.65rem;color:var(--ink3);transition:transform 0.15s">&#9660;</span>';
    h+='</div>';

    // Summary line — always visible
    var summary='';
    if(p.pain) summary=p.pain;
    else if(typeof p.jtbd==='string') summary=p.jtbd;
    else if(Array.isArray(p.jtbd)&&p.jtbd[0]&&p.jtbd[0].motivation) summary=p.jtbd[0].motivation;
    if(summary) h+='<p class="mt-8" style="font-size:0.78rem;color:var(--ink2)">'+esc(summary)+'</p>';

    // Expandable detail
    h+='<div class="persona-detail">';

    if(p.company) h+='<div class="text-xs mt-8" style="color:var(--ink3)">'+esc(p.company)+'</div>';

    // JTBD structured
    var jobs=Array.isArray(p.jtbd)?p.jtbd:(typeof p.jtbd==='string'?[{situation:p.jtbd}]:[]);
    jobs.forEach(function(j){
      if(!j.situation&&!j.motivation&&!j.outcome) return;
      h+='<div class="jtbd-block mt-16">';
      if(j.situation) h+='<div class="jtbd-row"><span class="jtbd-label">When</span><span class="jtbd-text">'+esc(j.situation)+'</span></div>';
      if(j.motivation) h+='<div class="jtbd-row"><span class="jtbd-label">I want to</span><span class="jtbd-text">'+esc(j.motivation)+'</span></div>';
      if(j.outcome) h+='<div class="jtbd-row"><span class="jtbd-label">So that</span><span class="jtbd-text">'+esc(j.outcome)+'</span></div>';
      h+='</div>';
    });

    // Capabilities (agent)
    if(p.capabilities&&p.capabilities.length){
      h+='<div class="mt-16"><div class="text-xs" style="font-weight:600;color:var(--ink3);margin-bottom:4px">CAPABILITIES</div><ul style="padding-left:16px;font-size:0.75rem;color:var(--ink2)">';
      p.capabilities.forEach(function(c){ h+='<li>'+esc(c)+'</li>' });
      h+='</ul></div>';
    }

    // Failure modes (agent)
    if(p.failure_modes&&p.failure_modes.length){
      h+='<div class="mt-8"><div class="text-xs" style="font-weight:600;color:var(--ink3);margin-bottom:4px">FAILURE MODES</div><ul style="padding-left:16px;font-size:0.75rem;color:var(--ink2)">';
      p.failure_modes.forEach(function(f){ h+='<li>'+esc(f)+'</li>' });
      h+='</ul></div>';
    }

    // Authorization (agent)
    if(p.authorization){
      var a=p.authorization;
      h+='<div class="mt-8"><div class="text-xs" style="font-weight:600;color:var(--ink3);margin-bottom:4px">AUTHORIZATION</div>';
      h+='<div style="font-size:0.75rem;color:var(--ink2)">Spending limit: $'+Number(a.spending_limit_per_task_usd||0).toLocaleString()+'/task. Auto-approve under $'+Number(a.auto_approve_under_usd||0).toLocaleString()+'. Configured by '+esc(shortId(a.configurable_by||''))+'.</div></div>';
    }

    // Equipment
    if(p.equipment&&p.equipment.length){
      h+='<div class="mt-8"><div class="text-xs" style="font-weight:600;color:var(--ink3);margin-bottom:4px">EQUIPMENT</div>';
      h+='<div style="font-size:0.75rem;color:var(--ink2)">'+p.equipment.map(function(e){return esc(shortId(e))}).join(', ')+'</div></div>';
    }

    // Evidence with source links
    if(p.evidence&&p.evidence.length){
      h+='<div class="mt-16"><div class="text-xs" style="font-weight:600;color:var(--ink3);margin-bottom:6px">EVIDENCE</div>';
      p.evidence.forEach(function(e){
        h+='<div class="evidence-row"><span class="evidence-source">'+esc(e.source||'')+'</span><span class="evidence-finding">'+esc(e.finding||'')+'</span></div>';
      });
      h+='</div>';
    }

    // Sources
    if(p.sources&&p.sources.length){
      h+='<div class="mt-8"><div class="text-xs muted">Sources: '+p.sources.map(function(s){return esc(s.path||'')}).join(', ')+'</div></div>';
    }

    h+='</div>'; // .persona-detail
    h+='</div>'; // .card
  });

  h+='</section>';
  return h;
}

// ---- MARKET ----
function renderMarket(){
  var m=D.market||{};
  var w=m.wedge||{};
  var cl=m.competitive_landscape||{};
  var g=D.gtm||{};
  var h='<section id="market">';
  h+='<div class="sec-label">Market</div>';
  h+='<div class="sec-title">Construction Site Surveying <span class="badge b-built" style="vertical-align:middle;font-size:0.55rem">First Vertical</span></div>';
  h+='<div class="sec-sub">'+esc(g.messaging&&g.messaging.to_buyers||'')+'</div>';

  // TAM
  h+='<div class="g3 mb-8">';
  if(w.tam) h+='<div class="card card-sm"><div class="text-xs muted mb-8">TAM</div><div style="font-size:1.2rem;font-weight:700;color:var(--rust)">'+fmtUSD(w.tam.amount_usd)+'</div><div class="text-xs muted">'+esc(w.tam.description||'')+'</div></div>';
  if(w.wedge_tam) h+='<div class="card card-sm"><div class="text-xs muted mb-8">Wedge TAM</div><div style="font-size:1.2rem;font-weight:700;color:var(--rust)">'+fmtUSD(w.wedge_tam.amount_usd)+'</div><div class="text-xs muted">'+esc(w.wedge_tam.description||'')+'</div></div>';
  if(w.raas_market) h+='<div class="card card-sm"><div class="text-xs muted mb-8">RaaS Market</div><div style="font-size:1.2rem;font-weight:700;color:var(--rust)">'+fmtUSD(w.raas_market.amount_usd)+'</div><div class="text-xs muted">'+w.raas_market.cagr_pct+'% CAGR to '+fmtUSD(w.raas_market.projected_usd)+' ('+w.raas_market.projected_year+')</div></div>';
  h+='</div>';

  // Competitors
  var adj=cl.closest_adjacents||[];
  if(adj.length){
    h+='<div class="mt-16 mb-8" style="font-size:0.82rem;font-weight:600">Competitive Landscape <span class="text-xs muted" style="font-weight:400;text-transform:none"> &mdash; No direct competitor exists</span></div>';
    h+='<table class="tbl"><thead><tr><th>Company</th><th>Model</th><th>Threat</th></tr></thead><tbody>';
    adj.forEach(function(c){
      var tb=c.threat==='high'?'b-high':(c.threat==='medium'?'b-med':'b-low');
      h+='<tr><td>'+esc(c.name||'')+'</td><td>'+esc(c.model||'')+'</td><td><span class="badge '+tb+'">'+esc(c.threat||'')+'</span></td></tr>';
    });
    h+='</tbody></table>';
  }

  // Geos
  var geos=m.geographies||{};
  if(geos.primary&&geos.primary.length){
    h+='<div class="mt-16 mb-8" style="font-size:0.82rem;font-weight:600">Target Geographies</div>';
    h+='<div class="g2">';
    geos.primary.forEach(function(g){
      h+='<div class="card card-sm"><h3>'+esc(g.state||'')+' <span class="badge b-built">Primary</span></h3>';
      if(g.cities) h+='<p>'+g.cities.map(esc).join(', ')+'</p>';
      if(g.rationale) h+='<div class="meta">'+esc(g.rationale)+'</div>';
      h+='</div>';
    });
    (geos.secondary||[]).forEach(function(g){
      h+='<div class="card card-sm"><h3>'+esc(g.state||'')+' <span class="badge b-future">Secondary</span></h3>';
      if(g.cities) h+='<p>'+g.cities.map(esc).join(', ')+'</p>';
      if(g.rationale) h+='<div class="meta">'+esc(g.rationale)+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  h+='</section>';
  return h;
}

// ---- ROADMAP ----
function renderRoadmap(){
  var rm=D.roadmap||{};
  var phases=rm.phases||[];
  var h='<section id="roadmap">';
  h+='<div class="sec-label">Roadmap</div>';
  h+='<div class="sec-title">Build Sequence</div>';
  h+='<div class="sec-sub">Each phase is gated by conditions, not dates.</div>';

  h+='<div class="timeline">';
  phases.forEach(function(p){
    var done=p.status==='built';
    var next=p.status==='next';
    var cls=done?'done':(next?'active':'');
    var sb=done?'b-built':(next?'b-next':'b-future');
    h+='<div class="tl-item '+cls+'">';
    h+='<div class="tl-dot"></div>';
    h+='<div class="tl-title">'+esc(p.id?p.id.replace('phase:',''):'')+' &mdash; '+esc(p.label||'')+' <span class="badge '+sb+'">'+esc(p.status||'')+'</span></div>';
    h+='<div class="tl-body">';
    if(p.timeline) h+='<div class="muted">'+esc(p.timeline)+'</div>';
    if(p.date) h+='<div class="muted">Completed '+esc(p.date)+'</div>';
    if(p.entry_gate) h+='<div style="margin-top:3px"><strong style="font-size:0.7rem">Gate:</strong> '+esc(p.entry_gate)+'</div>';
    var caps=p.capabilities_unlocked||[];
    if(caps.length){
      h+='<details><summary>'+caps.length+' capabilities</summary><div class="detail-body"><ul>';
      caps.forEach(function(c){ h+='<li>'+esc(c)+'</li>' });
      h+='</ul></div></details>';
    }
    h+='</div></div>';
  });
  h+='</div>';

  h+='</section>';
  return h;
}

// ---- EQUIPMENT ----
function renderEquipment(){
  var ss=D.supply_side||{};
  var catalog=ss.equipment_catalog||[];
  var econ=ss.economics||{};
  var h='<section id="equipment">';
  h+='<div class="sec-label">Supply Side</div>';
  h+='<div class="sec-title">Equipment Catalog</div>';
  h+='<div class="sec-sub">Real platforms and sensors with verified specs and pricing.</div>';

  if(catalog.length){
    h+='<table class="tbl"><thead><tr><th>Platform</th><th>Type</th><th>Price</th><th>Key Spec</th></tr></thead><tbody>';
    catalog.forEach(function(e){
      var price='';
      if(e.price) price=fmtUSD(e.price.min_usd)+' &ndash; '+fmtUSD(e.price.max_usd);
      var spec='';
      if(e.flight_time_min) spec=e.flight_time_min+'min flight';
      else if(e.accuracy_h_cm) spec=e.accuracy_h_cm+'cm H / '+e.accuracy_v_cm+'cm V';
      else if(e.lidar_range_m) spec='LiDAR '+e.lidar_range_m+'m';
      else if(e.resolution_mp) spec=e.resolution_mp+'MP';
      else if(e.runtime_min) spec=e.runtime_min+'min runtime, '+e.payload_kg+'kg payload';
      h+='<tr><td>'+esc((e.manufacturer||'')+' '+(e.model||''))+'</td><td>'+esc(e.type||'')+'</td><td class="mono">'+price+'</td><td>'+esc(spec)+'</td></tr>';
    });
    h+='</tbody></table>';
  }

  // Operator tiers
  var tiers=[econ.tier_1_budget, econ.tier_2_professional, econ.tier_3_multi_sensor].filter(Boolean);
  if(tiers.length){
    h+='<div class="mt-16 mb-8" style="font-size:0.82rem;font-weight:600">Operator Economics</div>';
    h+='<div class="g3">';
    tiers.forEach(function(t){
      h+='<div class="card card-sm">';
      h+='<h3>'+esc(t.label||'')+'</h3>';
      h+='<div style="font-size:1rem;font-weight:700;color:var(--rust)">'+esc(t.all_in_cost_usd||'')+'</div>';
      h+='<p>'+esc(t.equipment||'')+'</p>';
      h+='<div class="meta">Revenue: '+esc(t.monthly_revenue_range_usd||'')+'/mo &middot; Breakeven: '+esc(t.breakeven_months||'')+' months</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  h+='</section>';
  return h;
}

  // Settlement modes

    h+='<table class="tbl"><thead><tr><th>Mode</th><th>Timing</th><th>Privacy</th><th>Chain</th><th>Version</th></tr></thead><tbody>';

  // Value props

    vp.forEach(function(v){
      h+='<div class="card" style="margin-bottom:10px"><h3>'+esc(v.claim||'')+'</h3>';
      if(v.magnitude) h+='<p style="color:var(--teal);font-weight:500">'+esc(v.magnitude)+'</p>';
      if(v.who_benefits_most) h+='<p>'+esc(v.who_benefits_most)+'</p>';

// ---- RISKS ----
function renderRisks(){
  var unk=(D.unknowns||{}).register||[];
  var h='<section id="risks">';
  h+='<div class="sec-label">Risk Register</div>';
  h+='<div class="sec-title">Open Questions</div>';
  h+='<div class="sec-sub">'+unk.length+' unknowns tracked with severity and resolution targets.</div>';

  var sevOrder={'blocks_launch':0,'degrades_experience':1,'limits_scale':2};
  var sorted=unk.slice().sort(function(a,b){ return (sevOrder[a.severity]||9)-(sevOrder[b.severity]||9) });

  sorted.forEach(function(u){
    var sb=u.severity==='blocks_launch'?'b-high':(u.severity==='degrades_experience'?'b-med':'b-low');
    h+='<div class="card" style="margin-bottom:8px"><h3>'+esc(u.question||'')+'</h3>';
    h+='<div class="mt-8"><span class="badge '+sb+'">'+esc((u.severity||'').replace(/_/g,' '))+'</span>';
    if(u.resolve_by) h+=' <span class="text-xs muted">Resolve by '+esc(u.resolve_by.replace('phase:',''))+'</span>';
    if(u.resolution_status) h+=' <span class="badge b-built">'+esc(u.resolution_status.replace(/_/g,' '))+'</span>';
    h+='</div>';
    if(u.mitigation) h+='<p class="mt-8">'+esc(u.mitigation)+'</p>';
    if(u.threatens&&u.threatens.length) h+='<div class="meta">Threatens: '+u.threatens.map(function(t){return esc(shortId(t))}).join(', ')+'</div>';
    h+='</div>';
  });

  h+='</section>';
  return h;
}


// ---- SEARCH ----
function doSearch(q){
  if(!q||q.length<2){ if(D) render(); return }
  q=q.toLowerCase();
  var results=[];
  function walk(obj,path){
    if(!obj) return;
    if(typeof obj==='string'){
      if(obj.toLowerCase().indexOf(q)!==-1) results.push({path:path,val:obj});
    } else if(Array.isArray(obj)){
      obj.forEach(function(v,i){ walk(v,path+'['+i+']') });
    } else if(typeof obj==='object'){
      Object.keys(obj).forEach(function(k){
        if(k.toLowerCase().indexOf(q)!==-1) results.push({path:path+'.'+k,val:String(obj[k]).substring(0,300)});
        walk(obj[k],path+'.'+k);
      });
    }
  }
  Object.keys(D).forEach(function(k){ walk(D[k],k) });
  var h='<div class="wrap"><div class="search-results">';
  h+='<div class="sec-title">Search: "'+esc(q)+'"</div>';
  h+='<div class="sec-sub">'+results.length+' matches</div>';
  results.slice(0,40).forEach(function(r){
    var highlighted=esc(r.val).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
    h+='<div class="sr-item"><div class="sr-path">'+esc(r.path)+'</div><div class="sr-val">'+highlighted+'</div></div>';
  });
  if(results.length>40) h+='<div class="text-xs muted" style="padding:12px 0">Showing 40 of '+results.length+'</div>';
  if(!results.length) h+='<div class="muted" style="padding:32px 0;text-align:center">No matches</div>';
  h+='</div></div>';
  document.getElementById('app').innerHTML=h;
}

// ---- UTILS ----
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function shortId(s){ return s.replace(/^(bet|persona|equipment|phase|feature|journey|unknown|component|cap|settlement|prop):/,'') }
function fmtN(n){ if(!n) return '0'; if(n>=1e9) return '$'+Math.round(n/1e9)+'B'; if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if(n>=1e3) return Math.round(n/1e3).toLocaleString()+'K'; return String(n) }
function fmtUSD(n){ if(!n) return '--'; if(n>=1e9) return '$'+Math.round(n/1e9)+'B'; if(n>=1e6) return '$'+(n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if(n>=1e3) return '$'+Math.round(n/1e3).toLocaleString()+'K'; return '$'+Number(n).toLocaleString() }
